<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STELLA NOVA // Explosion Viewer</title>
<style>
:root{--bg:#0e1118;--border:rgba(150,200,255,0.06);--border-b:rgba(150,200,255,0.14);--blue:#96c8ff;--blue-dim:#5a8cc0;--blue-glow:rgba(150,200,255,0.10);--yellow:#ffc832;--red:#ff5050;--text:#c8d0e0;--text-dim:#6878a0;--text-faint:#384060;--scan:rgba(0,0,0,0.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.player{position:relative;z-index:10;width:min(90vw, 90vh * 1.333);max-width:1200px}
.viewport{position:relative;width:100%;aspect-ratio:4/3;background:#000;cursor:crosshair;border:1px solid var(--border-b)}
.viewport canvas{display:block;width:100%;height:100%}
.vp-chrome{position:absolute;display:flex;justify-content:space-between;align-items:center;left:12px;right:12px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(150,200,255,0.25);pointer-events:none;z-index:5}
.vp-chrome.top{top:10px}.vp-chrome.bottom{bottom:10px}
.controls{background:rgba(14,17,24,0.95);border:1px solid var(--border-b);border-top:none;padding:0}
.timeline{position:relative;height:32px;cursor:pointer;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border)}
.tl-track{position:absolute;left:16px;right:16px;height:3px;background:rgba(150,200,255,0.08)}
.tl-fill{height:100%;background:var(--blue-dim)}
.transport{display:flex;align-items:center;padding:8px 16px;gap:8px;flex-wrap:wrap}
.t-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 8px;cursor:pointer;transition:all 0.15s}
.t-btn:hover{border-color:var(--blue);color:var(--blue)}
.t-btn.active{border-color:var(--yellow);color:var(--bg);background:var(--yellow)}
.t-time{font-size:11px;color:var(--text-dim);letter-spacing:0.08em;min-width:120px}
.t-time strong{color:var(--blue);font-weight:700}
.t-sep{flex:1}
.ctrl-row{display:flex;align-items:center;padding:6px 16px;gap:12px;border-top:1px solid var(--border);flex-wrap:wrap}
.slider-group{display:flex;align-items:center;gap:6px;flex:1;min-width:120px}
.slider-group label{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-faint);white-space:nowrap}
.slider-group input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:2px;background:rgba(150,200,255,0.08);outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;background:var(--blue);cursor:pointer}
.slider-group .sv{font-size:9px;color:var(--blue);min-width:28px;text-align:right}
#dbg{position:fixed;bottom:0;left:0;right:0;z-index:99999;background:rgba(0,40,0,0.95);color:#0f0;font:10px/1.4 monospace;padding:6px 10px;max-height:30vh;overflow:auto;white-space:pre-wrap;display:none}
</style>
</head>
<body>

<div class="player">
  <div class="viewport">
    <div class="vp-chrome top">
      <span>VOLUMETRIC EXPLOSION // DUKE</span>
      <span id="resLabel">--</span>
    </div>
    <canvas id="cv"></canvas>
    <div class="vp-chrome bottom">
      <span id="fpsLabel">-- FPS</span>
      <span>DRAG TO ROTATE · SCROLL TO ZOOM</span>
    </div>
  </div>
  <div class="controls">
    <div class="timeline" id="timeline">
      <div class="tl-track"><div class="tl-fill" id="tlFill" style="width:0%"></div></div>
    </div>
    <div class="transport">
      <button class="t-btn" id="btnFrameBack">⏮</button>
      <button class="t-btn" id="btnPlay">▶</button>
      <button class="t-btn" id="btnFrameFwd">⏭</button>
      <div class="t-time"><strong id="timeNow">0.00</strong> / 30.00s</div>
      <button class="t-btn" id="btnSeed">🎲 <span id="seedLabel" style="color:var(--yellow)">--</span></button>
      <div class="t-sep"></div>
      <button class="t-btn" data-spd="0.25">¼×</button>
      <button class="t-btn" data-spd="0.5">½×</button>
      <button class="t-btn active" data-spd="1">1×</button>
      <button class="t-btn" data-spd="2">2×</button>
    </div>
    <div class="ctrl-row">
      <div class="slider-group">
        <label>Density</label>
        <input type="range" id="sldDensity" min="0.3" max="3" step="0.01" value="1">
        <span class="sv" id="valDensity">1.00</span>
      </div>
      <div class="slider-group">
        <label>Bright</label>
        <input type="range" id="sldBright" min="0.5" max="4" step="0.01" value="1.5">
        <span class="sv" id="valBright">1.50</span>
      </div>
      <div class="slider-group">
        <label>Zoom</label>
        <input type="range" id="sldZoom" min="0" max="3" step="0.01" value="0.5">
        <span class="sv" id="valZoom">0.50</span>
      </div>
      <div style="display:flex;gap:3px">
        <button class="t-btn" data-q="0">56</button>
        <button class="t-btn" data-q="1">86</button>
        <button class="t-btn active" data-q="2">128</button>
      </div>
    </div>
  </div>
</div>
<div id="dbg"></div>

<script>
// Debug
var dbgEl = document.getElementById('dbg');
function dbg(s) { dbgEl.style.display = 'block'; dbgEl.textContent += s + '\n'; }
window.onerror = function(m,s,l,c,e){ dbg('ERR: '+m+' @'+l+':'+c+(e?'\n'+e.stack:'')); };
window.addEventListener('unhandledrejection', function(e){ dbg('REJ: '+(e.reason?.stack||e.reason)); });

// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
var playing = true, speed = 1, density = 1, brightness = 1.5, zoom = 0.5, quality = 2;
var currentTime = 0, duration = 30;
var seed = Math.random() * 1000;
var lastTs = 0, frames = 0, fpsTime = 0;
var mouseX = 200, dragging = false, dragSX = 0, mxS = 0;
var scrubbing = false;
var FDT = 1/60;

document.getElementById('seedLabel').textContent = seed.toFixed(1);

// ═══════════════════════════════════════════════════════════
//  UI wiring — NO inline handlers
// ═══════════════════════════════════════════════════════════
var btnPlay = document.getElementById('btnPlay');
var tlFill = document.getElementById('tlFill');
var timeline = document.getElementById('timeline');
var cv = document.getElementById('cv');

function updPlayBtn() { btnPlay.textContent = playing ? '⏸' : '▶'; }

btnPlay.addEventListener('click', function() { playing = !playing; updPlayBtn(); });
document.getElementById('btnFrameBack').addEventListener('click', function() {
  playing = false; currentTime = Math.max(0, currentTime - FDT); updPlayBtn();
});
document.getElementById('btnFrameFwd').addEventListener('click', function() {
  playing = false; currentTime = Math.min(duration, currentTime + FDT); updPlayBtn();
});
document.getElementById('btnSeed').addEventListener('click', function() {
  seed = Math.floor(Math.random() * 10000) / 10;
  currentTime = 0;
  document.getElementById('seedLabel').textContent = seed.toFixed(1);
});

// Speed buttons
document.querySelectorAll('[data-spd]').forEach(function(b) {
  b.addEventListener('click', function() {
    speed = parseFloat(this.dataset.spd);
    document.querySelectorAll('[data-spd]').forEach(function(x){ x.classList.remove('active'); });
    this.classList.add('active');
  });
});

// Quality buttons
document.querySelectorAll('[data-q]').forEach(function(b) {
  b.addEventListener('click', function() {
    quality = parseInt(this.dataset.q);
    document.querySelectorAll('[data-q]').forEach(function(x){ x.classList.remove('active'); });
    this.classList.add('active');
  });
});

// Sliders
document.getElementById('sldDensity').addEventListener('input', function() {
  density = +this.value; document.getElementById('valDensity').textContent = density.toFixed(2);
});
document.getElementById('sldBright').addEventListener('input', function() {
  brightness = +this.value; document.getElementById('valBright').textContent = brightness.toFixed(2);
});
document.getElementById('sldZoom').addEventListener('input', function() {
  zoom = +this.value; document.getElementById('valZoom').textContent = zoom.toFixed(2);
});

// Timeline scrub
function timeFromMouse(e) {
  var rect = timeline.getBoundingClientRect();
  var x = Math.max(0, Math.min(1, (e.clientX - rect.left - 16) / (rect.width - 32)));
  return x * duration;
}
timeline.addEventListener('mousedown', function(e) { scrubbing = true; currentTime = timeFromMouse(e); });
document.addEventListener('mousemove', function(e) { if (scrubbing) currentTime = timeFromMouse(e); });
document.addEventListener('mouseup', function() { scrubbing = false; });

// Canvas drag
cv.addEventListener('mousedown', function(e) { dragging = true; dragSX = e.clientX; mxS = mouseX; e.preventDefault(); });
document.addEventListener('mousemove', function(e) { if (dragging) mouseX = mxS + (e.clientX - dragSX) * 0.5; });
document.addEventListener('mouseup', function() { dragging = false; });

// Scroll zoom
cv.addEventListener('wheel', function(e) {
  e.preventDefault();
  zoom = Math.max(0, Math.min(3, zoom + (e.deltaY > 0 ? -0.1 : 0.1)));
  document.getElementById('sldZoom').value = zoom;
  document.getElementById('valZoom').textContent = zoom.toFixed(2);
}, { passive: false });

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); playing = !playing; updPlayBtn(); }
  if (e.code === 'ArrowLeft') currentTime = Math.max(0, currentTime - 0.5);
  if (e.code === 'ArrowRight') currentTime = Math.min(duration, currentTime + 0.5);
  if (e.code === 'Comma') { playing = false; currentTime = Math.max(0, currentTime - FDT); updPlayBtn(); }
  if (e.code === 'Period') { playing = false; currentTime = Math.min(duration, currentTime + FDT); updPlayBtn(); }
  if (e.code === 'KeyN') document.getElementById('btnSeed').click();
});

// ═══════════════════════════════════════════════════════════
//  WGSL Shader
// ═══════════════════════════════════════════════════════════
var WGSL = `
struct Uniforms {
  resolution: vec2f,
  time: f32,
  mouseX: f32,
  zoom: f32,
  density_scale: f32,
  quality: f32,
  brightness: f32,
  seed: f32,
  _p0: f32, _p1: f32, _p2: f32,
};
@group(0) @binding(0) var<uniform> u: Uniforms;
@group(0) @binding(1) var iChannel0: texture_2d<f32>;
@group(0) @binding(2) var samp: sampler;

fn glsl_mod(x: f32, y: f32) -> f32 { return x - y * floor(x / y); }

fn noise(x: vec3f) -> f32 {
  let p = floor(x);
  let f_raw = fract(x);
  let f = f_raw * f_raw * (3.0 - 2.0 * f_raw);
  let uv = (p.xy + vec2f(37.0, 17.0) * p.z) + f.xy;
  let rg = textureSampleLevel(iChannel0, samp, (uv + 0.5) / 256.0, 0.0).yx;
  return 1.0 - 0.82 * mix(rg.x, rg.y, f.z);
}

fn fbm(p: vec3f) -> f32 {
  return noise(p*0.06125)*0.5 + noise(p*0.125)*0.25 + noise(p*0.25)*0.125 + noise(p*0.4)*0.2;
}

fn Sphere(p: vec3f, r: f32) -> f32 { return length(p) - r; }

fn SpiralNoiseC(p_in: vec3f) -> f32 {
  let nudge = 4.0;
  let normalizer = 1.0 / sqrt(1.0 + nudge*nudge);
  var n = -glsl_mod(u.time*0.2, -2.0);
  var iter = 2.0;
  var p = p_in;
  for (var i = 0; i < 8; i++) {
    n += -abs(sin(p.y*iter) + cos(p.x*iter)) / iter;
    p = vec3f((p.x+p.y*nudge)*normalizer, (p.y-p.x*nudge)*normalizer, p.z);
    p = vec3f((p.x+p.z*nudge)*normalizer, p.y, (p.z-p.x*nudge)*normalizer);
    iter *= 1.733733;
  }
  return n;
}

fn VolumetricExplosion(p: vec3f) -> f32 {
  let so = vec3f(u.seed*100.0, u.seed*73.0, u.seed*37.0);
  var r = Sphere(p, 4.0);
  r += fbm((p + so) * 50.0);
  r += SpiralNoiseC(p.zxy*0.4132 + 333.0 + so*0.01) * 3.0;
  return r;
}

fn mapScene(p_in: vec3f) -> f32 {
  let a = u.mouseX*0.008*3.14159265 + u.time*0.1;
  let ca = cos(a); let sa = sin(a);
  let p = vec3f(ca*p_in.x + sa*p_in.z, p_in.y, -sa*p_in.x + ca*p_in.z);
  return VolumetricExplosion(p/0.5)*0.5;
}

fn computeColor(density: f32, radius: f32) -> vec3f {
  var result = mix(vec3f(1.0,0.9,0.8), vec3f(0.4,0.15,0.1), density);
  let colCenter = 12.0 * vec3f(0.8, 1.0, 1.0);
  let colEdge = 3.0 * vec3f(0.48, 0.53, 0.5);
  result *= mix(colCenter, colEdge, min((radius+0.05)/0.9, 1.15));
  return result;
}

fn RaySphereIntersect(org: vec3f, dir: vec3f, near: ptr<function,f32>, far: ptr<function,f32>) -> bool {
  let b = dot(dir, org);
  let c = dot(org, org) - 8.0;
  let delta = b*b - c;
  if (delta < 0.0) { return false; }
  let sq = sqrt(delta);
  *near = -b - sq; *far = -b + sq;
  return *far > 0.0;
}

@fragment
fn fs(@builtin(position) fragCoord: vec4f) -> @location(0) vec4f {
  let uv = fragCoord.xy / u.resolution;
  let rd = normalize(vec3f((fragCoord.xy - 0.5*u.resolution)/u.resolution.y, 1.0));
  let ro = vec3f(0.0, 0.0, -6.0 + u.zoom*1.6);
  var ld = 0.0; var td = 0.0; var w = 0.0;
  var d_outer = 1.0; var t = 0.0;
  let h = 0.1;
  var sum = vec4f(0.0);
  var min_dist = 0.0; var max_dist = 0.0;

  if (RaySphereIntersect(ro, rd, &min_dist, &max_dist)) {
    t = min_dist * step(t, min_dist);
    let maxIter = select(select(56, 86, u.quality > 0.5), 128, u.quality > 1.5);

    for (var i = 0; i < 128; i++) {
      if (i >= maxIter) { break; }
      let pos = ro + t*rd;
      if (td > 0.9 || d_outer < 0.12*t || t > 10.0 || sum.a > 0.99 || t > max_dist) { break; }

      var d = mapScene(pos);
      d = max(d, 0.03);

      let ldst = -pos;
      let lDist = max(length(ldst), 0.001);
      let lightColor = vec3f(1.0, 0.5, 0.25);
      sum = vec4f(sum.rgb + lightColor/exp(lDist*lDist*lDist*0.08)/8.0, sum.a);

      if (d < h) {
        ld = h - d;
        w = (1.0 - td) * ld;
        td += w + 1.0/200.0;
        var col = vec4f(computeColor(td, lDist), td);
        sum += sum.a * vec4f(sum.rgb, 0.0) * 0.5 / lDist;
        col = vec4f(col.rgb, col.a * 0.2);
        col = vec4f(col.rgb * col.a, col.a);
        sum = sum + col * (1.0 - sum.a);
      }

      td += 1.0/70.0;
      let uvd = vec2f(uv.x*280.0, uv.y*120.0);
      let dith = textureSampleLevel(iChannel0, samp, vec2f(uvd.y, -uvd.x+0.5*sin(4.0*u.time+uvd.y*4.0))/256.0, 0.0).r;
      let d_step = abs(d)*(0.8+0.08*dith);
      d_outer = d;
      t += max(d_step*0.08*max(min(length(ldst),d_step),2.0), 0.01);
    }

    sum *= 1.0/exp(ld*0.2) * 1.5 * u.density_scale;
    sum = vec4f(sum.xyz * u.brightness, sum.a);
    sum = clamp(sum, vec4f(0.0), vec4f(1.0));
    sum = vec4f(sum.xyz*sum.xyz*(3.0 - 2.0*sum.xyz), sum.a);
  }
  return vec4f(sum.xyz, 1.0);
}

struct VSOut { @builtin(position) pos: vec4f };
@vertex fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
  var p = array<vec2f,3>(vec2f(-1,-1), vec2f(3,-1), vec2f(-1,3));
  var o: VSOut; o.pos = vec4f(p[vi], 0, 1); return o;
}
`;

// ═══════════════════════════════════════════════════════════
//  Noise texture
// ═══════════════════════════════════════════════════════════
function makeNoiseTex() {
  var S = 256, data = new Uint8Array(S*S*4), s = 48271;
  for (var i = 0; i < S*S*4; i++) { s = (s*16807) % 2147483647; data[i] = (s>>>16)&0xFF; }
  return { data: data, size: S };
}

// ═══════════════════════════════════════════════════════════
//  WebGPU init
// ═══════════════════════════════════════════════════════════
(async function() { try {
  dbg('1: check gpu');
  if (!navigator.gpu) { dbg('NO GPU'); return; }
  dbg('2: adapter');
  var adapter = await navigator.gpu.requestAdapter();
  if (!adapter) { dbg('NO ADAPTER'); return; }
  dbg('3: device');
  var device = await adapter.requestDevice();
  dbg('4: shader');
  var format = navigator.gpu.getPreferredCanvasFormat();
  var shaderModule = device.createShaderModule({ code: WGSL });
  var info = await shaderModule.getCompilationInfo();
  for (var j = 0; j < info.messages.length; j++) {
    var m = info.messages[j];
    dbg('WGSL '+m.type+': '+m.message+' line:'+m.lineNum);
    if (m.type === 'error') return;
  }
  dbg('5: noise tex');
  var nd = makeNoiseTex();
  var noiseTexture = device.createTexture({ size:[nd.size,nd.size], format:'rgba8unorm', usage: GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST });
  device.queue.writeTexture({texture:noiseTexture}, nd.data, {bytesPerRow:nd.size*4}, [nd.size,nd.size]);
  var noiseSampler = device.createSampler({ magFilter:'linear', minFilter:'linear', addressModeU:'repeat', addressModeV:'repeat' });

  dbg('6: pipeline');
  var uniformBuf = device.createBuffer({ size:48, usage: GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST });
  var bgl = device.createBindGroupLayout({ entries:[
    {binding:0, visibility:GPUShaderStage.FRAGMENT, buffer:{type:'uniform'}},
    {binding:1, visibility:GPUShaderStage.FRAGMENT, texture:{sampleType:'float'}},
    {binding:2, visibility:GPUShaderStage.FRAGMENT, sampler:{type:'filtering'}},
  ]});
  var pipeline = device.createRenderPipeline({
    layout: device.createPipelineLayout({bindGroupLayouts:[bgl]}),
    vertex: {module:shaderModule, entryPoint:'vs'},
    fragment: {module:shaderModule, entryPoint:'fs', targets:[{format:format}]},
    primitive: {topology:'triangle-list'},
  });

  dbg('7: canvas');
  var ctx = cv.getContext('webgpu');
  ctx.configure({device:device, format:format, alphaMode:'opaque'});
  var bindGroup = device.createBindGroup({layout:bgl, entries:[
    {binding:0, resource:{buffer:uniformBuf}},
    {binding:1, resource:noiseTexture.createView()},
    {binding:2, resource:noiseSampler},
  ]});

  function resize() {
    var dpr = Math.min(window.devicePixelRatio, quality===0?1:quality===1?1.5:2);
    var rect = cv.getBoundingClientRect();
    var w = Math.floor(rect.width*dpr), h = Math.floor(rect.height*dpr);
    if (cv.width!==w||cv.height!==h) { cv.width=w; cv.height=h; document.getElementById('resLabel').textContent=w+'×'+h; }
  }
  new ResizeObserver(resize).observe(cv);
  resize();

  dbg('8: render loop — hiding debug');
  dbgEl.style.display = 'none';

  updPlayBtn();

  function frame(ts) { try {
    var dt = lastTs ? (ts-lastTs)/1000 : 0.016;
    lastTs = ts;
    if (playing && !scrubbing) { currentTime += dt*speed; if (currentTime>duration) currentTime=0; }
    frames++; fpsTime+=dt;
    if (fpsTime>=1) { document.getElementById('fpsLabel').textContent=Math.round(frames/fpsTime)+' FPS'; frames=0; fpsTime=0; }
    document.getElementById('timeNow').textContent = currentTime.toFixed(2);
    tlFill.style.width = (currentTime/duration*100)+'%';
    resize();

    var ud = new Float32Array(12);
    ud[0]=cv.width; ud[1]=cv.height; ud[2]=Math.max(0,currentTime); ud[3]=mouseX;
    ud[4]=zoom; ud[5]=density; ud[6]=quality; ud[7]=brightness; ud[8]=seed;
    device.queue.writeBuffer(uniformBuf, 0, ud);

    var encoder = device.createCommandEncoder();
    var pass = encoder.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(), loadOp:'clear', storeOp:'store', clearValue:{r:0,g:0,b:0,a:1}}]});
    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);
    pass.draw(3);
    pass.end();
    device.queue.submit([encoder.finish()]);
    requestAnimationFrame(frame);
  } catch(e) { dbg('FRAME: '+e.message+'\n'+e.stack); } }

  requestAnimationFrame(frame);
} catch(e) { dbg('INIT: '+e.message+'\n'+e.stack); } })();
</script>
</body>
</html>

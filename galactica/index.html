<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STELLA NOVA // From Ore to Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e1118;--border:rgba(150,200,255,0.06);--border-b:rgba(150,200,255,0.14);--blue:#96c8ff;--blue-dim:#5a8cc0;--yellow:#ffc832;--green:#64c864;--text-dim:#6878a0;--text-faint:#384060}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'JetBrains Mono',monospace}
#shell{display:flex;flex-direction:column;width:100%;height:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:36px;background:rgba(14,17,24,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;flex-shrink:0;z-index:100}
.topbar-l{display:flex;align-items:center;gap:1.5rem}
.sys-name{color:#e8ecf4;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:0.8rem;letter-spacing:0.12em;text-transform:uppercase}
.topbar-tabs{display:flex;align-items:center;gap:0;margin-left:0.5rem}
.tab{background:transparent;border:none;color:var(--text-faint);font-family:'JetBrains Mono',monospace;font-size:0.45rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;padding:10px 1rem;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--text-dim)}
.tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
.tab .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--text-faint);transition:all 0.2s}
.tab.active .dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.topbar-r{display:flex;gap:2rem;color:var(--text-dim);font-size:0.5rem}
.topbar-r strong{color:var(--blue-dim);font-weight:500}
#frames{flex:1;position:relative;overflow:hidden}
#frames iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--bg)}
@media(max-width:768px){.topbar{padding:0 0.8rem;height:34px}.topbar-r{display:none}.sys-name{font-size:0.55rem;letter-spacing:0.2em}.tab{padding:9px 0.7rem;font-size:0.4rem}}
</style>
</head>
<body>
<div id="shell">
  <div class="topbar">
    <div class="topbar-l">
      <span class="sys-name">Stella Nova</span>
      <div class="topbar-tabs">
        <button class="tab active" data-tab="home" onclick="switchTab('home')"><span class="dot"></span>Home</button>
        <button class="tab" data-tab="forge" onclick="switchTab('forge')"><span class="dot"></span>Planet Forge</button>
        <button class="tab" data-tab="crafting" onclick="switchTab('crafting')"><span class="dot"></span>Crafting</button>
        <button class="tab" data-tab="planner" onclick="switchTab('planner')"><span class="dot"></span>Station Planner</button>
        <button class="tab" data-tab="guide" onclick="switchTab('guide')"><span class="dot"></span>Station Guide</button>
        <button class="tab" data-tab="behaviors" onclick="switchTab('behaviors')"><span class="dot"></span>Behaviors</button>
        <button class="tab" data-tab="controls" onclick="switchTab('controls')"><span class="dot"></span>Controls</button>
        <button class="tab" data-tab="gravity" onclick="switchTab('gravity')"><span class="dot"></span>Gravity</button>
        <button class="tab" data-tab="selection" onclick="switchTab('selection')"><span class="dot"></span>Selection</button>
      </div>
    </div>
    <div class="topbar-r"><span id="clock">00:00:00</span></div>
  </div>
  <div id="frames"></div>
</div>
<script>
const PAGES = {
  home: 'home.html',
  forge: 'forge.html',
  crafting: 'crafting.html',
  planner: 'planner.html',
  guide: 'guide.html',
  behaviors: 'behaviors.html',
  controls: 'controls.html',
  gravity: 'gravity.html',
  selection: 'selection.html'
};

let activeTab = null;

function switchTab(id) {
  if (id === activeTab) return;
  // Update tab buttons
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === id)
  );
  // Destroy the old iframe entirely (stops all JS/rAF/timers)
  const container = document.getElementById('frames');
  container.innerHTML = '';
  // Create a fresh iframe for the new tab only
  const iframe = document.createElement('iframe');
  iframe.src = PAGES[id];
  container.appendChild(iframe);
  activeTab = id;
}

// Boot with the home tab
switchTab('home');

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toTimeString().slice(0, 8);
}, 1000);
</script>
</body>
</html>

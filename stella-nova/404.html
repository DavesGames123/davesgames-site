<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Stella Nova</title>
<script>
(function(){
  var BASE_PATH = '/stella-nova/';
  var path = window.location.pathname;
  if (path.indexOf(BASE_PATH) === 0) {
    var sub = path.slice(BASE_PATH.length).replace(/\/$/, '');
    if (sub) sessionStorage.setItem('STELLA_NOVA_TARGET', sub);
  }
  window.location.replace(BASE_PATH);
})();
</script>
</head><body></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cornell Box // Stella Nova · davesgames.io</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1118;--surface:#1c2436;--surface2:#243040;
  --border:rgba(150,200,255,0.07);--border-b:rgba(150,200,255,0.18);
  --blue:#96c8ff;--blue-dim:#5a8cc0;--blue-faint:rgba(150,200,255,0.05);
  --yellow:#ffc832;--green:#64c864;--red:#e05050;
  --text:#c8d0e0;--text-dim:#8090b0;--text-faint:#506080;--text-bright:#e8ecf4;
  --scan:rgba(0,0,0,0.06);--panel-w:288px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'JetBrains Mono',monospace;color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);mix-blend-mode:multiply}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.4))}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;height:40px;flex-shrink:0;background:rgba(14,17,24,0.94);border-bottom:1px solid var(--border-b);z-index:100}
.in-frame .topbar{display:none!important}
.sys-name{color:var(--text-bright);font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.1rem;letter-spacing:0.12em}
.topbar-l{display:flex;align-items:center;gap:1rem}
.sys-status{display:flex;align-items:center;gap:0.4rem;color:var(--green);font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase}
.sys-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2.2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.topbar-r{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint)}
.topbar-r strong{color:var(--blue-dim);font-weight:500}
#main{display:flex;flex:1;min-height:0;position:relative;z-index:1}
#panel{width:var(--panel-w);flex-shrink:0;background:rgba(9,12,20,0.96);border-right:1px solid var(--border-b);display:flex;flex-direction:column;overflow:hidden;user-select:none;z-index:10}
.p-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.p-body::-webkit-scrollbar{width:4px}.p-body::-webkit-scrollbar-thumb{background:var(--surface2)}
.p-section{padding:12px 14px 14px;border-bottom:1px solid var(--border)}
.p-sec-lbl{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue-dim);font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.p-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.seg{display:flex;gap:5px}
.seg.g4{display:grid;grid-template-columns:repeat(4,1fr)}
.seg button,.segq{flex:1;font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.04em;color:var(--text-dim);background:transparent;border:1px solid var(--border-b);padding:9px 4px;cursor:pointer;transition:all 0.14s;text-align:center;font-weight:500;-webkit-tap-highlight-color:transparent}
.seg button:hover{border-color:rgba(150,200,255,0.3);color:var(--text);background:var(--blue-faint)}
.seg button.on{background:rgba(150,200,255,0.12);border-color:rgba(150,200,255,0.45);color:var(--blue);font-weight:700}
.seg button.amber.on{background:rgba(255,200,50,0.12);border-color:rgba(255,200,50,0.45);color:var(--yellow)}
.obj-card{padding:8px 9px;background:rgba(150,200,255,0.02);border:1px solid var(--border);margin-bottom:6px}
.obj-card.sel{border-color:rgba(255,200,50,0.4);background:rgba(255,200,50,0.05)}
.obj-head{display:flex;align-items:center;gap:6px;margin-bottom:7px;cursor:pointer}
.obj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.2)}
.obj-name{flex:1;font-size:0.66rem;color:var(--text-bright);font-weight:600;letter-spacing:0.05em}
.obj-sel-tag{font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--yellow);opacity:0;transition:opacity .15s}
.obj-card.sel .obj-sel-tag{opacity:1}
.shapesel{width:100%;font-family:inherit;font-size:0.66rem;color:#e7edf4;background:#151b24;border:1px solid var(--border-b);border-radius:5px;padding:8px 9px;margin-bottom:6px;-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,#7b8694 50%),linear-gradient(135deg,#7b8694 50%,transparent 50%);background-position:calc(100% - 16px) 52%,calc(100% - 11px) 52%;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
.mag-row{display:flex;align-items:center;gap:8px}
.mag-row .lbl{font-size:0.58rem;color:var(--text-dim);width:42px;letter-spacing:0.06em;text-transform:uppercase}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:linear-gradient(to right,var(--blue-dim) 0%,var(--blue-dim) var(--pct,50%),rgba(150,200,255,0.14) var(--pct,50%));border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--bg);border:2px solid var(--blue-dim);cursor:pointer}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--bg);border:2px solid var(--blue-dim)}
.mag-row .val{min-width:30px;text-align:right;font-size:0.62rem;color:var(--blue);font-weight:600;font-variant-numeric:tabular-nums}
.hint{font-size:0.55rem;color:var(--text-faint);line-height:1.6;letter-spacing:0.03em;margin-top:7px}
.pbtn{width:100%;font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:1px solid var(--border-b);padding:9px;cursor:pointer;transition:all .15s;font-weight:600}
.pbtn:hover{border-color:var(--blue-dim);color:var(--blue);background:var(--blue-faint)}
#canvas-wrap{flex:1;position:relative;min-width:0;min-height:0;overflow:hidden;background:#000}
#canvas-wrap canvas{position:absolute;inset:0;display:block;width:100%;height:100%}
#wire{z-index:3;cursor:grab;touch-action:none}
#wire.dragging{cursor:grabbing}
#status-bar{height:22px;flex-shrink:0;background:rgba(14,17,24,0.94);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:12px;z-index:50;font-size:0.54rem;letter-spacing:0.09em;text-transform:uppercase;color:var(--text-faint);font-weight:500;overflow:hidden;white-space:nowrap}
#status-bar .sep{width:1px;height:10px;background:var(--border-b);flex-shrink:0}
#status-bar b{color:var(--blue-dim);font-weight:600}
#mob-btn{display:none;position:absolute;top:8px;left:8px;z-index:200;width:38px;height:38px;background:rgba(9,12,20,0.92);border:1px solid var(--border-b);color:var(--blue);font-size:1.1rem;cursor:pointer;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modenote{font-size:0.56rem;color:var(--text-faint);line-height:1.6;margin-top:7px;min-height:1em}
.modenote b{color:var(--yellow);font-weight:500}
#err{display:none;position:absolute;left:0;right:0;bottom:0;z-index:99;white-space:pre-wrap;background:#3a0d12;color:#ff9aa3;border-top:1px solid #ff5f6e;padding:10px 12px;font-size:11px}
@media(max-width:640px){
  :root{--panel-w:0px}
  #panel{position:absolute;top:0;left:0;bottom:0;width:270px;z-index:300;transform:translateX(-100%);transition:transform .25s ease}
  #panel.open{transform:translateX(0)}
  #mob-btn{display:flex}
}

/* --- 3ds-Max-style command panel --- */
.rollout{border-bottom:1px solid var(--border)}
.ro-head{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue);font-weight:600;padding:9px 14px;background:rgba(150,200,255,0.05);border-bottom:1px solid var(--border)}
.ro-body{padding:10px 14px 13px}
.ro-sub{font-size:0.54rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);margin:11px 0 6px;font-weight:600}
.ro-sub:first-child{margin-top:0}
.tree{display:flex;flex-direction:column;gap:1px;max-height:200px;overflow-y:auto}
.tree-row{display:flex;align-items:center;gap:7px;padding:6px 7px;cursor:pointer;border:1px solid transparent;border-radius:3px}
.tree-row:hover{background:rgba(150,200,255,0.06)}
.tree-row.sel{background:rgba(255,200,50,0.11);border-color:rgba(255,200,50,0.4)}
.tree-eye{width:15px;text-align:center;cursor:pointer;flex-shrink:0;font-size:0.72rem;color:var(--yellow)}
.tree-eye.off{color:var(--muted)}
.tree-ico{width:15px;text-align:center;flex-shrink:0;font-size:0.8rem}
.tree-name{flex:1;font-size:0.66rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-row.hidden .tree-name{font-style:italic;color:var(--muted)}
.tree-del{color:var(--muted);cursor:pointer;flex-shrink:0;font-size:0.7rem;opacity:0;padding:0 3px}
.tree-row:hover .tree-del{opacity:0.8}
.tree-del:hover{color:#e07a7a;opacity:1}
.cmd{border-bottom:1px solid var(--border)}
.cmd-tabs{display:flex}
.cmd-tabs button{flex:1;font-family:inherit;font-size:0.62rem;letter-spacing:0.05em;text-transform:uppercase;font-weight:600;color:var(--muted);background:rgba(150,200,255,0.03);border:none;border-bottom:2px solid transparent;padding:10px 4px;cursor:pointer}
.cmd-tabs button.on{color:var(--yellow);border-bottom-color:var(--yellow);background:rgba(255,200,50,0.07)}
.cmd-pane{padding:12px 14px 15px}
.create-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:4px}
.create-btn{display:flex;align-items:center;gap:7px;font-family:inherit;font-size:0.63rem;color:var(--text);background:transparent;border:1px solid var(--border);padding:9px 8px;cursor:pointer;text-align:left;transition:all .14s;border-radius:3px}
.create-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(150,200,255,0.06)}
.create-btn .g{font-size:0.9rem;width:15px;text-align:center}
.mod-head{font-size:0.78rem;color:#fff;font-weight:600;letter-spacing:0.03em;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.mod-empty{font-size:0.62rem;color:var(--muted);line-height:1.65}
.swatch{width:100%;height:28px;border:1px solid var(--border);border-radius:4px;background:none;cursor:pointer;padding:2px}
.fieldlbl{font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin:10px 0 4px;font-weight:600}
.shapesel{width:100%}
.txtinput{width:100%;font-family:inherit;font-size:0.72rem;background:rgba(150,200,255,0.06);border:1px solid var(--border);color:#fff;padding:7px 9px;border-radius:3px;letter-spacing:0.02em}
</style>
</head>
<body>
<script>if(window!==window.top)document.documentElement.classList.add("in-frame")</script>
<div class="topbar">
  <div class="topbar-l"><span class="sys-name">Stella Nova</span><span class="sys-status">Cornell Box Studio</span></div>
  <div class="topbar-r">SYS // <strong>PATH TRACER</strong></div>
</div>
<div id="main">
  <div id="panel"><div class="p-body">
    <div class="rollout"><div class="ro-head">Viewport</div><div class="ro-body">
      <div class="seg" id="modeSeg"><button onclick="APP.setMode('wire')">▫ Wire</button><button onclick="APP.setMode('shaded')">◐ Shaded</button><button class="on" onclick="APP.setMode('render')">◆ Render</button></div>
      <div class="seg" id="bkSeg" style="margin-top:5px"><button id="bGpu" class="on" onclick="APP.setBackend('gpu')">GPU</button><button id="bCpu" onclick="APP.setBackend('cpu')">CPU</button></div>
      <div class="modenote" id="modenote"></div>
    </div></div>
    <div class="rollout"><div class="ro-head">Scene Explorer</div><div class="ro-body" style="padding-top:7px"><div class="tree" id="tree"></div></div></div>
    <div class="cmd">
      <div class="cmd-tabs"><button id="tabCreate" onclick="APP.tab('create')">+ Create</button><button id="tabModify" class="on" onclick="APP.tab('modify')">✎ Modify</button></div>
      <div class="cmd-pane" id="paneCreate" style="display:none"><div class="ro-sub">Standard Primitives</div><div class="create-grid" id="createGeo"></div><div class="ro-sub">Lights</div><div class="create-grid" id="createLight"></div></div>
      <div class="cmd-pane" id="paneModify"><div id="modifyBody"></div></div>
    </div>
    <div class="rollout"><div class="ro-head">Camera &amp; Scene</div><div class="ro-body">
      <button class="pbtn" onclick="APP.resetView()">⟲ Reset View</button>
      <div class="ro-sub">Lighting Presets</div>
      <div class="seg"><button onclick="APP.preset('brand')">Brand</button><button onclick="APP.preset('classic')">Classic</button><button onclick="APP.preset('dim')">Dim</button></div>
    </div></div>
  </div></div>
  <div id="canvas-wrap">
    <button id="mob-btn" onclick="document.getElementById('panel').classList.toggle('open')">☰</button>
    <canvas id="gl"></canvas>
    <canvas id="cpu"></canvas>
    <canvas id="wire"></canvas>
    <div id="err"></div>
  </div>
</div>
<div id="status-bar">
  <span id="st-mode">WIREFRAME</span><span class="sep"></span>
  <span id="st-cam">az 90 · el 14 · d 2.0</span><span class="sep"></span>
  <span id="st-sel">sel: Center</span><span class="sep"></span>
  <span id="st-extra">--</span>
</div>
<script>
"use strict";
function showErr(e){ try{ var d=document.getElementById('err'); if(d){ d.style.display='block'; d.textContent='\u26a0 '+((e&&e.message)?e.message:e)+((e&&e.stack)?('\n'+e.stack.split('\n').slice(0,3).join('\n')):''); } }catch(_){ } }
window.onerror=function(m,s,l,c,err){ showErr(err||(m+' @'+l+':'+c)); };

// ==CORE START==
// SDF Cornell core (scalar, headless-testable). Hybrid: analytic walls + ray-marched objects.
// SDF primitives ported from Inigo Quilez (iquilezles.org, MIT). Tracer after RTOW (CC0).
var SCENE={
  light:18, lsize:0.33, lcol:[1.0,0.95,0.86],
  wl:[0.08,0.55,0.66], wr:[0.07,0.11,0.42], ww:[0.74,0.78,0.82],
  spheres:[
    {c:[-0.46,-0.52,-0.10], r:0.46, mat:0, shape:3, alb:[0.95,0.95,0.95], rx:0.3, ry:0.6, rz:0.1},
    {c:[ 0.04,-0.60, 0.30], r:0.42, mat:3, shape:0, alb:[1,1,1],          rx:0,   ry:0,   rz:0},
    {c:[ 0.54,-0.48,-0.30], r:0.48, mat:2, shape:2, alb:[0.92,0.92,0.96], rough:0, rx:0.2, ry:-0.4,rz:0.15}
  ],
  bounces:5
};
var CAM={az:90,el:14,R:2.45,fov:52,tx:0,ty:-0.10,tz:0};
var MSTEPS=44;
// shape: 0 sphere,1 box,2 roundbox,3 torus,4 cylinder,5 octahedron,6 capsule
// mat:   0 diffuse,2 mirror,3 glass,4 glossy

var gObj=0, gnx=0,gny=1,gnz=0;
function matMul3(A,B){ var C=new Array(9); for(var r=0;r<3;r++)for(var c=0;c<3;c++){ C[r*3+c]=A[r*3]*B[c]+A[r*3+1]*B[3+c]+A[r*3+2]*B[6+c]; } return C; }
function eulerM(rx,ry,rz){ var cx=Math.cos(rx),sx=Math.sin(rx),cy=Math.cos(ry),sy=Math.sin(ry),cz=Math.cos(rz),sz=Math.sin(rz);
  return [ cz*cy, cz*sy*sx - sz*cx, cz*sy*cx + sz*sx,
           sz*cy, sz*sy*sx + cz*cx, sz*sy*cx - cz*sx,
           -sy,   cy*sx,            cy*cx ]; }
function setObjMatrix(s,M){ s.m=M; s.mt=[M[0],M[3],M[6], M[1],M[4],M[7], M[2],M[5],M[8]]; } // mt = world->object (transpose)
function setupRot(){ for(var i=0;i<SCENE.spheres.length;i++){ var s=SCENE.spheres[i]; if(!s.m) setObjMatrix(s, eulerM(s.rx||0,s.ry||0,s.rz||0)); } }
setupRot();

function sdBox(x,y,z,bx,by,bz){ var qx=Math.abs(x)-bx,qy=Math.abs(y)-by,qz=Math.abs(z)-bz;
  var ox=qx>0?qx:0, oy=qy>0?qy:0, oz=qz>0?qz:0;
  return Math.sqrt(ox*ox+oy*oy+oz*oz)+Math.min(Math.max(qx,Math.max(qy,qz)),0); }
/* ---- 3D text: signed distance field (Felzenszwalb exact EDT) ---- */
var TEXTSDF={data:null,w:0,h:0,aspect:4,u8:null};
function _edt1d(f,d,v,z,n){ v[0]=0; z[0]=-1e20; z[1]=1e20; var k=0,q,s;
  for(q=1;q<n;q++){ s=((f[q]+q*q)-(f[v[k]]+v[k]*v[k]))/(2*q-2*v[k]);
    while(s<=z[k]){ k--; s=((f[q]+q*q)-(f[v[k]]+v[k]*v[k]))/(2*q-2*v[k]); }
    k++; v[k]=q; z[k]=s; z[k+1]=1e20; }
  for(q=0,k=0;q<n;q++){ while(z[k+1]<q)k++; var dd=q-v[k]; d[q]=dd*dd+f[v[k]]; } }
function _edt2d(grid,W,H){ var m=Math.max(W,H), f=new Float64Array(m), d=new Float64Array(m), v=new Int32Array(m+1), z=new Float64Array(m+1), x,y;
  for(x=0;x<W;x++){ for(y=0;y<H;y++)f[y]=grid[y*W+x]; _edt1d(f,d,v,z,H); for(y=0;y<H;y++)grid[y*W+x]=d[y]; }
  for(y=0;y<H;y++){ for(x=0;x<W;x++)f[x]=grid[y*W+x]; _edt1d(f,d,v,z,W); for(x=0;x<W;x++)grid[y*W+x]=d[x]; } }
function buildTextSDF(inside,W,H,aspect){ var INF=1e20, n=W*H, outer=new Float64Array(n), inner=new Float64Array(n), i;
  for(i=0;i<n;i++){ if(inside[i]){ outer[i]=INF; inner[i]=0; } else { outer[i]=0; inner[i]=INF; } }
  _edt2d(outer,W,H); _edt2d(inner,W,H);
  var data=new Float32Array(n), u8=new Uint8Array(n);
  for(i=0;i<n;i++){ var dpx=Math.sqrt(inner[i])-Math.sqrt(outer[i]), nrm=dpx*2/H; if(nrm>1)nrm=1; if(nrm<-1)nrm=-1; data[i]=nrm; u8[i]=Math.round((nrm*0.5+0.5)*255); }
  TEXTSDF={data:data,w:W,h:H,aspect:aspect,u8:u8}; return TEXTSDF; }
function sampleText(u,v){ var T=TEXTSDF; if(!T.data)return 1;
  var fx=u*(T.w-1), fy=v*(T.h-1); if(fx<0)fx=0; if(fx>T.w-1)fx=T.w-1; if(fy<0)fy=0; if(fy>T.h-1)fy=T.h-1;
  var x0=fx|0,y0=fy|0,x1=x0+1<T.w?x0+1:x0,y1=y0+1<T.h?y0+1:y0,tx=fx-x0,ty=fy-y0,d=T.data;
  var a=d[y0*T.w+x0],b=d[y0*T.w+x1],c=d[y1*T.w+x0],e=d[y1*T.w+x1];
  return (a*(1-tx)+b*tx)*(1-ty)+(c*(1-tx)+e*tx)*ty; }

function shapeSDF(sh,x,y,z,r){
  if(sh===0) return Math.sqrt(x*x+y*y+z*z)-r;
  if(sh===1) return sdBox(x,y,z,r*0.82,r*0.82,r*0.82);
  if(sh===2){ var b=r*0.70, rr=r*0.18; return sdBox(x,y,z,b-rr,b-rr,b-rr)-rr; }
  if(sh===3){ var ta=r*0.72, tb=r*0.30; var q=Math.sqrt(x*x+z*z)-ta; return Math.sqrt(q*q+y*y)-tb; }
  if(sh===4){ var rad=r*0.60,h=r*0.85; var dx=Math.sqrt(x*x+z*z)-rad, dy=Math.abs(y)-h;
    var ox=dx>0?dx:0, oy=dy>0?dy:0; return Math.min(Math.max(dx,dy),0)+Math.sqrt(ox*ox+oy*oy); }
  if(sh===5){ var s=r*1.15; return (Math.abs(x)+Math.abs(y)+Math.abs(z)-s)*0.57735027; }

    }
    if(typeof sel!=='number'||!SCENE.spheres[sel]){ var e=document.createElement('div'); e.className='mod-empty'; e.textContent='Nothing selected. Pick an item in the Scene Explorer above, or open the Create tab to add geometry or a light.'; host.appendChild(e); return; }
    var o=SCENE.spheres[sel];
    var hh=document.createElement('div'); hh.className='mod-head'; hh.innerHTML='<span class="tree-ico" style="color:'+(o.kind==='light'?'var(--yellow)':'var(--blue)')+'">'+ico(o)+'</span>'+o.name; host.appendChild(hh);
    host.appendChild(fld('Transform'));
    var gh=document.createElement('div'); gh.className='mod-empty'; gh.style.margin='0'; gh.innerHTML='Drag the on-screen gimbal \u2014 <b style="color:#ff5a5a">arrows</b> move, <b style="color:#5a9cff">rings</b> rotate, <b style="color:#64dd64">cubes</b> scale.'; host.appendChild(gh);
    if(o.kind==='geo'){
      host.appendChild(fld('Shape'));
      var ss=document.createElement('select'); ss.className='shapesel'; SHAPES.forEach(function(sh){ var op=document.createElement('option'); op.value=sh[1]; op.textContent=sh[0]; if(o.shape===sh[1])op.selected=true; ss.appendChild(op); }); ss.onchange=function(){ o.shape=+ss.value; rebuildUI(); if(mode==='render')resetRender(); }; host.appendChild(ss);
      host.appendChild(fld('Material'));
      var mg=document.createElement('div'); mg.className='seg g4'; MATS.forEach(function(m){ var b=document.createElement('button'); b.textContent=m[0]; if(o.mat===m[1])b.classList.add('on'); b.onclick=function(){ o.mat=m[1]; if(m[1]===4&&!(o.rough>0))o.rough=0.18; buildModify(); if(mode==='render')resetRender(); }; mg.appendChild(b); }); host.appendChild(mg);
      host.appendChild(fld('Color')); host.appendChild(colorRow(function(){return o.alb;},function(c){o.alb=c;}));
      if(o.mat===2||o.mat===4){ host.appendChild(fld('Roughness')); host.appendChild(slider(0,0.6,0.01,(o.rough||0),function(v){ o.rough=v; if(mode==='render')resetRender(); })); }
    } else if(o.kind==='text'){
      host.appendChild(fld('Text string'));
      var ti=document.createElement('input'); ti.type='text'; ti.className='txtinput'; ti.value=TEXTSTR; var tmo;
      ti.oninput=function(){ clearTimeout(tmo); tmo=setTimeout(function(){ genTextSDF(ti.value); shadeSig=''; if(mode==='render')resetRender(); }, 280); };
      host.appendChild(ti);
      host.appendChild(fld('Material'));
      var mgt=document.createElement('div'); mgt.className='seg g4'; MATS.forEach(function(m){ var b=document.createElement('button'); b.textContent=m[0]; if(o.mat===m[1])b.classList.add('on'); b.onclick=function(){ o.mat=m[1]; if(m[1]===4&&!(o.rough>0))o.rough=0.18; buildModify(); if(mode==='render')resetRender(); }; mgt.appendChild(b); }); host.appendChild(mgt);
      host.appendChild(fld('Color')); host.appendChild(colorRow(function(){return o.alb;},function(c){o.alb=c;}));
      if(o.mat===2||o.mat===4){ host.appendChild(fld('Roughness')); host.appendChild(slider(0,0.6,0.01,(o.rough||0),function(v){ o.rough=v; if(mode==='render')resetRender(); })); }
    } else {
      host.appendChild(fld('Intensity')); host.appendChild(slider(2,30,1,o.emisI,function(v){ o.emisI=v; syncLight(o); if(mode==='render')resetRender(); }));
      host.appendChild(fld('Color')); host.appendChild(colorRow(function(){return o.alb;},function(c){o.alb=c; syncLight(o);}));
    }
    host.appendChild(fld(o.kind==='light'?'Radius':'Size'));
    host.appendChild(slider(0.06,0.7,0.01,o.r,function(v){ o.r=v; if(mode==='render')resetRender(); }));
    host.appendChild(fld('Position   X \u00b7 Y \u00b7 Z'));
    [0,1,2].forEach(function(ai){ host.appendChild(slider(-0.95,0.95,0.01,o.c[ai],function(v){ o.c[ai]=v; if(mode==='render')resetRender(); })); });
    var del=document.createElement('button'); del.className='pbtn'; del.style.cssText='margin-top:11px;border-color:rgba(224,122,122,0.35);color:#e07a7a'; del.textContent='\u2715 Delete '+o.name; del.onclick=function(){ delObject(sel); }; host.appendChild(del);
  }
  function buildTree(){
    var t=document.getElementById('tree'); t.innerHTML='';
    function mkrow(o,i,isCeil){
      var r=document.createElement('div'); r.className='tree-row'+((isCeil?sel==='ceiling':sel===i)?' sel':'')+((!isCeil&&o.vis===false)?' hidden':'');
      var eye=document.createElement('span'); eye.className='tree-eye'+((!isCeil&&o.vis===false)?' off':''); eye.textContent=(!isCeil&&o.vis===false)?'\u25cb':'\u25c9';
      eye.onclick=function(e){ e.stopPropagation(); if(!isCeil) toggleVis(i); };
      var ic=document.createElement('span'); ic.className='tree-ico'; ic.style.color=isCeil?'var(--yellow)':(o.kind==='light'?'var(--yellow)':'var(--blue)'); ic.textContent=isCeil?'\u25c9':ico(o);
      var nm=document.createElement('span'); nm.className='tree-name'; nm.textContent=isCeil?'Ceiling Light':o.name;
      r.appendChild(eye); r.appendChild(ic); r.appendChild(nm);
      if(!isCeil){ var x=document.createElement('span'); x.className='tree-del'; x.textContent='\u2715'; x.onclick=function(e){ e.stopPropagation(); delObject(i); }; r.appendChild(x); }
      r.onclick=function(){ selectItem(isCeil?'ceiling':i); };
      return r;
    }
    t.appendChild(mkrow(null,-1,true));
    SCENE.spheres.forEach(function(o,i){ t.appendChild(mkrow(o,i,false)); });
  }
  function rebuildUI(){ buildTree(); buildModify(); paintMode(); }

  /* ---- public ---- */
  function setMode(m){ mode=m; if(m==='shaded') shadeSig=''; paintMode(); showCanvas(); if(m==='render') resetRender();
    note(m==='wire'?'Wireframe viewport. Drag to orbit \u00b7 scroll / pinch to zoom.':(m==='shaded'?'Solid shaded preview \u2014 real-time. Drag to orbit \u00b7 scroll to zoom.':'Path-traced render. Orbiting re-renders from the new angle.')); updateStatus(); }
  function setBackend(b){ if(b==='gpu'&&!gpuAvail)return; backend=b; paintBackend(); showCanvas(); if(mode==='render')resetRender(); }
  function setGizmo(g){ gizmo=g; if(typeof sel==='number') buildModify(); }
  function resetView(){ CAM.az=90; CAM.el=14; CAM.R=2.45; CAM.fov=52; CAM.tx=0; CAM.ty=-0.10; CAM.tz=0; if(mode==='render')resetRender(); }
  function preset(which){ if(which==='brand'){ SCENE.wl=[0.08,0.55,0.66]; SCENE.wr=[0.07,0.11,0.42]; SCENE.ww=[0.74,0.78,0.82]; SCENE.light=17; SCENE.lsize=0.33; } else if(which==='classic'){ SCENE.wl=[0.62,0.06,0.05]; SCENE.wr=[0.07,0.45,0.11]; SCENE.ww=[0.73,0.73,0.73]; SCENE.light=18; SCENE.lsize=0.33; }
    else { SCENE.wl=[0.10,0.40,0.18]; SCENE.wr=[0.45,0.10,0.30]; SCENE.ww=[0.42,0.40,0.38]; SCENE.light=9; SCENE.lsize=0.26; }
    rebuildUI(); if(mode==='render')resetRender(); }
  function decorateScene(){ SCENE.spheres.forEach(function(o){ if(o.vis===undefined)o.vis=true; if(!o.kind)o.kind=(o.mat===5?'light':'geo'); if(!o.name)o.name=autoName(o.kind==='light'?'Omni':(SHNAME[o.shape]||'Object')); }); }

  function init(){
    resize();
    cpu=makeCPU(cpuCv);
    try{ gpu=makeGPU(glCv); }catch(e){ gpu=null; }
    applyRes();
    if(gpu && !gpu.ok()) gpu=null;
    if(resizeTO){ clearTimeout(resizeTO); resizeTO=null; }
    gpuAvail=!!gpu; if(!gpuAvail) backend='cpu';
    genTextSDF(TEXTSTR);
    if(!SCENE.spheres.some(function(o){return o.shape===8;})){ var logo={name:'[ davesgames.io ]',kind:'text',shape:8,mat:0,alb:[0.11,0.17,0.45],c:[0,0.38,0.32],r:0.14,rx:0,ry:0,rz:0,vis:true}; setObjMatrix(logo,eulerM(0,0,0)); SCENE.spheres.push(logo); }
    decorateScene(); buildCreate(); tab('modify'); rebuildUI(); paintBackend(); showCanvas(); resetRender();
    note(gpuAvail?'Path-traced render. Drag to orbit \u00b7 scroll / pinch to zoom. Add objects from the Create tab.':'GPU unavailable \u2014 Render uses CPU. Drag to orbit. Add objects from the Create tab.');
    raf=requestAnimationFrame(loop);
  }
  return { init:init, setMode:setMode, setBackend:setBackend, setGizmo:setGizmo, resetView:resetView, preset:preset, tab:tab };
})();

try{ APP.init(); }catch(e){ showErr(e); }
</script>

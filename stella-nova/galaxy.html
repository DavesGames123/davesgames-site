<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Oxanium', monospace; color: #fff; }
  canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; cursor: crosshair; }

  .hud { position: fixed; top: 20px; left: 24px; z-index: 10; pointer-events: none; }
  .hud h1 { font-size: 11px; font-weight: 300; letter-spacing: 5px; color: rgba(255,255,255,0.18); text-transform: uppercase; }
  .stats { position: fixed; top: 20px; right: 24px; z-index: 10; pointer-events: none; font-size: 11px; color: rgba(255,255,255,0.15); text-align: right; font-weight: 300; line-height: 1.7; }

  .slider-wrap {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center; gap: 14px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
    padding: 10px 20px; flex-wrap: wrap; justify-content: center;
  }
  .slider-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); white-space: nowrap; user-select: none; }
  .slider-val { font-size: 10px; font-weight: 400; letter-spacing: 1px; color: rgba(255,140,60,0.5); min-width: 28px; text-align: right; user-select: none; }
  .sep { display: inline-block; width: 1px; height: 20px; background: rgba(255,255,255,0.08); margin: 0 6px; }

  input[type=range] { -webkit-appearance: none; appearance: none; width: 130px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #ff8830; border: 2px solid rgba(0,0,0,0.4); box-shadow: 0 0 10px rgba(255,120,40,0.3); }
  input[type=range]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #ff8830; border: 2px solid rgba(0,0,0,0.4); }

  .hint { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 10px; color: rgba(255,255,255,0.1); letter-spacing: 1.5px; pointer-events: none; text-transform: uppercase; transition: opacity 2s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><h1>Galaxy</h1></div>
<div class="stats"><div id="fps"></div><div id="res"></div><div id="starcount"></div></div>
<div class="hint" id="hint">click + drag to orbit · scroll to zoom</div>

<div class="slider-wrap">
  <span class="slider-label">Timescale</span>
  <input type="range" id="timescale" min="0" max="100" value="50">
  <span class="slider-val" id="tsVal">0.50×</span>
  <span class="sep"></span>
  <span class="slider-label">Stars</span>
  <input type="range" id="density" min="1000" max="20000" value="10000" step="500">
  <span class="slider-val" id="densityVal">10000</span>
  <span class="sep"></span>
  <span class="slider-label">Wind</span>
  <input type="range" id="spiral" min="0" max="200" value="70">
  <span class="slider-val" id="spiralVal">0.70</span>
  <span class="sep"></span>
  <span class="slider-label">Tilt</span>
  <input type="range" id="tilt" min="10" max="60" value="28">
  <span class="slider-val" id="tiltVal">2.8</span>
</div>

<script>
const CORE_VS = `#version 300 es
in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos,0,1); }`;

const CORE_FS = `#version 300 es
precision highp float;
uniform vec2  u_res;
uniform vec4  u_mouse;
uniform float u_zoom;
uniform float u_tilt;
out vec4 O;

void main(){
    vec2 fc = gl_FragCoord.xy;
    float rotAngle = 0.45 + u_mouse.x * 0.5;
    float tilt = max(1.2, u_tilt + u_mouse.y * 2.0);
    vec2 center = u_res * 0.5;
    vec2 p = (fc - center) / u_zoom;
    float cR = cos(rotAngle), sR = sin(rotAngle);

    // Disk glow (squashed)
    vec2 pd = p / vec2(1.0, tilt);
    pd = vec2(cR*pd.x - sR*pd.y, sR*pd.x + cR*pd.y);
    float dD = length(pd);

    // Bulge glow (nearly spherical, much larger)
    float bTilt = 1.0 + (tilt - 1.0) * 0.2;
    vec2 pb = p / vec2(1.0, bTilt);
    pb = vec2(cR*pb.x - sR*pb.y, sR*pb.x + cR*pb.y);
    float dB = length(pb);

    vec3 col = vec3(0.0);
    // Prominent warm bulge
    col += 8.0 / (dB + 0.6) * vec3(1.0, 0.86, 0.65);
    col += 500.0 / (dB*dB + 15.0) * vec3(1.0, 0.82, 0.58) * 0.08;
    col += 8000.0 / (dB*dB + 300.0) * vec3(1.0, 0.76, 0.50) * 0.03;
    col += 40000.0 / (dB*dB + 3000.0) * vec3(0.95, 0.70, 0.42) * 0.02;
    // Wide disk haze
    col += 30000.0 / (dD*dD + 8000.0) * vec3(0.9, 0.74, 0.55) * 0.01;
    col += 150000.0 / (dD*dD + 60000.0) * vec3(0.8, 0.66, 0.50) * 0.006;

    vec2 vuv = fc / u_res - 0.5;
    col *= 1.0 - dot(vuv, vuv) * 0.5;
    col = col / (1.0 + col * 0.1);
    O = vec4(col, 1.0);
}`;

const STAR_VS = `#version 300 es
precision highp float;

in float a_radius;
in float a_speed;
in float a_phase;
in float a_ecc;
in float a_radScatter;
in float a_spiralOff;
in float a_specHash;
in float a_briHash;
in float a_incl;
in float a_node;

uniform float u_time;
uniform float u_timescale;
uniform vec2  u_res;
uniform vec4  u_mouse;
uniform float u_zoom;
uniform float u_tilt;
uniform float u_spiral;

out vec3 v_color;  // spectral tint (NOT multiplied by brightness)
out float v_lum;   // brightness, separate channel

// ── Blackbody RGB from temperature (measured data) ──
// Then saturation-boosted 1.6× so tints survive additive blending.
vec3 blackbodyColor(float h){
    float t = h * h * h * h; // pow(h,4) — IMF skew

    vec3 c;
    if(t < 0.08){
        // M-class 2400–3700K
        c = mix(vec3(1.00, 0.54, 0.22), vec3(1.00, 0.65, 0.34), t / 0.08);
    } else if(t < 0.22){
        // K-class 3700–5200K
        c = mix(vec3(1.00, 0.65, 0.34), vec3(1.00, 0.82, 0.58), (t-0.08)/0.14);
    } else if(t < 0.42){
        // G-class 5200–6000K
        c = mix(vec3(1.00, 0.82, 0.58), vec3(1.00, 0.90, 0.72), (t-0.22)/0.20);
    } else if(t < 0.65){
        // F-class 6000–7500K
        c = mix(vec3(1.00, 0.90, 0.72), vec3(1.00, 0.97, 0.91), (t-0.42)/0.23);
    } else if(t < 0.85){
        // A-class 7500–10000K
        c = mix(vec3(1.00, 0.97, 0.91), vec3(0.88, 0.91, 1.00), (t-0.65)/0.20);
    } else {
        // B/O-class 10000–40000K
        c = mix(vec3(0.88, 0.91, 1.00), vec3(0.62, 0.72, 1.00), (t-0.85)/0.15);
    }

    // Boost saturation 1.6× so color tints remain visible
    float gray = dot(c, vec3(0.299, 0.587, 0.114));
    c = mix(vec3(gray), c, 1.6);
    return clamp(c, 0.0, 1.0);
}

float starLuminosity(float h, float scatter){
    float t = h * h * h * h;
    float lum;
    if(t < 0.08)       lum = 0.08 + t * 1.5;
    else if(t < 0.22)  lum = 0.20 + (t-0.08) * 2.5;
    else if(t < 0.42)  lum = 0.55 + (t-0.22) * 3.0;
    else if(t < 0.65)  lum = 1.15 + (t-0.42) * 5.0;
    else if(t < 0.85)  lum = 2.30 + (t-0.65) * 8.0;
    else                lum = 3.90 + (t-0.85) * 16.0;
    lum *= 0.4 + scatter * 1.2;
    return lum;
}

void main(){
    float time = u_time * u_timescale;
    float tOrb = time * a_speed + a_phase + u_spiral * a_spiralOff;
    float r = a_radius * a_radScatter * (1.0 + a_ecc * cos(tOrb * 0.5));

    float ox = cos(tOrb) * r, oy = sin(tOrb) * r;
    float ci = cos(a_incl), si = sin(a_incl);
    float cn = cos(a_node), sn = sin(a_node);
    float ix = ox, iy = oy * ci, iz = oy * si;
    float gx = cn*ix - sn*iy, gy = sn*ix + cn*iy, gz = iz;

    float tilt = max(1.2, u_tilt + u_mouse.y * 2.0);
    float rotAngle = 0.45 + u_mouse.x * 0.5;
    float cR = cos(rotAngle), sR = sin(rotAngle);
    float rx = cR*gx - sR*gy, ry = sR*gx + cR*gy;

    vec2 screen = vec2(rx, ry / tilt + gz);
    screen *= u_zoom;
    vec2 ndc = (screen + u_res * 0.5) / u_res * 2.0 - 1.0;

    float lum = starLuminosity(a_specHash, a_briHash);

    // Color and brightness are SEPARATE — color stays pure
    v_color = blackbodyColor(a_specHash);
    v_lum = lum;

    float sz = (0.4 + lum * 0.8) * u_zoom;
    sz = clamp(sz, 0.4, 6.0);
    gl_PointSize = sz;

    gl_Position = vec4(ndc, 0.0, 1.0);
}`;

const STAR_FS = `#version 300 es
precision highp float;
in vec3 v_color;
in float v_lum;
out vec4 O;

void main(){
    vec2 pc = gl_PointCoord * 2.0 - 1.0;
    float d2 = dot(pc, pc);

    // Point-spread: core + bloom + haze
    float core  = smoothstep(0.3, 0.0, d2) * 1.3;
    float bloom = exp(-d2 * 3.5) * 0.5;
    float haze  = exp(-d2 * 1.2) * 0.12;
    float shape = core + bloom + haze;

    // Brightness from luminosity, applied to shape
    float intensity = shape * v_lum;

    // Only the tiniest white-hot core for the BRIGHTEST stars
    // This keeps colors visible — no white washout
    float whiteBlend = smoothstep(0.06, 0.0, d2) * 0.12 * clamp(v_lum - 2.0, 0.0, 1.0);
    vec3 col = mix(v_color, vec3(1.0), whiteBlend);

    // Apply intensity to color
    col *= intensity;

    float alpha = min(intensity * 0.75, 1.0);
    O = vec4(col, alpha);
}`;

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, powerPreference:'high-performance' });
if (!gl) { document.body.innerHTML='<h1 style="color:red;padding:2em">WebGL 2 required</h1>'; throw ''; }

function makeProgram(vsSrc, fsSrc) {
  function compile(src,type) { const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s)); return s; }
  const p=gl.createProgram(); gl.attachShader(p,compile(vsSrc,gl.VERTEX_SHADER)); gl.attachShader(p,compile(fsSrc,gl.FRAGMENT_SHADER)); gl.linkProgram(p); if(!gl.getProgramParameter(p,gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p)); return p;
}

const coreProg=makeProgram(CORE_VS,CORE_FS), starProg=makeProgram(STAR_VS,STAR_FS);

const quadBuf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const coreU={}; ['u_res','u_mouse','u_zoom','u_tilt'].forEach(n=>coreU[n]=gl.getUniformLocation(coreProg,n));
const coreAttrPos=gl.getAttribLocation(coreProg,'a_pos');

const starU={}; ['u_time','u_timescale','u_res','u_mouse','u_zoom','u_tilt','u_spiral'].forEach(n=>starU[n]=gl.getUniformLocation(starProg,n));
const ATTRS=['a_radius','a_speed','a_phase','a_ecc','a_radScatter','a_spiralOff','a_specHash','a_briHash','a_incl','a_node'];
const starAttr={}; ATTRS.forEach(n=>starAttr[n]=gl.getAttribLocation(starProg,n));

function hash(n){return((Math.sin(n)*43758.5453123)%1+1)%1}
function gaussRand(s1,s2){const u1=Math.max(hash(s1),0.0001),u2=hash(s2);return Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2)}

let starVAO=null, starBuf=null, starCount=0;

function generateStars(count,numArms){
  const STRIDE=10, data=new Float32Array(count*STRIDE);
  const TAU=Math.PI*2, PI=Math.PI;
  const bulgeCount=Math.floor(count*0.25);

  for(let i=0;i<count;i++){
    const seed=i*7.31+0.5;
    const h0=hash(seed),h1=hash(seed+41),h2=hash(seed+73),h3=hash(seed+109);
    const h4=hash(seed+157),h5=hash(seed+199),h6=hash(seed+241),h7=hash(seed+283);
    const h8=hash(seed+317),h9=hash(seed+359);

    let radius,speed,phase,ecc,radScatter,spiralOff,specHash,briHash,incl,node;

    if(i<bulgeCount){
      // ── BULGE: larger radius range, old red/orange population ──
      const rNorm=-0.7*Math.log(1.0-h0*0.97);
      radius=6+rNorm*65;  // bigger bulge
      speed=(0.3+h1*0.7)/Math.pow(radius/6,0.8);
      phase=h2*TAU;
      ecc=h3*0.55;
      radScatter=0.5+h4*1.0;
      spiralOff=0.0;
      specHash=h5*0.50; // very red: max t = 0.5^4 = 0.0625 → deep M-class
      briHash=h7;
      incl=(0.3+Math.abs(gaussRand(seed+401,seed+433))*0.35)*PI*0.5;
      incl=Math.min(incl,PI*0.48);
      if(h8<0.5) incl=-incl;
      node=h9*TAU;
    } else {
      const rNorm=-1.2*Math.log(1.0-h0*0.985);
      radius=18+rNorm*85;
      speed=1.0/Math.pow(radius/18,1.15);
      const armIdx=Math.floor(h6*numArms);
      phase=(armIdx/numArms)*TAU+gaussRand(seed+331,seed+367)*(0.45+rNorm*0.25);
      spiralOff=rNorm*1.0+(h5-0.5)*0.5;
      ecc=h2*0.35;
      radScatter=0.55+h3*0.9;
      specHash=Math.min(h4+Math.min(rNorm*0.04,0.12),1.0);
      briHash=h7;
      incl=gaussRand(seed+401,seed+433)*(0.02+0.04/(1.0+rNorm*0.5))*PI*0.5;
      node=h9*TAU;
    }

    const off=i*STRIDE;
    data[off]=radius;data[off+1]=speed;data[off+2]=phase;data[off+3]=ecc;
    data[off+4]=radScatter;data[off+5]=spiralOff;data[off+6]=specHash;
    data[off+7]=briHash;data[off+8]=incl;data[off+9]=node;
  }

  if(!starBuf) starBuf=gl.createBuffer();
  if(!starVAO) starVAO=gl.createVertexArray();
  gl.bindVertexArray(starVAO);
  gl.bindBuffer(gl.ARRAY_BUFFER,starBuf);
  gl.bufferData(gl.ARRAY_BUFFER,data,gl.STATIC_DRAW);
  const BYTES=STRIDE*4;
  ATTRS.forEach((name,idx)=>{const loc=starAttr[name];if(loc<0)return;gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,1,gl.FLOAT,false,BYTES,idx*4);});
  gl.bindVertexArray(null);
  starCount=count;
  document.getElementById('starcount').textContent=count.toLocaleString()+' stars';
}

let dragX=0,dragY=0,dragging=false,lmx=0,lmy=0;
canvas.addEventListener('mousedown',e=>{dragging=true;lmx=e.clientX;lmy=e.clientY});
window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('mousemove',e=>{if(!dragging)return;dragX+=(e.clientX-lmx)*0.006;dragY+=(e.clientY-lmy)*0.006;lmx=e.clientX;lmy=e.clientY;document.getElementById('hint').style.opacity='0'});
canvas.addEventListener('touchstart',e=>{dragging=true;const t=e.touches[0];lmx=t.clientX;lmy=t.clientY},{passive:true});
window.addEventListener('touchend',()=>dragging=false);
window.addEventListener('touchmove',e=>{if(!dragging)return;const t=e.touches[0];dragX+=(t.clientX-lmx)*0.006;dragY+=(t.clientY-lmy)*0.006;lmx=t.clientX;lmy=t.clientY},{passive:true});

let zoom=1.0;
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom*=e.deltaY>0?0.92:1.08;zoom=Math.max(0.05,Math.min(30,zoom))},{passive:false});

function resize(){const dpr=Math.min(window.devicePixelRatio||1,2);canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;gl.viewport(0,0,canvas.width,canvas.height);document.getElementById('res').textContent=canvas.width+'×'+canvas.height}
window.addEventListener('resize',resize);resize();

let timescale=0.5,density=10000,spiral=0.7,tilt=2.8;
const arms=Math.floor(Math.random()*4)+2;
const TIME_OFFSET=500+Math.random()*800;
let needsRegen=false;

function bind(id,valId,cb){const s=document.getElementById(id),l=document.getElementById(valId);s.addEventListener('input',()=>cb(s,l))}
bind('timescale','tsVal',(s,l)=>{timescale=parseInt(s.value)/100;l.textContent=timescale.toFixed(2)+'×'});
bind('density','densityVal',(s,l)=>{density=parseInt(s.value);l.textContent=density;needsRegen=true});
bind('spiral','spiralVal',(s,l)=>{spiral=parseInt(s.value)/100;l.textContent=spiral.toFixed(2)});
bind('tilt','tiltVal',(s,l)=>{tilt=parseInt(s.value)/10;l.textContent=tilt.toFixed(1)});

generateStars(density,arms);

let frames=0,lastT=performance.now();const t0=performance.now();

function frame(){
  const now=performance.now(),time=(now-t0)/1000+TIME_OFFSET;
  frames++;if(now-lastT>500){document.getElementById('fps').textContent=Math.round(frames/((now-lastT)/1000))+' fps';frames=0;lastT=now}
  if(needsRegen){generateStars(density,arms);needsRegen=false}

  const w=canvas.width,h=canvas.height;

  gl.disable(gl.BLEND);
  gl.useProgram(coreProg);
  gl.uniform2f(coreU.u_res,w,h);gl.uniform4f(coreU.u_mouse,dragX,dragY,0,0);
  gl.uniform1f(coreU.u_zoom,zoom);gl.uniform1f(coreU.u_tilt,tilt);
  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
  gl.enableVertexAttribArray(coreAttrPos);
  gl.vertexAttribPointer(coreAttrPos,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  gl.disableVertexAttribArray(coreAttrPos);

  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
  gl.useProgram(starProg);
  gl.uniform1f(starU.u_time,time);gl.uniform1f(starU.u_timescale,timescale);
  gl.uniform2f(starU.u_res,w,h);gl.uniform4f(starU.u_mouse,dragX,dragY,0,0);
  gl.uniform1f(starU.u_zoom,zoom);gl.uniform1f(starU.u_tilt,tilt);
  gl.uniform1f(starU.u_spiral,spiral);
  gl.bindVertexArray(starVAO);
  gl.drawArrays(gl.POINTS,0,starCount);
  gl.bindVertexArray(null);
  gl.disable(gl.BLEND);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stations // Stella Nova</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d14;--bg2:#0e1320;--bg3:#121828;
  --surface:#1c2436;--surface2:#243040;
  --border:rgba(150,200,255,0.06);--border-b:rgba(150,200,255,0.14);
  --blue:#96c8ff;--blue-dim:#5a8cc0;--blue-faint:rgba(150,200,255,0.04);
  --yellow:#ffc832;--yellow-dim:#b8901e;--yellow-faint:rgba(255,200,50,0.04);
  --green:#64c864;--red:#ff5050;--cyan:#4ad8e0;--orange:#ff8844;--magenta:#c878d8;
  --text:#c8d0e0;--text-dim:#6878a0;--text-faint:#384060;--text-bright:#e8ecf4;
  --scan:rgba(0,0,0,0.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'JetBrains Mono',monospace;color:var(--text);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);mix-blend-mode:multiply}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.45))}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(150,200,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(150,200,255,0.015) 1px,transparent 1px),linear-gradient(rgba(150,200,255,0.005) 1px,transparent 1px),linear-gradient(90deg,rgba(150,200,255,0.005) 1px,transparent 1px);background-size:300px 300px,300px 300px,50px 50px,50px 50px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

#app{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column}

.topbar{display:flex;align-items:center;padding:0 16px;height:42px;background:rgba(10,13,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;gap:16px}
.sys-name{color:var(--blue);font-weight:700;font-size:14px;letter-spacing:0.3em;text-shadow:0 0 8px rgba(150,200,255,0.4)}
.status-pill{display:flex;align-items:center;gap:6px;color:var(--green);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;text-shadow:0 0 6px rgba(100,200,100,0.5)}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.tb-readouts{margin-left:auto;display:flex;gap:22px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);align-items:center}
.tb-readouts strong{color:var(--blue-dim);font-weight:600}
.in-frame .topbar{display:none!important}

.scn-bar{display:flex;align-items:stretch;padding:8px 10px;height:74px;background:rgba(10,13,20,0.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;overflow-x:auto;overflow-y:hidden}
.scn-card{display:flex;align-items:center;gap:11px;background:transparent;border:1px solid var(--border-b);color:var(--text-dim);font-family:inherit;padding:8px 14px;cursor:pointer;border-radius:5px;transition:all 0.18s;white-space:nowrap;flex-shrink:0;min-width:140px}
.scn-card:hover{border-color:color-mix(in srgb,var(--ac,var(--blue)) 50%,transparent);color:var(--text)}
.scn-card.active{border-color:var(--ac,var(--yellow));background:color-mix(in srgb,var(--ac,var(--yellow)) 6%,transparent);color:var(--ac,var(--yellow));box-shadow:0 0 14px color-mix(in srgb,var(--ac,var(--yellow)) 15%,transparent),inset 0 0 12px color-mix(in srgb,var(--ac,var(--yellow)) 4%,transparent)}
.scn-card .scn-ico{font-size:22px;line-height:1;color:var(--ac,var(--blue))}
.scn-card.active .scn-ico{text-shadow:0 0 10px var(--ac)}
.scn-card .scn-meta{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.scn-card .scn-num{font-size:9px;letter-spacing:0.18em;color:var(--text-faint);text-transform:uppercase}
.scn-card .scn-name{font-size:13px;font-weight:600;letter-spacing:0.04em}
.scn-card.active .scn-num{color:color-mix(in srgb,var(--ac,var(--yellow)) 65%,var(--text-faint))}

.ctrl-bar{display:flex;align-items:center;padding:0 12px;height:40px;background:rgba(10,13,20,0.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;overflow-x:auto}
.ctrl-label{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);white-space:nowrap}
.ctrl-btn{background:transparent;border:1px solid var(--border-b);color:var(--text-dim);font-family:inherit;font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:all 0.15s;border-radius:3px}
.ctrl-btn:hover{border-color:var(--blue);color:var(--blue)}
.ctrl-btn.active{color:var(--yellow);border-color:var(--yellow);background:rgba(255,200,50,0.06);box-shadow:0 0 10px rgba(255,200,50,0.2)}
.ctrl-btn.warn{color:var(--red);border-color:rgba(255,80,80,0.3)}
.ctrl-btn.warn:hover{border-color:var(--red);box-shadow:0 0 10px rgba(255,80,80,0.25)}
.ctrl-sep{width:1px;height:22px;background:var(--border-b);flex-shrink:0}
.ctrl-info{margin-left:auto;font-size:11px;color:var(--text-faint);letter-spacing:0.06em;white-space:nowrap}

.main{flex:1;display:flex;overflow:hidden;min-height:0}
.canvas-area{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,#0c1018 0%,#070a10 100%);min-width:0}
#cv{display:block;cursor:crosshair;touch-action:none}

.hint-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);max-width:calc(100% - 24px);background:rgba(10,13,20,0.94);border:1px solid var(--border-b);border-left:3px solid var(--ac,var(--yellow));padding:9px 16px;font-size:12.5px;color:var(--text);backdrop-filter:blur(8px);border-radius:0 4px 4px 0;letter-spacing:0.02em;line-height:1.5;pointer-events:none;text-align:center;z-index:5;box-shadow:0 0 16px color-mix(in srgb,var(--ac,var(--yellow)) 18%,transparent)}
.hint-bar strong{color:var(--ac,var(--yellow));font-weight:600;text-shadow:0 0 8px var(--ac,var(--yellow))}
.hint-bar code{font-family:inherit;background:rgba(150,200,255,0.10);padding:1px 6px;border-radius:2px;color:var(--blue);font-size:11.5px}

.sel-bar{position:absolute;bottom:12px;left:12px;background:rgba(10,13,20,0.94);border:1px solid var(--border-b);padding:7px 14px;font-size:12px;color:var(--text-dim);backdrop-filter:blur(8px);border-radius:4px;letter-spacing:0.04em;pointer-events:none;z-index:5}
.sel-bar strong{color:var(--blue);font-weight:600;text-shadow:0 0 6px currentColor}
.sel-bar.has-sel{border-color:color-mix(in srgb,var(--ac,var(--yellow)) 40%,var(--border-b));color:var(--text);box-shadow:0 0 14px color-mix(in srgb,var(--ac,var(--yellow)) 18%,transparent)}

.toast{position:absolute;top:62px;left:50%;transform:translateX(-50%) translateY(-6px);background:rgba(255,80,80,0.95);color:#fff;padding:7px 16px;font-size:12px;letter-spacing:0.06em;border-radius:3px;backdrop-filter:blur(8px);pointer-events:none;z-index:6;opacity:0;transition:all 0.35s ease;font-weight:600;box-shadow:0 0 18px rgba(255,80,80,0.45)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.info{background:rgba(74,144,208,0.95);box-shadow:0 0 18px rgba(74,144,208,0.45)}
.toast.win{background:rgba(100,200,100,0.95);box-shadow:0 0 18px rgba(100,200,100,0.45)}

/* Module palette overlay (placement scenario) */
.palette{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:5px;background:rgba(10,13,20,0.94);border:1px solid var(--border-b);padding:8px;border-radius:5px;backdrop-filter:blur(8px);z-index:5;box-shadow:0 0 14px rgba(150,200,255,0.08)}
.palette-title{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);text-align:center;padding-bottom:4px;border-bottom:1px solid var(--border)}
.pal-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border-b);color:var(--text-dim);font-family:inherit;font-size:10.5px;letter-spacing:0.06em;padding:5px 9px;cursor:pointer;border-radius:3px;transition:all 0.15s;min-width:140px}
.pal-btn:hover{border-color:var(--pc,var(--blue));color:var(--text)}
.pal-btn.active{border-color:var(--pc);color:var(--pc);background:color-mix(in srgb,var(--pc) 8%,transparent);box-shadow:0 0 10px color-mix(in srgb,var(--pc) 20%,transparent)}
.pal-glyph{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:10px;border:1px solid var(--pc);color:var(--pc);border-radius:2px;flex-shrink:0}
.pal-btn.active .pal-glyph{background:color-mix(in srgb,var(--pc) 25%,transparent)}
.pal-tag{margin-left:auto;font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint)}
.pal-btn.active .pal-tag{color:var(--pc);opacity:0.7}

/* Task toggle overlay (crew scenario) */
.tasks{position:absolute;top:62px;right:12px;background:rgba(10,13,20,0.94);border:1px solid var(--border-b);padding:10px;border-radius:5px;backdrop-filter:blur(8px);z-index:5;box-shadow:0 0 14px rgba(150,200,255,0.08);max-width:200px}
.tasks-title{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;text-align:center}
.task-row{display:flex;align-items:center;gap:7px;padding:4px 6px;cursor:pointer;border-radius:3px;transition:all 0.15s}
.task-row:hover{background:rgba(150,200,255,0.04)}
.task-row.on{color:var(--tc)}
.task-pip{width:11px;height:11px;border:1.5px solid var(--tc,var(--text-faint));border-radius:2px;background:transparent;flex-shrink:0;transition:all 0.15s}
.task-row.on .task-pip{background:var(--tc);box-shadow:0 0 6px var(--tc)}
.task-name{font-size:10.5px;letter-spacing:0.06em}
.task-count{margin-left:auto;font-size:9.5px;color:var(--text-faint);font-weight:600}
.task-row.on .task-count{color:var(--tc)}

.sidebar-r{width:280px;min-width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;background:rgba(10,13,20,0.55);flex-shrink:0}
.panel{padding:12px 16px;border-bottom:1px solid var(--border)}
.panel-title{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel-title::before{content:'';width:6px;height:6px;background:var(--ac,var(--blue));border-radius:50%;flex-shrink:0;box-shadow:0 0 8px var(--ac,var(--blue))}
.scn-headline{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text-bright);line-height:1.1;margin-bottom:8px}
.scn-headline em{font-style:italic;color:var(--ac,var(--yellow));text-shadow:0 0 12px var(--ac,var(--yellow))}
.scn-desc{font-size:12.5px;color:var(--text-dim);line-height:1.7}
.scn-desc strong{color:var(--text)}
.notes-list{list-style:none;padding:0;margin:0}
.notes-list li{font-size:12px;color:var(--text-dim);line-height:1.65;padding:5px 0 5px 16px;position:relative}
.notes-list li::before{content:'→';position:absolute;left:0;color:var(--ac,var(--blue-dim));font-weight:600}
.notes-list code{font-family:inherit;background:rgba(150,200,255,0.10);padding:0 5px;border-radius:2px;color:var(--blue);font-size:11px}
.ref-row{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--text-dim);padding:3px 0}
.ref-glyph{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--rc);color:var(--rc);font-weight:bold;font-size:10.5px;border-radius:3px;box-shadow:0 0 5px color-mix(in srgb,var(--rc) 25%,transparent) inset}
.ref-row .ref-tag{margin-left:auto;font-size:10px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase}

.fab{display:none;position:fixed;bottom:14px;right:14px;z-index:35;padding:11px 16px;background:rgba(10,13,20,0.96);border:1px solid var(--border-b);color:var(--text);font-family:inherit;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;border-radius:4px;backdrop-filter:blur(8px);cursor:pointer;transition:all 0.18s}
.fab:active{transform:scale(0.96)}
.fab.open{color:var(--yellow);border-color:var(--yellow);background:rgba(255,200,50,0.1);box-shadow:0 0 12px rgba(255,200,50,0.3)}
.drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;opacity:0;pointer-events:none;transition:opacity 0.2s}
.drawer-backdrop.show{opacity:1;pointer-events:auto;display:block}

@media(max-width:980px){
  .sidebar-r{position:fixed;top:156px;bottom:0;right:0;width:88vw;max-width:340px;z-index:200;transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 32px rgba(0,0,0,0.65);background:rgba(8,11,18,0.98);transform:translateX(105%)}
  .sidebar-r.open{transform:translateX(0)}
  .canvas-area{width:100%}
  .fab{display:block}
  .tb-readouts{display:none}
}
@media(max-width:600px){
  .topbar{padding:0 10px;height:38px}
  .sys-name{font-size:12px;letter-spacing:0.18em}
  .status-pill{font-size:10px}
  .scn-bar{height:64px;padding:6px 8px;gap:6px}
  .scn-card{padding:6px 11px;min-width:118px;gap:9px}
  .scn-card .scn-ico{font-size:18px}
  .scn-card .scn-num{font-size:8px}
  .scn-card .scn-name{font-size:11.5px}
  .ctrl-bar{height:36px;padding:0 8px;gap:5px}
  .ctrl-btn{padding:4px 9px;font-size:10.5px}
  .ctrl-label{font-size:10px}
  .ctrl-info{display:none}
  .sidebar-r{top:138px}
  .hint-bar{font-size:11.5px;padding:7px 13px;border-left-width:2px}
  .sel-bar{font-size:10.5px;padding:5px 10px}
  .palette{padding:6px;bottom:8px;right:8px}
  .pal-btn{min-width:110px;font-size:10px;padding:4px 7px}
  .pal-glyph{width:15px;height:15px;font-size:9px}
  .tasks{right:8px;padding:8px;max-width:140px}
  .fab{padding:9px 13px;font-size:10.5px;bottom:12px;right:12px}
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="app">
  <div class="topbar">
    <span class="sys-name">STATIONS</span>
    <div class="status-pill">LIVE PRACTICE</div>
    <div class="tb-readouts">
      <span>SCENARIO <strong id="hud-scn">01/06</strong></span>
      <span>MODULES <strong id="hud-mods">0</strong></span>
      <span>ENCLOSED <strong id="hud-enc">0</strong></span>
    </div>
  </div>

  <div class="scn-bar" id="scnBar"></div>

  <div class="ctrl-bar">
    <span class="ctrl-label">CTRL</span>
    <button class="ctrl-btn warn" onclick="resetScenario()">↻ RESET</button>
    <button class="ctrl-btn" id="autoBtn" onclick="toggleAuto()">▶ AUTO-BUILD</button>
    <button class="ctrl-btn" id="rotBtn" style="display:none" onclick="rotateFoundry()">⤿ ROTATE OUTPUT</button>
    <span class="ctrl-info">CLICK CELLS TO PLACE · CLICK MODULES TO REMOVE</span>
  </div>

  <div class="main">
    <div class="canvas-area" id="canvasArea">
      <canvas id="cv"></canvas>
      <div class="hint-bar" id="hint" style="--ac:var(--yellow)"></div>
      <div class="sel-bar" id="sel">—</div>
      <div class="toast" id="toast"></div>
      <div class="palette" id="palette" style="display:none"></div>
      <div class="tasks" id="taskBox" style="display:none"></div>
    </div>
    <aside class="sidebar-r" id="sideR">
      <div class="panel">
        <div class="scn-headline" id="scnHead"></div>
        <div class="scn-desc" id="scnDesc"></div>
      </div>
      <div class="panel">
        <div class="panel-title">How it works</div>
        <ul class="notes-list" id="scnNotes"></ul>
      </div>
      <div class="panel" id="refPanel" style="border-bottom:none">
        <div class="panel-title" id="refTitle">Reference</div>
        <div id="refBody"></div>
      </div>
    </aside>
  </div>
</div>

<button class="fab" id="fab" onclick="toggleDrawer()">Info ≡</button>
<div class="drawer-backdrop" id="bd" onclick="closeDrawer()"></div>

<script>
/* ════════════════════════════════════════════════════════════════════
   MODULE LIBRARY
   ──────────────────────────────────────────────────────────────────── */
const MOD = {
  C: {name:'Core',        color:'#c878d8', placement:'auto',     tag:'STRUCT', work:0},
  W: {name:'Wall',        color:'#ff8844', placement:'any',      tag:'STRUCT', work:150},
  V: {name:'Wall (white)',color:'#c8c8d8', placement:'any',      tag:'STRUCT', work:150},
  Q: {name:'Quarters',    color:'#4ad8e0', placement:'interior', tag:'INTRA',  work:600},
  D: {name:'Docking',     color:'#4a90d0', placement:'exterior', tag:'EXTRA',  work:1000},
  G: {name:'Greenhouse',  color:'#64c864', placement:'interior', tag:'INTRA',  work:750},
  M: {name:'Medical',     color:'#e06080', placement:'interior', tag:'INTRA',  work:900},
  R: {name:'Recreation',  color:'#a060c8', placement:'interior', tag:'INTRA',  work:500},
  S: {name:'Shield',      color:'#5ac8e0', placement:'any',      tag:'ANY',    work:1250},
  F: {name:'Foundry',     color:'#ff8844', placement:'any',      tag:'PROD',   work:800},
  P: {name:'Fuel Proc',   color:'#ff5050', placement:'any',      tag:'PROD',   work:1000},
  A: {name:'Assembler',   color:'#ffc832', placement:'any',      tag:'PROD',   work:900},
  L: {name:'Lab',         color:'#c878d8', placement:'any',      tag:'PROD',   work:1200},
};

/* ════════════════════════════════════════════════════════════════════
   GRID UTILITIES — shared by placement/enclosure/decompression/foundry
   ──────────────────────────────────────────────────────────────────── */
const GRID = {cellSize: 30, cx: 0, cy: 0};

function gKey(gx,gy){ return gx+','+gy; }
function gridToScreen(gx,gy){ return {x: GRID.cx + gx*GRID.cellSize, y: GRID.cy + gy*GRID.cellSize}; }
function screenToGrid(sx,sy){
  return {gx: Math.round((sx - GRID.cx) / GRID.cellSize),
          gy: Math.round((sy - GRID.cy) / GRID.cellSize)};
}
function moduleAt(gx,gy){ return state.modules.find(m=>m.gx===gx && m.gy===gy); }

function isConnected(gx,gy){
  if(state.modules.length===0) return true;
  const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  return dirs.some(([dx,dy]) => moduleAt(gx+dx,gy+dy));
}
function makes2x2(gx,gy){
  // With (gx,gy) hypothetically filled, does any 2x2 block become full?
  const has = (x,y) => (x===gx && y===gy) || !!moduleAt(x,y);
  const tlCands = [[gx-1,gy-1],[gx,gy-1],[gx-1,gy],[gx,gy]];
  return tlCands.some(([tx,ty]) => has(tx,ty) && has(tx+1,ty) && has(tx,ty+1) && has(tx+1,ty+1));
}
function isInterior(gx,gy){
  return [[0,-1],[0,1],[-1,0],[1,0]].every(([dx,dy]) => moduleAt(gx+dx,gy+dy));
}
function validatePlacement(gx,gy,type){
  if(moduleAt(gx,gy)) return {ok:false, reason:'occupied'};
  if(!isConnected(gx,gy)) return {ok:false, reason:'not connected to station'};
  if(makes2x2(gx,gy)) return {ok:false, reason:'forms 2×2 block'};
  const p = MOD[type].placement;
  if(p==='interior' && !isInterior(gx,gy)) return {ok:false, reason:type+' must be interior (all 4 sides walled)'};
  if(p==='exterior' && isInterior(gx,gy)) return {ok:false, reason:type+' must face open space'};
  return {ok:true};
}

/* Flood-fill enclosure detection */
function computeEnclosed(){
  if(state.modules.length<3) return new Set();
  const walls = new Set(state.modules.map(m=>gKey(m.gx,m.gy)));
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const m of state.modules){
    minX=Math.min(minX,m.gx); maxX=Math.max(maxX,m.gx);
    minY=Math.min(minY,m.gy); maxY=Math.max(maxY,m.gy);
  }
  minX-=2; maxX+=2; minY-=2; maxY+=2;
  const reach = new Set();
  const q = [[minX,minY]];
  reach.add(gKey(minX,minY));
  while(q.length){
    const [x,y] = q.shift();
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx, ny=y+dy, k=gKey(nx,ny);
      if(nx<minX||nx>maxX||ny<minY||ny>maxY) continue;
      if(reach.has(k)||walls.has(k)) continue;
      reach.add(k);
      q.push([nx,ny]);
    }
  }
  const enclosed = new Set();
  for(let x=minX+1;x<=maxX-1;x++){
    for(let y=minY+1;y<=maxY-1;y++){
      const k = gKey(x,y);
      if(walls.has(k)||reach.has(k)) continue;
      enclosed.add(k);
    }
  }
  return enclosed;
}

/* Auto-orient — matches station_modules/crew.rs::auto_orient_processing_modules.
   When a processing module (F/P/A/L) is operational with no output direction,
   the engine picks the first direction with a valid input region.
   Preference order: South > East > North > West. */
const DIR_PREFERENCE = [
  {name:'South', vec:[0,1],  dir:1},
  {name:'East',  vec:[1,0],  dir:0},
  {name:'North', vec:[0,-1], dir:3},
  {name:'West',  vec:[-1,0], dir:2},
];
function autoOrientFoundry(gx, gy){
  // For each preferred direction, check if the OPPOSITE side has at least one
  // enclosed cell (which would be the input). Output goes in the preferred dir.
  for(const p of DIR_PREFERENCE){
    // Output side cell
    const ox = gx + p.vec[0], oy = gy + p.vec[1];
    // Need at least one non-output adjacent cell that's enclosed (input candidate)
    let hasInput = false;
    for(const q of DIR_PREFERENCE){
      if(q.dir === p.dir) continue;
      const ix = gx + q.vec[0], iy = gy + q.vec[1];
      if(state.enclosed.has(gKey(ix,iy))){ hasInput = true; break; }
    }
    if(hasInput) return p.dir;
  }
  return null;  // warning state — no valid I/O direction
}

  state.enclosed = computeEnclosed();

  document.getElementById('hud-scn').textContent = String(i+1).padStart(2,'0')+'/'+String(SCENARIOS.length).padStart(2,'0');
  document.querySelectorAll('.scn-card').forEach((b,k)=>b.classList.toggle('active',k===i));

  document.getElementById('taskBox').style.display = (s.id==='crew') ? '' : 'none';
  document.getElementById('rotBtn').style.display = (s.id==='foundry') ? '' : 'none';
  document.getElementById('autoBtn').style.display = s.autoBuildable ? '' : 'none';
  document.getElementById('autoBtn').classList.toggle('active', false);

  if(s.showPalette) buildPalette();
  if(s.id==='crew') buildTaskBox();

  // Reference panel
  document.getElementById('refTitle').firstChild ? null : null;
  const rt = document.getElementById('refTitle');
  // refTitle has a ::before pseudo; we only need to set text:
  rt.childNodes[0] ? null : null;
  // Just rebuild

  // Re-add the pip via CSS pseudo (it already exists)

  updateHud();
}

    return '<button class="pal-btn" data-k="'+k+'" style="--pc:'+m.color+'" onclick="selPalette(\''+k+'\')">'+
      '<span class="pal-glyph">'+k+'</span>'+
      '<span>'+m.name+'</span>'+
      '<span class="pal-tag">'+m.tag+'</span>'+
    '</button>';
  }).join('');
  setTimeout(()=>{
    document.querySelectorAll('.pal-btn').forEach(b=>b.classList.toggle('active', b.dataset.k===state.paletteSel));
  },0);
}
function selPalette(k){
  state.paletteSel = k;
  document.querySelectorAll('.pal-btn').forEach(b=>b.classList.toggle('active', b.dataset.k===k));
}
function toggleAuto(){
  state.autoBuild = !state.autoBuild;
  document.getElementById('autoBtn').classList.toggle('active', state.autoBuild);
}

function buildTaskBox(){

function rotateFoundry(){
  if(!state.foundry) return;
  state.foundry.dir = (state.foundry.dir + 1) % 4;
  // Output direction changed → release any active claim (matches release_foundry_claim)
  state.foundry.claimed = false;
  state.foundry.progress = null;
  if(state.foundryWorker && state.foundryWorker.state === 'processing'){
    state.foundryWorker.state = 'departing';
    state.foundryWorker.workDone = 0;
    state.foundryWorker.workNeeded = 0;
  }
  flash('Foundry output: ' + ['EAST','SOUTH','WEST','NORTH'][state.foundry.dir],'info');
}

/* ════════════════════════════════════════════════════════════════════
   INPUT
   ──────────────────────────────────────────────────────────────────── */
function getPt(e){
  const r = cv.getBoundingClientRect();
  if(e.touches && e.touches.length){
    return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  }
  if(e.changedTouches && e.changedTouches[0]){
    return {x:e.changedTouches[0].clientX-r.left, y:e.changedTouches[0].clientY-r.top};
  }
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function onTap(p){
  const s = SCENARIOS[state.scnIdx];
  if(s.id==='placement') return handlePlacement(p);
  if(s.id==='enclosure') return handleEnclosure(p);
  if(s.id==='decompress') return handleDecompress(p);
  if(s.id==='foundry') return handleFoundry(p);
  if(s.id==='crew') return; // tasks handled in DOM
  if(s.id==='tiers') return handleTiers(p);
}

function handlePlacement(p){
  const {gx,gy} = screenToGrid(p.x, p.y);
  const existing = moduleAt(gx,gy);
  if(existing){
    if(existing.type==='C'){ flash('Cannot remove the Core'); return; }
    state.modules = state.modules.filter(m=>!(m.gx===gx && m.gy===gy));
    state.enclosed = computeEnclosed();
    updateHud();
    return;
  }
  const v = validatePlacement(gx,gy,state.paletteSel);
  if(!v.ok){ flash('Invalid: '+v.reason); return; }
  state.modules.push({gx,gy,type:state.paletteSel,built:!state.autoBuild,delivered:0,need:MOD[state.paletteSel].work});
  state.enclosed = computeEnclosed();
  // Auto-orient processing modules (matches crew.rs DIRECTION_PREFERENCE S>E>N>W)
  const placed = moduleAt(gx,gy);
  if(placed && ['F','P','A','L'].includes(placed.type) && placed.built){
    const orient = autoOrientFoundry(gx,gy);
    if(orient !== null){
      placed.outputDir = orient;
      if(placed.type==='F') state.foundry = {gx, gy, dir:orient};
      flash('Auto-oriented '+MOD[placed.type].name+' → '+['EAST','SOUTH','WEST','NORTH'][orient],'info');
    } else {
      flash('Warning: '+MOD[placed.type].name+' has no valid I/O direction');
    }
  }
  updateHud();
}

function handleEnclosure(p){
  const {gx,gy} = screenToGrid(p.x, p.y);
  const existing = moduleAt(gx,gy);
  if(existing){
    if(existing.type==='C') return;
    state.modules = state.modules.filter(m=>!(m.gx===gx && m.gy===gy));
    state.enclosed = computeEnclosed();
    updateHud();
    return;
  }
  const v = validatePlacement(gx,gy,state.paletteSel);
  if(!v.ok){ flash('Invalid: '+v.reason); return; }
  state.modules.push({gx,gy,type:state.paletteSel,built:!state.autoBuild,delivered:0,need:MOD[state.paletteSel].work});
  const prev = state.enclosed.size;
  state.enclosed = computeEnclosed();
  if(state.enclosed.size > prev){
    // Newly enclosed cells get random resources
    const labels = ['Fe','Cu','Al','C'];
    const cols   = ['#d08050','#d8a050','#c8c8d8','#8a8a8a'];
    for(const k of state.enclosed){
      if(!state.resources[k]){
        const idx = Math.floor(Math.random()*labels.length);
        state.resources[k] = [{label:labels[idx], color:cols[idx], count:10+Math.floor(Math.random()*40)}];
      }
    }
    flash('+'+(state.enclosed.size - prev)+' cells enclosed','win');
  }
  updateHud();
}

function handleDecompress(p){
  const {gx,gy} = screenToGrid(p.x, p.y);
  const m = moduleAt(gx,gy);
  if(!m){ return; }
  if(m.type==='C'){ flash('Cannot remove the Core'); return; }
  const wallCellsBefore = state.enclosed;
  state.modules = state.modules.filter(mm=>!(mm.gx===gx && mm.gy===gy));
  const wallCellsAfter = computeEnclosed();
  // Cells lost from enclosure now eject their resources
  const lost = new Set();
  for(const k of wallCellsBefore){ if(!wallCellsAfter.has(k)) lost.add(k); }
  let totalEjected = 0;
  for(const k of lost){
    const [lx,ly] = k.split(',').map(Number);
    const stk = state.resources[k] || [];
    for(const r of stk){
      // Spawn particles — matches process_storage_ejections in requests.rs:
      //   angle = (i/count)*TAU + jitter(±0.3 rad)
      //   burst_speed = 800-1200 game-units/s, scaled to canvas px/frame
      //   one Resource entity per UNIT in the stack (not per stack)
      const N = r.count;
      const baseAngle = Math.random()*Math.PI*2;
      const pos = gridToScreen(lx,ly);
      for(let i=0;i<N;i++){
        const ang = (i/N)*Math.PI*2 + baseAngle + (Math.random()-0.5)*0.6;
        const sp = 5.5 + Math.random()*2.8;  // scaled 800-1200 → ~5.5-8.3 px/frame
        state.particles.push({
          x:pos.x, y:pos.y,
          vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
          color:r.color, label:r.label,
          life: 280 + Math.random()*40,
          rot: Math.random()*Math.PI*2, rotV:(Math.random()-0.5)*0.06,
        });
        totalEjected++;
      }
    }
    delete state.resources[k];
  }
  state.enclosed = wallCellsAfter;
  if(totalEjected>0) flash('DECOMPRESSION · '+totalEjected+' units ejected','win');
  else flash('Wall removed','info');
  updateHud();
}

function handleFoundry(p){
  // Click an input cell to refill ore
  const {gx,gy} = screenToGrid(p.x, p.y);
  const k = gKey(gx,gy);
  if(!state.enclosed.has(k)) return;
  // Determine which side this cell is on relative to foundry direction
  const dir = state.foundry.dir;  // 0=E,1=S,2=W,3=N
  const isOutput = (dir===0 && gx>0) || (dir===2 && gx<0) || (dir===1 && gy>0) || (dir===3 && gy<0);
  if(isOutput){ flash('That side is the output — try the input bay','info'); return; }
  // Add ore
  if(!state.resources[k]) state.resources[k] = [];
  const stk = state.resources[k];
  if(stk.length===0) stk.push({label:'Fe', color:'#d08050', count:0});
  stk[0].count = Math.min(64, stk[0].count + 16);
  flash('+16 Iron Ore added','info');
}

function handleTiers(p){
  const nodes = layoutTierNodes();
  let best = null, bestD = Infinity;
  for(const n of nodes){
    const d = Math.hypot(p.x - n.x, p.y - n.y);
    if(d < 22 && d < bestD){ best = n; bestD = d; }
  }
  if(best){
    state.tierSel = (state.tierSel === best.id) ? null : best.id;
    if(state.tierSel) flash('Selected: '+best.label,'info');
  } else {
    state.tierSel = null;
  }
}

/* ════════════════════════════════════════════════════════════════════
   READOUTS
   ──────────────────────────────────────────────────────────────────── */
function updateHud(){
  document.getElementById('hud-mods').textContent = state.modules.length;
  document.getElementById('hud-enc').textContent  = state.enclosed.size;
  const sel = document.getElementById('sel');
  const s = SCENARIOS[state.scnIdx];
  if(s.id==='placement' || s.id==='enclosure'){
    const built = state.modules.filter(m=>m.built!==false).length;
    const unbuilt = state.modules.length - built;
    sel.classList.toggle('has-sel', state.modules.length>0);
    sel.innerHTML = '<strong>'+built+'</strong> built · <strong>'+unbuilt+'</strong> planned · <strong>'+state.enclosed.size+'</strong> enclosed';
  } else if(s.id==='decompress'){
    sel.classList.toggle('has-sel', state.particles.length>0);
    sel.innerHTML = '<strong>'+state.particles.length+'</strong> floating · <strong>'+state.enclosed.size+'</strong> still enclosed';
  } else if(s.id==='foundry'){
    sel.classList.toggle('has-sel', true);
    const w = state.foundryWorker;
    const wState = w ? w.state.toUpperCase() : 'NONE';
    sel.innerHTML = 'Output: <strong>'+['EAST','SOUTH','WEST','NORTH'][state.foundry?state.foundry.dir:0]+'</strong> · Worker: <strong>'+wState+'</strong>';
  } else if(s.id==='crew'){
    const taskList = ['Mine','Construct','Collect','Search','Harvest','Metallurgy','Rest'];
    const counts = taskList.map(t=>state.taskCount[t]||0);
    const totalActive = counts.reduce((a,b)=>a+b,0);
    sel.classList.toggle('has-sel', true);
    sel.innerHTML = '<strong>'+totalActive+'</strong> citizens working · <strong>'+state.asteroids.length+'</strong> asteroids';
  } else if(s.id==='tiers'){
    sel.classList.toggle('has-sel', !!state.tierSel);
    if(state.tierSel){
      const n = TIER_NODES.find(x=>x.id===state.tierSel);
      sel.innerHTML = 'Selected: <strong>'+n.label+'</strong>';
    } else {
      sel.innerHTML = 'Click a node to trace dependencies';
    }
  }
}

let toastTimer;
function flash(msg, kind){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (kind?(' '+kind):'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ════════════════════════════════════════════════════════════════════
   RENDERING
   ──────────────────────────────────────────────────────────────────── */
function resize(){
  const r = document.getElementById('canvasArea').getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  centerGrid();
}
function centerGrid(){
  GRID.cx = Math.floor(W/2);
  GRID.cy = Math.floor(H/2);
  // Scale cell size to fit nicely
  GRID.cellSize = Math.max(22, Math.min(38, Math.floor(Math.min(W,H)/22)));
}

function drawSpaceGrid(){
  ctx.strokeStyle = 'rgba(80,130,200,0.045)';
  ctx.lineWidth = 1;
  const cs = GRID.cellSize;
  const ox = GRID.cx % cs, oy = GRID.cy % cs;
  for(let x = ox - cs; x <= W; x += cs){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let y = oy - cs; y <= H; y += cs){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
}

function drawEnclosedCells(){
  const cs = GRID.cellSize;
  ctx.save();
  for(const k of state.enclosed){
    const [gx,gy] = k.split(',').map(Number);
    const pos = gridToScreen(gx,gy);
    ctx.shadowBlur = 10; ctx.shadowColor = '#4ad8e0';
    ctx.fillStyle = 'rgba(74,216,224,0.07)';
    ctx.strokeStyle = 'rgba(74,216,224,0.35)';
    ctx.lineWidth = 1;
    ctx.fillRect(pos.x - cs/2 + 2, pos.y - cs/2 + 2, cs - 4, cs - 4);
    ctx.strokeRect(pos.x - cs/2 + 2, pos.y - cs/2 + 2, cs - 4, cs - 4);
  }
  ctx.restore();
}

function drawResources(){
  const cs = GRID.cellSize;
  for(const k of state.enclosed){
    const stk = state.resources[k];
    if(!stk || stk.length===0) continue;
    const [gx,gy] = k.split(',').map(Number);
    const pos = gridToScreen(gx,gy);
    const top = stk[0];
    if(!top || top.count<=0) continue;
    ctx.save();
    ctx.shadowBlur = 5; ctx.shadowColor = top.color;
    ctx.fillStyle = top.color;
    ctx.font = 'bold '+Math.round(cs*0.32)+'px JetBrains Mono';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(top.label, pos.x, pos.y - cs*0.08);
    ctx.font = Math.round(cs*0.22)+'px JetBrains Mono';
    ctx.fillStyle = 'rgba(200,210,220,0.75)';
    ctx.shadowBlur = 0;
    ctx.fillText(top.count+'×', pos.x, pos.y + cs*0.18);
    ctx.restore();
  }
}

function drawModule(m){
  const cs = GRID.cellSize;
  const t = MOD[m.type];
  const pos = gridToScreen(m.gx, m.gy);
  const built = m.built !== false;
  const x = pos.x - cs/2, y = pos.y - cs/2;

  ctx.save();
  if(built){
    ctx.shadowBlur = 9;
    ctx.shadowColor = t.color;
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 1.6;
    ctx.fillStyle = t.color + '10';
    ctx.fillRect(x+2, y+2, cs-4, cs-4);
    ctx.strokeRect(x+2, y+2, cs-4, cs-4);

    if(m.type==='C'){
      // Core: inner hex marker
      ctx.shadowBlur = 0;
      ctx.beginPath();
      const r = cs*0.22;
      for(let i=0;i<6;i++){
        const a = (i/6)*Math.PI*2;
        const px = pos.x + Math.cos(a)*r, py = pos.y + Math.sin(a)*r;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.stroke();
    } else {
      // Letter label
      ctx.shadowBlur = 0;
      ctx.fillStyle = t.color;
      ctx.font = 'bold '+Math.round(cs*0.46)+'px JetBrains Mono';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(m.type, pos.x, pos.y + 1);
    }

    // Foundry output arrow
    if(m.type==='F' && state.foundry){
      const dir = state.foundry.dir;
      const ang = dir*Math.PI/2;
      const len = cs*0.32;
      const ax = pos.x + Math.cos(ang)*len, ay = pos.y + Math.sin(ang)*len;
      ctx.shadowBlur = 12; ctx.shadowColor = '#ffc832';
      ctx.strokeStyle = '#ffc832';
      ctx.fillStyle = '#ffc832';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ax - Math.cos(ang)*6 - Math.sin(ang)*4, ay - Math.sin(ang)*6 + Math.cos(ang)*4);
      ctx.lineTo(ax, ay);
      ctx.lineTo(ax - Math.cos(ang)*6 + Math.sin(ang)*4, ay - Math.sin(ang)*6 - Math.cos(ang)*4);
      ctx.stroke();

      // Foundry claim ring + progress bar — matches foundry_worker/foundry_progress
      if(state.foundry.claimed){
        ctx.shadowBlur = 10; ctx.shadowColor = '#b45028';
        ctx.strokeStyle = '#b45028';
        ctx.lineWidth = 1.6;
        ctx.setLineDash([3,3]);
        ctx.strokeRect(x, y, cs, cs);
        ctx.setLineDash([]);
      }
      if(state.foundry.progress !== null && state.foundry.progress !== undefined){
        const pct = Math.min(1, state.foundry.progress);
        ctx.shadowBlur = 6; ctx.shadowColor = '#ffc832';
        ctx.fillStyle = '#ffc832';
        ctx.fillRect(x+3, y+cs-4, (cs-6)*pct, 2.5);
      }
    }
  } else {
    // Planned / blueprint - dashed outline, dim color
    ctx.shadowBlur = 6;
    ctx.shadowColor = t.color;
    ctx.strokeStyle = t.color + '90';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([4,3]);
    ctx.strokeRect(x+2, y+2, cs-4, cs-4);
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
    ctx.fillStyle = t.color + '70';
    ctx.font = 'bold '+Math.round(cs*0.42)+'px JetBrains Mono';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(m.type, pos.x, pos.y + 1);
    // Construction progress bar
    if(m.delivered>0 && m.need){
      const pct = Math.min(1, m.delivered/m.need);
      ctx.fillStyle = t.color;
      ctx.fillRect(x+3, y+cs-6, (cs-6)*pct, 2);
    }
  }
  ctx.restore();
}

function drawHoverPlacement(){
  if(!state.hover) return;
  const s = SCENARIOS[state.scnIdx];
  if(!s.showPalette) return;
  const {gx,gy} = screenToGrid(state.hover.x, state.hover.y);
  // Out of reasonable range?
  if(Math.abs(gx)>20 || Math.abs(gy)>20) return;
  if(moduleAt(gx,gy)) return;
  const v = validatePlacement(gx,gy,state.paletteSel);
  const cs = GRID.cellSize;
  const pos = gridToScreen(gx,gy);
  ctx.save();
  ctx.shadowBlur = 10;
  if(v.ok){
    ctx.shadowColor = MOD[state.paletteSel].color;
    ctx.strokeStyle = MOD[state.paletteSel].color;
    ctx.fillStyle = MOD[state.paletteSel].color + '20';
  } else {
    ctx.shadowColor = '#ff5050';
    ctx.strokeStyle = '#ff5050';
    ctx.fillStyle = 'rgba(255,80,80,0.10)';
  }
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5,3]);
  ctx.fillRect(pos.x - cs/2 + 2, pos.y - cs/2 + 2, cs - 4, cs - 4);
  ctx.strokeRect(pos.x - cs/2 + 2, pos.y - cs/2 + 2, cs - 4, cs - 4);
  ctx.setLineDash([]);
  ctx.restore();
}

function drawParticles(){
  for(let i = state.particles.length - 1; i >= 0; i--){
    const p = state.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.978; p.vy *= 0.978;  // higher drag — initial speed is now ~6x
    p.rot += p.rotV;
    p.life--;
    if(p.life <= 0 || p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50){
      state.particles.splice(i,1);
      continue;
    }
    const alpha = Math.min(1, p.life/80);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(0, 0, 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

/* Metallurgy worker — mirrors behaviors/metallurgy.rs state machine:
   searching → approaching → processing → (loop if more input) → departing.
   foundry_worker + foundry_progress set on Docking, cleared on Undocking. */
function findInputCellWithOre(){
  if(!state.foundry) return null;
  const f = state.foundry;
  const dir = f.dir;
  const cells = [];
  for(const k of state.enclosed){
    const [gx, gy] = k.split(',').map(Number);
    const isOutput = (dir===0 && gx>f.gx) || (dir===2 && gx<f.gx) ||
                     (dir===1 && gy>f.gy) || (dir===3 && gy<f.gy);
    if(isOutput) continue;
    const stk = state.resources[k];
    if(stk && stk.length>0 && stk[0].count>0){
      cells.push({k, gx, gy, stk});
    }
  }
  // Reading order: top-to-bottom, left-to-right (matches get_region_resources_by_position)
  cells.sort((a,b) => a.gy === b.gy ? a.gx - b.gx : a.gy - b.gy);
  return cells[0] || null;
}

function executeFoundryTransfer(){
  // Consume 1 ore from input, produce 7 ingots to output — matches Foundry smelt 1:7
  const cell = findInputCellWithOre();
  if(!cell) return false;
  cell.stk[0].count--;
  const f = state.foundry;
  const ofs = [[1,0],[0,1],[-1,0],[0,-1]][f.dir];
  const ogx = f.gx + ofs[0], ogy = f.gy + ofs[1];
  const okey = gKey(ogx, ogy);
  if(state.enclosed.has(okey)){
    if(!state.resources[okey]) state.resources[okey] = [];
    let st = state.resources[okey].find(s => s.label === 'Fe+');
    if(!st){
      st = {label:'Fe+', color:'#c8a840', count:0};
      state.resources[okey].push(st);
    }
    st.count = Math.min(64, st.count + 7);
  }
  return true;
}

function updateFoundryWorker(){
  const w = state.foundryWorker;
  if(!w || !state.foundry) return;
  const f = state.foundry;
  const fpos = gridToScreen(f.gx, f.gy);
  const speed = 2.2;

  switch(w.state){
    case 'searching':
      // Drift slowly in orbit while no input available
      if(!findInputCellWithOre()){
        w.x += Math.sin(state.t*0.024) * 0.3;
        w.y += Math.cos(state.t*0.018) * 0.2;
        w.dir = state.t * 0.01;
        return;
      }
      w.state = 'approaching';
      break;

    case 'approaching': {
      const dx = fpos.x - w.x, dy = fpos.y - w.y;
      const d = Math.hypot(dx, dy);
      if(d > 5){
        w.vx = (dx/d)*speed; w.vy = (dy/d)*speed;
        w.dir = Math.atan2(dy, dx);
        w.x += w.vx; w.y += w.vy;
      } else {
        // Docking — lock to foundry world position (matches handle_docking)
        w.x = fpos.x; w.y = fpos.y;
        w.vx = 0; w.vy = 0;
        f.claimed = true;
        // detect_recipe_from_input — for our demo, ore→ingot has 1 input × WORK_PER_INPUT_ITEM = 200
        w.workDone = 0;
        w.workNeeded = 200;
        f.progress = 0;
        w.state = 'processing';
      }
      break;
    }

    case 'processing': {
      // Need input still available (or undock)
      if(!findInputCellWithOre()){
        w.state = 'departing';
        f.claimed = false; f.progress = null;
        break;
      }
      // Work rate: 200 units / 240 frames = ~0.83/frame (4s per batch)
      w.workDone += 200/240;
      f.progress = w.workDone / w.workNeeded;
      if(w.workDone >= w.workNeeded){
        const ok = executeFoundryTransfer();
        w.workDone = 0; f.progress = 0;
        if(!ok || !findInputCellWithOre()){
          // No more input — undock
          w.state = 'departing';
          f.claimed = false; f.progress = null;
        }
      }
      break;
    }

    case 'departing': {
      // Fly back to off-station hold position
      const tx = W*0.08, ty = H*0.50;
      const ldx = tx - w.x, ldy = ty - w.y;
      const ld = Math.hypot(ldx, ldy);
      if(ld > 8){
        w.vx = (ldx/ld)*speed; w.vy = (ldy/ld)*speed;
        w.dir = Math.atan2(ldy, ldx);
        w.x += w.vx; w.y += w.vy;
      } else {
        w.state = 'searching';
      }
      break;
    }
  }
}

function drawFoundryWorker(){
  const w = state.foundryWorker;
  if(!w) return;
  let color = '#6878a0';
  if(w.state === 'approaching' || w.state === 'departing') color = '#a08040';
  if(w.state === 'processing') color = '#b45028';

  ctx.save();
  ctx.translate(w.x, w.y);
  ctx.rotate(w.dir);
  ctx.shadowBlur = w.state === 'processing' ? 14 : 10;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = w.state === 'processing' ? 1.8 : 1.5;
  const r = 11;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(-r*0.8, -r*0.75);
  ctx.lineTo(-r*0.45, 0);
  ctx.lineTo(-r*0.8, r*0.75);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  const labels = {searching:'IDLE', approaching:'DOCKING',
                  processing:'METALLURGY', departing:'UNDOCKING'};
  ctx.save();
  ctx.fillStyle = color;
  ctx.font = 'bold 9px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText(labels[w.state]||'', w.x, w.y + 22);
  ctx.restore();
}

/* ════════════════════════════════════════════════════════════════════
   CREW SIMULATION
   ──────────────────────────────────────────────────────────────────── */
const TASK_COLORS = {
  Search:'#8c5ac8', Collect:'#2878c8', Construct:'#c8a01e',
  Mine:'#be8232',   Harvest:'#3ca032', Metallurgy:'#b45028',
  Rest:'#6878a0',   Idle:'#6878a0',
};

function pickCitizenTask(c){
  // Priority: Construct > Metallurgy > Mine > Collect > Rest > Idle (when toggled on)
  if(state.taskOn.Construct){
    const planned = state.modules.find(m=>m.built===false && (m._claimedBy==null || m._claimedBy===c));
    if(planned){
      planned._claimedBy = c;
      const pos = gridToScreen(planned.gx, planned.gy);
      c.task = 'Construct'; c.target = {x:pos.x, y:pos.y, type:'module', ref:planned};
      return;
    }
  }
  if(state.taskOn.Mine){
    const ast = state.asteroids.find(a => a.ore>0 && (a._claimedBy==null || a._claimedBy===c));
    if(ast){
      ast._claimedBy = c;
      c.task = 'Mine'; c.target = {x:ast.x, y:ast.y, type:'asteroid', ref:ast};
      return;
    }
  }
  if(state.taskOn.Collect && state.particles.length>0){
    const p = state.particles[0];
    c.task = 'Collect'; c.target = {x:p.x, y:p.y, type:'particle', ref:p};
    return;
  }
  if(state.taskOn.Rest){
    const dock = state.modules.find(m=>m.type==='D' && m.built);
    if(dock){
      const pos = gridToScreen(dock.gx, dock.gy);
      c.task = 'Rest'; c.target = {x:pos.x, y:pos.y, type:'rest'};
      return;
    }
  }
  if(state.taskOn.Search){
    c.task = 'Search'; c.target = {x: Math.random()*W*0.9 + W*0.05, y: Math.random()*H*0.7 + H*0.15, type:'wander'};
    return;
  }
  c.task = 'Idle'; c.target = null;
}

function updateCrew(){
  // Count by task
  state.taskCount = {Search:0,Collect:0,Construct:0,Mine:0,Harvest:0,Metallurgy:0,Rest:0,Idle:0};
  // Release stale claims on dead targets
  for(const m of state.modules){ if(m.built){ delete m._claimedBy; } }
  for(const a of state.asteroids){ if(a.ore<=0){ delete a._claimedBy; } }

  for(const c of state.citizens){
    if(!c.target || (c.target.type==='asteroid' && c.target.ref.ore<=0) ||
       (c.target.type==='module' && c.target.ref.built) ||
       (c.target.type==='particle' && state.particles.indexOf(c.target.ref)===-1)){
      pickCitizenTask(c);
    }
    if(c.target){
      const dx = c.target.x - c.x, dy = c.target.y - c.y;
      const d = Math.hypot(dx,dy);
      if(d > 3){
        const speed = 1.5;
        c.vx = (dx/d)*speed; c.vy = (dy/d)*speed;
        c.dir = Math.atan2(dy,dx);
      } else {
        c.vx = 0; c.vy = 0;
        // At target - do task
        if(c.task==='Mine' && c.target.ref){
          // Matches behaviors/mine.rs: "Creates new Resource objects in orbit"
          c.target.ref.ore -= 0.008;
          c.mineSpawnTimer = (c.mineSpawnTimer||0) + 1;
          if(c.mineSpawnTimer >= 22 && c.target.ref.ore > 0){
            c.mineSpawnTimer = 0;
            // Spawn one orbital resource near the asteroid — these are Collect targets
            const ang = Math.random()*Math.PI*2;
            state.particles.push({
              x: c.target.ref.x + Math.cos(ang)*16,
              y: c.target.ref.y + Math.sin(ang)*16,
              vx: Math.cos(ang)*0.4 + (Math.random()-0.5)*0.2,
              vy: Math.sin(ang)*0.4 + (Math.random()-0.5)*0.2,
              color:'#d08050', label:'Fe',
              life: 900, rot:Math.random()*6.28, rotV:(Math.random()-0.5)*0.04,
            });
          }
          if(c.target.ref.ore<=0){
            // Asteroid depleted — respawn after a moment
            setTimeout(()=>{ c.target.ref.ore = 1; }, 700);
          }
        } else if(c.task==='Construct' && c.target.ref){
          c.target.ref.delivered = (c.target.ref.delivered||0) + 4;
          if(c.target.ref.delivered >= c.target.ref.need){
            c.target.ref.built = true;
            state.enclosed = computeEnclosed();
          }
        } else if(c.task==='Collect' && c.target.ref){
          // Remove the particle
          const idx = state.particles.indexOf(c.target.ref);
          if(idx>=0) state.particles.splice(idx,1);
        }
      }
      c.x += c.vx; c.y += c.vy;
    }
    state.taskCount[c.task] = (state.taskCount[c.task]||0) + 1;
  }
  // Update task counts in DOM
  if(SCENARIOS[state.scnIdx].id === 'crew'){
    for(const t of ['Search','Collect','Construct','Mine','Harvest','Metallurgy','Rest']){
      const el = document.getElementById('tcnt-'+t);
      if(el) el.textContent = state.taskCount[t] || 0;
    }
  }
}

function drawCrew(){
  for(const c of state.citizens){
    const color = TASK_COLORS[c.task] || '#6878a0';
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.dir);
    ctx.shadowBlur = 10; ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    const r = 11;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(-r*0.8, -r*0.75);
    ctx.lineTo(-r*0.45, 0);
    ctx.lineTo(-r*0.8, r*0.75);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
    // Label below
    ctx.save();
    ctx.fillStyle = 'rgba(200,210,230,0.55)';
    ctx.font = 'bold 9px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText(c.task.toUpperCase(), c.x, c.y + 22);
    ctx.restore();
  }
}

function drawAsteroids(){
  for(const a of state.asteroids){
    if(a.ore<=0) continue;
    a.x += a.vx; a.y += a.vy;
    a.dir += a.spin;
    // Bounds
    if(a.x<a.r||a.x>W-a.r) a.vx*=-1;
    if(a.y<a.r||a.y>H-a.r) a.vy*=-1;
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.dir);
    ctx.shadowBlur = 5; ctx.shadowColor = '#c8b8a0';
    ctx.strokeStyle = '#c8b8a0';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    a.verts.forEach((v,i)=>{
      const x = Math.cos(v.a)*v.r*a.r, y = Math.sin(v.a)*v.r*a.r;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

/* ════════════════════════════════════════════════════════════════════
   TIER RENDERING
   ──────────────────────────────────────────────────────────────────── */
function layoutTierNodes(){
  const tiers = [[],[],[],[],[],[]];
  for(const n of TIER_NODES) tiers[n.tier].push(n);
  const result = [];
  const yOf = [H*0.86, H*0.68, H*0.50, H*0.30, H*0.13, H*0.06];
  const paddingX = W*0.08;
  for(let t=0;t<6;t++){
    const row = tiers[t];
    if(row.length===0) continue;
    const spacing = (W - paddingX*2) / row.length;
    row.forEach((n, i)=>{
      result.push({...n, x: paddingX + spacing*(i+0.5), y: yOf[t]});
    });
  }
  return result;
}

function getAncestors(id){
  const set = new Set();
  const stack = [id];
  while(stack.length){
    const cur = stack.pop();
    for(const [src,dst] of TIER_EDGES){
      if(dst===cur && !set.has(src)){ set.add(src); stack.push(src); }
    }
  }
  return set;
}
function getDescendants(id){
  const set = new Set();
  const stack = [id];
  while(stack.length){
    const cur = stack.pop();
    for(const [src,dst] of TIER_EDGES){
      if(src===cur && !set.has(dst)){ set.add(dst); stack.push(dst); }
    }
  }
  return set;
}

function drawTiers(){
  const nodes = layoutTierNodes();
  const nodeMap = {};
  for(const n of nodes) nodeMap[n.id] = n;

  const sel = state.tierSel;
  const anc = sel ? getAncestors(sel) : new Set();
  const desc = sel ? getDescendants(sel) : new Set();

  // Draw tier labels
  ctx.save();
  ctx.font = 'bold 10px JetBrains Mono';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const labels = ['T0 ORES','T1 INGOTS','T2 ALLOYS','T3 COMPONENTS','T4 FOOD','T5 FUEL'];
  const yOf = [H*0.86, H*0.68, H*0.50, H*0.30, H*0.13, H*0.06];
  for(let t=0;t<6;t++){
    ctx.fillStyle = TIER_COLORS[t] + '50';
    ctx.shadowBlur = 4; ctx.shadowColor = TIER_COLORS[t];
    ctx.fillText(labels[t], 12, yOf[t]);
  }
  ctx.restore();

  // Draw edges
  for(const [src,dst] of TIER_EDGES){
    const a = nodeMap[src], b = nodeMap[dst];
    if(!a || !b) continue;
    let color = 'rgba(120,140,170,0.10)', lw = 1, blur = 0;
    if(sel){
      // Highlight if this edge connects sel to ancestors or descendants
      const inAnc = (anc.has(src) || src===sel) && (anc.has(dst) || dst===sel);
      const inDesc = (desc.has(src) || src===sel) && (desc.has(dst) || dst===sel);
      if(inAnc){ color = '#ffc832aa'; lw = 1.6; blur = 6; }
      else if(inDesc){ color = '#64c864aa'; lw = 1.6; blur = 6; }
    }
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    if(blur){ ctx.shadowBlur = blur; ctx.shadowColor = color; }
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    const midY = (a.y + b.y) / 2;
    ctx.bezierCurveTo(a.x, midY, b.x, midY, b.x, b.y);
    ctx.stroke();
    ctx.restore();
  }

  // Draw nodes
  for(const n of nodes){
    let color = TIER_COLORS[n.tier];
    let blur = 8;
    let lw = 1.4;
    const isSel = n.id===sel;
    const isAnc = anc.has(n.id);
    const isDesc = desc.has(n.id);
    if(sel && !isSel && !isAnc && !isDesc){
      color = '#384060';
      blur = 0;
    } else if(isAnc){ color = '#ffc832'; blur = 12; lw = 1.8; }
    else if(isDesc){ color = '#64c864'; blur = 12; lw = 1.8; }
    else if(isSel){ blur = 16; lw = 2.2; }

    ctx.save();
    ctx.shadowBlur = blur;
    ctx.shadowColor = color;
    ctx.strokeStyle = color;
    ctx.fillStyle = color + '20';
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.arc(n.x, n.y, 18, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = color;
    ctx.font = (isSel?'bold ':'') + '9.5px JetBrains Mono';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n.label, n.x, n.y);
    ctx.restore();
  }
}

/* ════════════════════════════════════════════════════════════════════
   MAIN LOOP
   ──────────────────────────────────────────────────────────────────── */
function render(){
  resize();
  state.t++;

  // Phosphor trail
  ctx.fillStyle = 'rgba(7,10,16,0.32)';
  ctx.fillRect(0,0,W,H);

  drawSpaceGrid();

  const s = SCENARIOS[state.scnIdx];

  if(s.id==='tiers'){
    drawTiers();
  } else {
    // Grid scenarios
    drawEnclosedCells();
    drawResources();

    if(s.id==='foundry'){
      updateFoundryWorker();
    }

    // Modules
    for(const m of state.modules) drawModule(m);

    // Foundry worker citizen (drawn on top of modules so the glow stacks)
    if(s.id==='foundry') drawFoundryWorker();

    // Crew scenario extras
    if(s.id==='crew'){
      drawAsteroids();
      updateCrew();
      drawCrew();
    }

    // Auto-build for placement / enclosure
    if(state.autoBuild && (s.id==='placement' || s.id==='enclosure')){
      // Advance one planned module's progress
      const planned = state.modules.find(m=>m.built===false);
      if(planned){
        planned.delivered = (planned.delivered||0) + 6;
        if(planned.delivered >= planned.need){
          planned.built = true;
          state.enclosed = computeEnclosed();
          if(s.id==='enclosure'){
            // Maybe new cells got enclosed - resource fill
            const labels = ['Fe','Cu','Al','C'];
            const cols   = ['#d08050','#d8a050','#c8c8d8','#8a8a8a'];
            for(const k of state.enclosed){
              if(!state.resources[k]){
                const idx = Math.floor(Math.random()*labels.length);
                state.resources[k] = [{label:labels[idx], color:cols[idx], count:10+Math.floor(Math.random()*40)}];
              }
            }
          }
        }
      }
    }

    drawParticles();
    drawHoverPlacement();
  }

  updateHud();
  requestAnimationFrame(render);
}

/* ════════════════════════════════════════════════════════════════════
   SCENARIO BAR
   ──────────────────────────────────────────────────────────────────── */
function buildScnBar(){
  const bar = document.getElementById('scnBar');
  bar.innerHTML = SCENARIOS.map((s,i)=>(
    '<button class="scn-card" data-idx="'+i+'" style="--ac:'+s.accent+'" onclick="loadScenario('+i+')">'+
      '<span class="scn-ico">'+s.icon+'</span>'+
      '<span class="scn-meta">'+
        '<span class="scn-num">'+String(i+1).padStart(2,'0')+'</span>'+
        '<span class="scn-name">'+s.name+'</span>'+
      '</span>'+
    '</button>'
  )).join('');
}

/* ════════════════════════════════════════════════════════════════════
   MOBILE DRAWER
   ──────────────────────────────────────────────────────────────────── */
function toggleDrawer(){
  const panel = document.getElementById('sideR');
  const fab = document.getElementById('fab');
  const bd = document.getElementById('bd');
  const willOpen = !panel.classList.contains('open');
  panel.classList.toggle('open', willOpen);
  fab.classList.toggle('open', willOpen);
  bd.classList.toggle('show', willOpen);
}
function closeDrawer(){
  document.getElementById('sideR').classList.remove('open');
  document.getElementById('fab').classList.remove('open');
  document.getElementById('bd').classList.remove('show');
}

/* ════════════════════════════════════════════════════════════════════
   BOOT
   ──────────────────────────────────────────────────────────────────── */
buildScnBar();
resize();
window.addEventListener('resize', resize);
loadScenario(0);
render();

try{ if(window.self!==window.top) document.body.classList.add('in-frame'); }catch(e){ document.body.classList.add('in-frame'); }
</script>

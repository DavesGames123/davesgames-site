<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STELLA NOVA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0c11;
  --sidebar:   #0c0f16;
  --border:    rgba(150,200,255,0.07);
  --border-b:  rgba(150,200,255,0.16);
  --blue:      #96c8ff;
  --blue-dim:  #4a7aaa;
  --yellow:    #ffc832;
  --orange:    #ff7b00;
  --green:     #64c864;
  --text:      #c0cfe0;
  --text-dim:  #5a7090;
  --text-faint:#2a3850;
  --sidebar-w: 260px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'JetBrains Mono', monospace; color: var(--text); -webkit-font-smoothing: antialiased; }

/* Shell */
#shell { display: flex; width: 100%; height: 100%; }

/* Sidebar */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100%;
  background: var(--sidebar);
  border-right: 1px solid var(--border-b);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  z-index: 200;
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}

@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 32px rgba(0,0,0,0.7);
  }
  #sidebar.open { transform: translateX(0); }
  #overlay { display: none; position: fixed; inset: 0; z-index: 190; background: rgba(0,0,0,0.55); }
  #overlay.show { display: block; }
}

/* Sidebar header */
#sb-header {
  padding: 24px 20px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sb-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 1.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #eef2fa;
  line-height: 1;
}
#sb-wordmark em { font-style: italic; color: var(--yellow); }
#sb-sub {
  margin-top: 6px;
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
}
#sb-status {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-top: 12px;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: var(--green);
}
#sb-status::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 2.2s ease infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Nav scroll */
#sb-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#sb-nav::-webkit-scrollbar { width: 3px; }
#sb-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Cluster */
.cluster { margin-bottom: 2px; }

.cluster-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px 10px 16px;
  cursor: pointer;
  user-select: none;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  transition: background 0.15s;
}
.cluster-head:hover { background: rgba(150,200,255,0.04); }
.cluster-icon { font-size: 0.8rem; width: 18px; text-align: center; flex-shrink: 0; opacity: 0.65; }
.cluster-label {
  flex: 1;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-dim);
  transition: color 0.15s;
}
.cluster-arrow {
  font-size: 0.55rem;
  color: var(--text-faint);
  transition: transform 0.22s;
  flex-shrink: 0;
}
.cluster.open .cluster-arrow { transform: rotate(90deg); }
.cluster.open .cluster-label { color: var(--text); }

.cluster-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1);
}
.cluster.open .cluster-body { max-height: 600px; }

/* Nav items */
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px 10px 44px;
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  position: relative;
  transition: background 0.15s;
}
.nav-item::before {
  content: '';
  position: absolute;
  left: 28px;
  top: 50%; transform: translateY(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-faint);
  transition: background 0.15s, box-shadow 0.15s;
}
.nav-item:hover { background: rgba(150,200,255,0.04); }
.nav-item:hover::before { background: var(--blue-dim); }

/* Active states */
.nav-item.active { background: rgba(255,200,50,0.05); }
.nav-item.active::before { background: var(--yellow); box-shadow: 0 0 7px var(--yellow); }
.nav-item.active .nav-label { color: var(--yellow); }

.nav-item.hl.active { background: rgba(150,200,255,0.05); }
.nav-item.hl.active::before { background: var(--blue); box-shadow: 0 0 7px var(--blue); }
.nav-item.hl.active .nav-label { color: var(--blue); }
.nav-item.hl:hover::before { background: var(--blue-dim); }

.nav-item.fx.active { background: rgba(255,123,0,0.05); }
.nav-item.fx.active::before { background: var(--orange); box-shadow: 0 0 7px var(--orange); }
.nav-item.fx.active .nav-label { color: var(--orange); }
.nav-item.fx:hover::before { background: var(--orange); }

.nav-label {
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  transition: color 0.15s;
}
.nav-badge {
  margin-left: auto;
  font-size: 0.44rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 2px 5px;
  border: 1px solid var(--border);
  border-radius: 2px;
}

/* Sidebar footer */
#sb-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#sb-clock {
  font-size: 0.7rem;
  color: var(--text-faint);
  letter-spacing: 0.14em;
}

/* Content */
#content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* Mobile topbar */
#topbar {
  display: none;
  height: 52px;
  background: rgba(10,12,17,0.96);
  border-bottom: 1px solid var(--border-b);
  align-items: center;
  padding: 0 16px;
  gap: 14px;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
}
@media (max-width: 768px) { #topbar { display: flex; } }

#menu-btn {
  background: transparent;
  border: 1px solid var(--border-b);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 7px 11px;
  line-height: 1;
  transition: color 0.2s, border-color 0.2s;
}
#menu-btn:hover { color: var(--blue); border-color: var(--blue-dim); }
#topbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 1.15rem;
  letter-spacing: 0.14em;
  color: #eef2fa;
}
#topbar-active { margin-left: auto; font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--yellow); }

/* iframe */
#frame-wrap { flex: 1; position: relative; overflow: hidden; }
#frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: var(--bg); }

/* Market Intel accent — teal/cyan distinct from game content colours */
.nav-item.mi.active { background: rgba(0,212,180,0.06); }
.nav-item.mi.active::before { background: #00d4b4; box-shadow: 0 0 7px #00d4b4; }
.nav-item.mi.active .nav-label { color: #00d4b4; }
.nav-item.mi:hover::before { background: #00a890; }

.cluster-head.mi-head .cluster-icon { opacity: 1; color: #00d4b4; }
.cluster.open .cluster-head.mi-head .cluster-label { color: #00d4b4; }

/* LinkedIn footer button */
#sb-linkedin {
  display: block;
  margin-top: 10px;
  padding: 7px 12px;
  border: 1px solid rgba(0,119,181,0.5);
  background: rgba(0,119,181,0.08);
  color: #5ba4cf;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
#sb-linkedin:hover {
  background: rgba(0,119,181,0.2);
  border-color: rgba(0,119,181,0.9);
  color: #90c8f0;
}
#sb-linkedin::before {
  content: 'in ';
  font-weight: 700;
  font-size: 0.75rem;
}

/* Scanlines */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 4px);
}
</style>
</head>
<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="shell">

  <nav id="sidebar">
    <div id="sb-header">
      <div id="sb-wordmark">Stella Nova</div>
      <div id="sb-sub">From Ore to Empire</div>
      <div id="sb-status">Sim Active</div>
    </div>

    <div id="sb-nav">

      <div class="cluster open" id="cl-home">
        <button class="cluster-head" onclick="toggleCluster('cl-home')">
          <span class="cluster-icon">⌂</span>
          <span class="cluster-label">Home</span>
          <span class="cluster-arrow">›</span>
        </button>
        <div class="cluster-body">
          <button class="nav-item" data-tab="home" onclick="switchTab('home')">
            <span class="nav-label">Overview</span>
          </button>
        </div>
      </div>

      <div class="cluster open" id="cl-sims">
        <button class="cluster-head" onclick="toggleCluster('cl-sims')">
          <span class="cluster-icon">◎</span>
          <span class="cluster-label">Simulations</span>
          <span class="cluster-arrow">›</span>
        </button>
        <div class="cluster-body">
          <button class="nav-item hl" data-tab="hohmann" onclick="switchTab('hohmann')">
            <span class="nav-label">Hohmann Transfer</span>
            <span class="nav-badge">SIM</span>
          </button>
          <button class="nav-item hl" data-tab="gravity" onclick="switchTab('gravity')">
            <span class="nav-label">Gravity Sim</span>
            <span class="nav-badge">SIM</span>
          </button>
          <button class="nav-item" data-tab="forge" onclick="switchTab('forge')">
            <span class="nav-label">Planet Forge</span>
          </button>
          <button class="nav-item fx" data-tab="explosion" onclick="switchTab('explosion')">
            <span class="nav-label">Explosion</span>
          </button>
          <button class="nav-item fx" data-tab="flare" onclick="switchTab('flare')">
            <span class="nav-label">Engine Propulsion Effects</span>
          </button>
        </div>
      </div>

      <div class="cluster open" id="cl-crew">
        <button class="cluster-head" onclick="toggleCluster('cl-crew')">
          <span class="cluster-icon">⬡</span>
          <span class="cluster-label">Operational Manual</span>
          <span class="cluster-arrow">›</span>
        </button>
        <div class="cluster-body">
          <button class="nav-item" data-tab="guide" onclick="switchTab('guide')">
            <span class="nav-label">Station Guide</span>
          </button>
          <button class="nav-item" data-tab="planner" onclick="switchTab('planner')">
            <span class="nav-label">Station Planner</span>
          </button>
          <button class="nav-item" data-tab="selection" onclick="switchTab('selection')">
            <span class="nav-label">Selection</span>
          </button>
          <button class="nav-item" data-tab="crafting" onclick="switchTab('crafting')">
            <span class="nav-label">Crafting</span>
          </button>
          <button class="nav-item" data-tab="behaviors" onclick="switchTab('behaviors')">
            <span class="nav-label">Behaviors</span>
          </button>
          <button class="nav-item" data-tab="controls" onclick="switchTab('controls')">
            <span class="nav-label">Controls</span>
          </button>
        </div>
      </div>

      <div class="cluster open" id="cl-intel">
        <button class="cluster-head mi-head" onclick="toggleCluster('cl-intel')">
          <span class="cluster-icon">◈</span>
          <span class="cluster-label">Market Intel</span>
          <span class="cluster-arrow">›</span>
        </button>
        <div class="cluster-body">
          <button class="nav-item mi" data-tab="intel" onclick="switchTab('intel')">
            <span class="nav-label">Investor Case Studies</span>
            <span class="nav-badge">PDF</span>
          </button>
          <button class="nav-item mi" data-tab="pitch" onclick="switchTab('pitch')">
            <span class="nav-label">Pitch Deck</span>
            <span class="nav-badge">NEW</span>
          </button>
          <button class="nav-item mi" data-tab="roadmap" onclick="switchTab('roadmap')">
            <span class="nav-label">Roadmap</span>
            <span class="nav-badge">NEW</span>
          </button>
          <button class="nav-item mi" data-tab="business" onclick="switchTab('business')">
            <span class="nav-label">Revenue Model</span>
            <span class="nav-badge">NEW</span>
          </button>
        </div>
      </div>

    </div>

    <div id="sb-footer">
      <div id="sb-clock">00:00:00</div>
      <a id="sb-linkedin" href="https://linkedin.com/in/david-kubala" target="_blank" rel="noopener">Follow on LinkedIn</a>
    </div>
  </nav>

  <div id="content">
    <div id="topbar">
      <button id="menu-btn" onclick="openSidebar()">☰</button>
      <span id="topbar-title">S T E L L A  N O V A</span>
      <span id="topbar-active">Overview</span>
    </div>
    <div id="frame-wrap"></div>
  </div>

</div>

<script>
const PAGES = {
  home:'home.html', hohmann:'hohmann.html', forge:'forge.html',
  crafting:'crafting.html', planner:'planner.html', guide:'guide.html',
  behaviors:'behaviors.html', controls:'controls.html', gravity:'gravity.html',
  selection:'selection.html', explosion:'explosion.html', flare:'flare.html',
  intel:'market-intel.html', pitch:'pitch.html', roadmap:'roadmap.html',
  business:'business.html',
};
const LABELS = {
  home:'Overview', hohmann:'Hohmann Transfer', forge:'Planet Forge',
  crafting:'Crafting', planner:'Station Planner', guide:'Station Guide',
  behaviors:'Behaviors', controls:'Controls', gravity:'Gravity Sim',
  selection:'Selection', explosion:'Explosion', flare:'Engine Propulsion Effects',
  intel:'Investor Case Studies', pitch:'Pitch Deck', roadmap:'Roadmap',
  business:'Revenue Model',
};

let activeTab = null;

function switchTab(id) {
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === id);
  });
  var wrap = document.getElementById('frame-wrap');
  wrap.innerHTML = '';
  var iframe = document.createElement('iframe');
  iframe.src = PAGES[id] || 'home.html';
  wrap.appendChild(iframe);
  var ta = document.getElementById('topbar-active');
  if (ta) ta.textContent = LABELS[id] || id;
  activeTab = id;
  closeSidebar();
}
window.switchTab = switchTab;

function toggleCluster(id) {
  var cl = document.getElementById(id);
  if (cl) cl.classList.toggle('open');
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
}

setInterval(function() {
  var el = document.getElementById('sb-clock');
  if (el) el.textContent = new Date().toTimeString().slice(0,8);
}, 1000);

switchTab('home');
</script>
</body>
</html>

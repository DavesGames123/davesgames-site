<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Selection // Stella Nova</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d14;--bg2:#0e1320;--bg3:#121828;
  --surface:#1c2436;--surface2:#243040;
  --border:rgba(150,200,255,0.06);--border-b:rgba(150,200,255,0.14);
  --blue:#96c8ff;--blue-dim:#5a8cc0;--blue-faint:rgba(150,200,255,0.04);
  --yellow:#ffc832;--yellow-dim:#b8901e;--yellow-faint:rgba(255,200,50,0.04);
  --green:#64c864;--red:#ff5050;--cyan:#4ad8e0;--orange:#ff8844;--magenta:#c878d8;
  --text:#c8d0e0;--text-dim:#6878a0;--text-faint:#384060;--text-bright:#e8ecf4;
  --scan:rgba(0,0,0,0.10);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'JetBrains Mono',monospace;color:var(--text);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);mix-blend-mode:multiply}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.45))}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(150,200,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(150,200,255,0.015) 1px,transparent 1px),linear-gradient(rgba(150,200,255,0.005) 1px,transparent 1px),linear-gradient(90deg,rgba(150,200,255,0.005) 1px,transparent 1px);background-size:300px 300px,300px 300px,50px 50px,50px 50px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

#app{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column}

.topbar{display:flex;align-items:center;padding:0 16px;height:42px;background:rgba(10,13,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;gap:16px}
.sys-name{color:var(--blue);font-weight:700;font-size:14px;letter-spacing:0.3em;text-shadow:0 0 8px rgba(150,200,255,0.4)}
.status-pill{display:flex;align-items:center;gap:6px;color:var(--green);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;text-shadow:0 0 6px rgba(100,200,100,0.5)}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.tb-readouts{margin-left:auto;display:flex;gap:22px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);align-items:center}
.tb-readouts strong{color:var(--blue-dim);font-weight:600}
.in-frame .topbar{display:none!important}

.scn-bar{display:flex;align-items:stretch;padding:8px 10px;height:74px;background:rgba(10,13,20,0.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;overflow-x:auto;overflow-y:hidden}
.scn-card{display:flex;align-items:center;gap:11px;background:transparent;border:1px solid var(--border-b);color:var(--text-dim);font-family:inherit;padding:8px 14px;cursor:pointer;border-radius:5px;transition:all 0.18s;white-space:nowrap;flex-shrink:0;min-width:130px}
.scn-card:hover{border-color:color-mix(in srgb,var(--ac,var(--blue)) 50%,transparent);color:var(--text)}
.scn-card.active{border-color:var(--ac,var(--yellow));background:color-mix(in srgb,var(--ac,var(--yellow)) 6%,transparent);color:var(--ac,var(--yellow));box-shadow:0 0 14px color-mix(in srgb,var(--ac,var(--yellow)) 15%,transparent),inset 0 0 12px color-mix(in srgb,var(--ac,var(--yellow)) 4%,transparent)}
.scn-card .scn-ico{font-size:22px;line-height:1;color:var(--ac,var(--blue))}
.scn-card.active .scn-ico{text-shadow:0 0 10px var(--ac)}
.scn-card .scn-meta{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.scn-card .scn-num{font-size:9px;letter-spacing:0.18em;color:var(--text-faint);text-transform:uppercase}
.scn-card .scn-name{font-size:13px;font-weight:600;letter-spacing:0.04em}
.scn-card.active .scn-num{color:color-mix(in srgb,var(--ac,var(--yellow)) 65%,var(--text-faint))}

.ctrl-bar{display:flex;align-items:center;padding:0 12px;height:40px;background:rgba(10,13,20,0.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;overflow-x:auto}
.ctrl-label{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);white-space:nowrap}
.ctrl-btn{background:transparent;border:1px solid var(--border-b);color:var(--text-dim);font-family:inherit;font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:all 0.15s;border-radius:3px}
.ctrl-btn:hover{border-color:var(--blue);color:var(--blue)}
.ctrl-btn.active{color:var(--yellow);border-color:var(--yellow);background:rgba(255,200,50,0.06);box-shadow:0 0 10px rgba(255,200,50,0.2)}
.ctrl-btn.warn{color:var(--red);border-color:rgba(255,80,80,0.3)}
.ctrl-btn.warn:hover{border-color:var(--red);box-shadow:0 0 10px rgba(255,80,80,0.25)}
.ctrl-sep{width:1px;height:22px;background:var(--border-b);flex-shrink:0}
.ctrl-info{margin-left:auto;font-size:11px;color:var(--text-faint);letter-spacing:0.06em;white-space:nowrap}

.main{flex:1;display:flex;overflow:hidden;min-height:0}
.canvas-area{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,#0c1018 0%,#070a10 100%);min-width:0}
#cv{display:block;cursor:crosshair;touch-action:none}

.hint-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);max-width:calc(100% - 24px);background:rgba(10,13,20,0.94);border:1px solid var(--border-b);border-left:3px solid var(--ac,var(--yellow));padding:9px 16px;font-size:12.5px;color:var(--text);backdrop-filter:blur(8px);border-radius:0 4px 4px 0;letter-spacing:0.02em;line-height:1.5;pointer-events:none;text-align:center;z-index:5;box-shadow:0 0 16px color-mix(in srgb,var(--ac,var(--yellow)) 18%,transparent)}
.hint-bar strong{color:var(--ac,var(--yellow));font-weight:600;text-shadow:0 0 8px var(--ac,var(--yellow))}
.hint-bar code{font-family:inherit;background:rgba(150,200,255,0.10);padding:1px 6px;border-radius:2px;color:var(--blue);font-size:11.5px}

.sel-bar{position:absolute;bottom:12px;left:12px;background:rgba(10,13,20,0.94);border:1px solid var(--border-b);padding:7px 14px;font-size:12px;color:var(--text-dim);backdrop-filter:blur(8px);border-radius:4px;letter-spacing:0.04em;pointer-events:none;z-index:5}
.sel-bar strong{color:var(--blue);font-weight:600;text-shadow:0 0 6px currentColor}
.sel-bar.has-sel{border-color:color-mix(in srgb,var(--ac,var(--yellow)) 40%,var(--border-b));color:var(--text);box-shadow:0 0 14px color-mix(in srgb,var(--ac,var(--yellow)) 18%,transparent)}

.toast{position:absolute;top:62px;left:50%;transform:translateX(-50%) translateY(-6px);background:rgba(255,80,80,0.95);color:#fff;padding:7px 16px;font-size:12px;letter-spacing:0.06em;border-radius:3px;backdrop-filter:blur(8px);pointer-events:none;z-index:6;opacity:0;transition:all 0.35s ease;font-weight:600;box-shadow:0 0 18px rgba(255,80,80,0.45)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.info{background:rgba(74,144,208,0.95);box-shadow:0 0 18px rgba(74,144,208,0.45)}
.toast.win{background:rgba(100,200,100,0.95);box-shadow:0 0 18px rgba(100,200,100,0.45)}

.sidebar-r{width:280px;min-width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;background:rgba(10,13,20,0.55);flex-shrink:0}
.panel{padding:12px 16px;border-bottom:1px solid var(--border)}
.panel-title{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel-title::before{content:'';width:6px;height:6px;background:var(--ac,var(--blue));border-radius:50%;flex-shrink:0;box-shadow:0 0 8px var(--ac,var(--blue))}
.scn-headline{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text-bright);line-height:1.1;margin-bottom:8px}
.scn-headline em{font-style:italic;color:var(--ac,var(--yellow));text-shadow:0 0 12px var(--ac,var(--yellow))}
.scn-desc{font-size:12.5px;color:var(--text-dim);line-height:1.7}
.scn-desc strong{color:var(--text)}
.notes-list{list-style:none;padding:0;margin:0}
.notes-list li{font-size:12px;color:var(--text-dim);line-height:1.65;padding:5px 0 5px 16px;position:relative}
.notes-list li::before{content:'→';position:absolute;left:0;color:var(--ac,var(--blue-dim));font-weight:600}
.notes-list code{font-family:inherit;background:rgba(150,200,255,0.10);padding:0 5px;border-radius:2px;color:var(--blue);font-size:11px}
.legend-row{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--text-dim);padding:3px 0}
.lpip{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lpip canvas{display:block}
.legend-row .lpri{margin-left:auto;font-family:inherit;font-size:10.5px;color:var(--text-faint);letter-spacing:0.06em}

.fab{display:none;position:fixed;bottom:14px;right:14px;z-index:35;padding:11px 16px;background:rgba(10,13,20,0.96);border:1px solid var(--border-b);color:var(--text);font-family:inherit;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;font-weight:700;border-radius:4px;backdrop-filter:blur(8px);cursor:pointer;transition:all 0.18s}
.fab:active{transform:scale(0.96)}
.fab.open{color:var(--yellow);border-color:var(--yellow);background:rgba(255,200,50,0.1);box-shadow:0 0 12px rgba(255,200,50,0.3)}
.drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;opacity:0;pointer-events:none;transition:opacity 0.2s}
.drawer-backdrop.show{opacity:1;pointer-events:auto;display:block}

@media(max-width:980px){
  .sidebar-r{position:fixed;top:156px;bottom:0;right:0;width:88vw;max-width:340px;z-index:200;transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 32px rgba(0,0,0,0.65);background:rgba(8,11,18,0.98);transform:translateX(105%)}
  .sidebar-r.open{transform:translateX(0)}
  .canvas-area{width:100%}
  .fab{display:block}
  .tb-readouts{display:none}
}
@media(max-width:600px){
  .topbar{padding:0 10px;height:38px}
  .sys-name{font-size:12px;letter-spacing:0.18em}
  .status-pill{font-size:10px}
  .scn-bar{height:64px;padding:6px 8px;gap:6px}
  .scn-card{padding:6px 11px;min-width:110px;gap:9px}
  .scn-card .scn-ico{font-size:18px}
  .scn-card .scn-num{font-size:8px}
  .scn-card .scn-name{font-size:11.5px}
  .ctrl-bar{height:36px;padding:0 8px;gap:5px}
  .ctrl-btn{padding:4px 9px;font-size:10.5px}
  .ctrl-label{font-size:10px}
  .ctrl-info{display:none}
  .sidebar-r{top:138px}
  .hint-bar{font-size:11.5px;padding:7px 13px;border-left-width:2px}
  .sel-bar{font-size:10.5px;padding:5px 10px}
  .fab{padding:9px 13px;font-size:10.5px;bottom:12px;right:12px}
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="app">
  <div class="topbar">
    <span class="sys-name">SELECTION</span>
    <div class="status-pill">LIVE PRACTICE</div>
    <div class="tb-readouts">
      <span>SCENARIO <strong id="hud-scn">01/06</strong></span>
      <span>ENTITIES <strong id="hud-ents">0</strong></span>
      <span>SELECTED <strong id="hud-sel">0</strong></span>
      <span>MOD <strong id="hud-mod">OFF</strong></span>
    </div>
  </div>

  <div class="scn-bar" id="scnBar"></div>

  <div class="ctrl-bar">
    <span class="ctrl-label">MOD</span>
    <button class="ctrl-btn" id="modBtn" onclick="toggleMod()">⌘ HOLD</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn warn" onclick="resetScenario()">↻ RESET</button>
    <button class="ctrl-btn" id="zoomOut" style="display:none" onclick="adjustZoom(-1)">− ZOOM</button>
    <button class="ctrl-btn" id="zoomIn" style="display:none" onclick="adjustZoom(1)">+ ZOOM</button>
    <span class="ctrl-info">DESKTOP: HOLD <strong style="color:var(--text-dim)">⌘ / CTRL</strong> · MOBILE: TAP MOD</span>
  </div>

  <div class="main">
    <div class="canvas-area">
      <canvas id="cv"></canvas>
      <div class="hint-bar" id="hint" style="--ac:var(--yellow)"></div>
      <div class="sel-bar" id="sel">Nothing selected</div>
      <div class="toast" id="toast"></div>
    </div>
    <aside class="sidebar-r" id="sideR">
      <div class="panel">
        <div class="scn-headline" id="scnHead"></div>
        <div class="scn-desc" id="scnDesc"></div>
      </div>
      <div class="panel">
        <div class="panel-title">How it works</div>
        <ul class="notes-list" id="scnNotes"></ul>
      </div>
      <div class="panel">
        <div class="panel-title">Click priority</div>
        <div id="legendC"></div>
      </div>
      <div class="panel" style="border-bottom:none">
        <div class="panel-title">Box priority</div>
        <div id="legendB"></div>
      </div>
    </aside>
  </div>
</div>

<button class="fab" id="fab" onclick="toggleDrawer()">Info ≡</button>
<div class="drawer-backdrop" id="bd" onclick="closeDrawer()"></div>

<script>
/* ════════════════════════════════════════════════════════════════════
   ENTITY TYPES — vector-drawn, CRT-glow
   ──────────────────────────────────────────────────────────────────── */
const TYPES = {
  ship:     {label:'Ship',     shape:'ship',     color:'#4ad8e0', r:13, clickPri:0, boxPri:1, drift:true,  spin:0.004},
  enemy:    {label:'Enemy',    shape:'enemy',    color:'#ff5050', r:13, clickPri:1, boxPri:2, drift:true,  spin:0.018},
  planet:   {label:'Planet',   shape:'planet',   color:'#64c864', r:32, clickPri:2, boxPri:0, drift:false, spin:0.002},
  station:  {label:'Station',  shape:'station',  color:'#ffc832', r:24, clickPri:3, boxPri:3, drift:false, spin:0},
  module:   {label:'Module',   shape:'module',   color:'#ff8844', r:10, clickPri:4, boxPri:4, drift:false, spin:0},
  asteroid: {label:'Asteroid', shape:'asteroid', color:'#c8b8a0', r:14, clickPri:5, boxPri:5, drift:true,  spin:0.020},
  star:     {label:'Star',     shape:'star',     color:'#ffe060', r:28, clickPri:9, boxPri:9, drift:false, spin:0},
};

const MODULE_LIB = [
  {sub:'foundry',   letter:'F', color:'#ff8844'},
  {sub:'assembler', letter:'A', color:'#ffc832'},
  {sub:'lab',       letter:'L', color:'#c878d8'},
  {sub:'fuel',      letter:'P', color:'#ff5050'},
  {sub:'crew',      letter:'C', color:'#4ad8e0'},
  {sub:'green',     letter:'G', color:'#64c864'},
  {sub:'medical',   letter:'M', color:'#e06080'},
  {sub:'dock',      letter:'D', color:'#4a90d0'},
];

/* ════════════════════════════════════════════════════════════════════
   SCENARIOS
   ──────────────────────────────────────────────────────────────────── */
const SCENARIOS = [
  {
    id:'basics', name:'Click & Box', icon:'◎', accent:'#96c8ff',
    head:'Click & <em>Box</em>',
    desc:'Click one entity to select it. Drag a rectangle to select many at once.',
    notes:[
      'Left-click any entity to select it.',
      'Click and drag in empty space to draw a box.',
      'Click empty space to clear.'
    ],
    hint:'Click any ship · then <strong>drag a box</strong> around several asteroids',
    setup(){
      spawn('ship',   10, {region:'wide'});
      spawn('enemy',  4,  {region:'wide'});
      spawn('asteroid', 90, {region:'wide'});
      spawn('planet', 2,  {region:'wide'});
      spawn('star',   3,  {region:'corners'});
    }
  },
  {
    id:'priority', name:'Priority', icon:'◉', accent:'#64c864',
    head:'Overlap <em>Priority</em>',
    desc:'When entities sit on top of each other, the system picks the one you probably meant.',
    notes:[
      'A ship on a planet → clicking gets the <code>ship</code>.',
      'You\'d rarely want the bigger background object.',
      'Same applies to ships on stations, asteroids on planets, etc.'
    ],
    hint:'The ship is sitting <strong>on top of</strong> the planet · click it · <strong>the ship wins</strong>',
    setup(){
      const pairs = [[W*0.30,H*0.40],[W*0.62,H*0.55],[W*0.45,H*0.75]];
      pairs.forEach(([px,py])=>{
        ents.push(make('planet', px, py));
        ents.push(make('ship', px-5+Math.random()*8, py-5+Math.random()*8));
      });
      ents.push(make('station', W*0.80, H*0.30));
      ents.push(make('ship', W*0.80+4, H*0.30-3));
      spawn('asteroid', 70, {region:'wide'});
      spawn('star', 2, {region:'corners'});
    }
  },
  {
    id:'clickbox', name:'Click vs Box', icon:'⊟', accent:'#ff8844',
    head:'Click <em>vs</em> Box',
    desc:'Clicking and box-dragging use different priorities. Clicking favors small useful things. Boxing favors the big important ones.',
    notes:[
      'Click in a busy area → you get a <code>ship</code>.',
      'Box over the same area → you get the <code>planet</code> instead.',
      'Boxing over a system should grab planets, not the 50 ships orbiting them.'
    ],
    hint:'<strong>Click a ship</strong> in the cluster · then <strong>box-drag</strong> over the planet · different result',
    setup(){
      const px = W*0.40, py = H*0.55;
      ents.push(make('planet', px, py));
      for(let i=0;i<12;i++){
        const ang = (i/12)*Math.PI*2 + Math.random()*0.3;
        const rad = 65 + Math.random()*45;
        const s = make('ship', px+Math.cos(ang)*rad, py+Math.sin(ang)*rad);
        s.vx = -Math.sin(ang)*0.4;
        s.vy = Math.cos(ang)*0.4;
        s.dir = ang + Math.PI/2;
        ents.push(s);
      }
      ents.push(make('planet', W*0.78, H*0.30));
      spawn('asteroid', 80, {region:'wide'});
      spawn('enemy', 4, {region:'edges'});
    }
  },
  {
    id:'modifier', name:'Modifier', icon:'⌘', accent:'#ffc832',
    head:'Hold <em>Modifier</em>',
    desc:'Hold Cmd / Ctrl while clicking to add to your selection. Click an already-selected entity to remove just that one.',
    notes:[
      'Hold <code>⌘</code> or <code>Ctrl</code> + click → adds to selection.',
      'Click a selected entity (with modifier) → removes it.',
      'Mobile: tap the <strong>⌘ HOLD</strong> button to toggle modifier mode.'
    ],
    hint:'Click a ship · then <code>⌘-click</code> more · then <code>⌘-click</code> a selected one to remove it',
    setup(){
      spawn('ship', 14, {region:'wide'});
      spawn('enemy', 4, {region:'wide'});
      spawn('asteroid', 40, {region:'wide'});
    }
  },
  {
    id:'lock', name:'Category Lock', icon:'⊠', accent:'#c878d8',
    head:'Category <em>Lock</em>',
    desc:'You can never mix types in one selection. Selecting a new category replaces the old one — even with modifier held.',
    notes:[
      'Selection is always single-category.',
      'Click a different type → previous selection drops out.',
      '<code>⌘-click</code> empty space → nothing happens (safe).'
    ],
    hint:'Select some ships · then click an asteroid · <strong>the ships are released</strong>',
    setup(){
      spawn('ship', 10, {region:'left'});
      spawn('asteroid', 50, {region:'right'});
      spawn('enemy', 3, {region:'wide'});
      spawn('planet', 2, {region:'wide'});
    }
  },
  {
    id:'modules', name:'Zoom & Modules', icon:'◇', accent:'#4ad8e0',
    head:'Zoom &amp; <em>Modules</em>',
    desc:'Zoom in past the threshold and a station decomposes into its individual modules. Each one becomes clickable.',
    notes:[
      'Low zoom → station is one entity.',
      'High zoom → individual modules become clickable.',
      'Threshold has hysteresis — no flickering at the boundary.'
    ],
    hint:'Use <code>+ ZOOM</code> · station breaks into modules at high zoom · click any module',
    enableZoom:true,
    setup(){
      state.stationCenter = {x:W*0.50, y:H*0.55};
      rebuildStation();
      spawn('ship', 6, {region:'edges'});
      spawn('enemy', 2, {region:'edges'});
      spawn('asteroid', 70, {region:'wide'});
    }
  }
];

/* ════════════════════════════════════════════════════════════════════
   STATE
   ──────────────────────────────────────────────────────────────────── */
const state = {
  scnIdx: 0, mod: false, kbMod: false,
  zoom: 1.0, zoomVisible: false,
  drag: null, stationCenter: null,
  t: 0,
};
let ents = [];
let W=0, H=0;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const dpr = window.devicePixelRatio||1;

/* ════════════════════════════════════════════════════════════════════
   ENTITY CONSTRUCTION
   ──────────────────────────────────────────────────────────────────── */
function make(type, x, y){
  const t = TYPES[type];
  const e = {
    type, x, y, sel:false,
    vx: t.drift ? (Math.random()-0.5)*0.3 : 0,
    vy: t.drift ? (Math.random()-0.5)*0.3 : 0,
    dir: Math.random()*Math.PI*2,
    spin: t.spin ? (Math.random()-0.5)*2*t.spin : 0,
  };
  if(type==='asteroid'){
    const n = 8 + Math.floor(Math.random()*4);
    e.verts = [];
    for(let i=0;i<n;i++){
      const a = (i/n)*Math.PI*2;
      const r = 0.7 + Math.random()*0.4;
      e.verts.push({a,r});
    }
  }
  if(type==='star'){
    e.twinkle = Math.random()*Math.PI*2;
  }
  return e;
}

function spawn(type, n, opts){
  opts = opts||{};
  for(let i=0;i<n;i++){
    const t = TYPES[type];
    let x, y, tries=0;
    do{
      if(opts.region==='left')        x = W*0.06 + Math.random()*W*0.32;
      else if(opts.region==='right')  x = W*0.58 + Math.random()*W*0.36;
      else if(opts.region==='edges')  x = Math.random()<0.5 ? W*0.06 + Math.random()*W*0.20 : W*0.74 + Math.random()*W*0.20;
      else if(opts.region==='corners'){const cx=Math.random()<0.5?0.10:0.85; x = W*cx + Math.random()*W*0.05;}
      else                            x = W*0.05 + Math.random()*W*0.90;
      if(opts.region==='corners')     y = (Math.random()<0.5?0.12:0.82)*H + Math.random()*H*0.06;
      else                            y = H*0.15 + Math.random()*H*0.72;
      tries++;
    } while(tooClose(x,y,type==='asteroid'?t.r-2:t.r+8,type) && tries<40);
    ents.push(make(type, x, y));
  }
}

function tooClose(x,y,r,fromType){
  return ents.some(e=>{
    const tr = TYPES[e.type].r;
    // Asteroid-vs-asteroid allow tighter packing (just don't visually overlap)
    if(fromType==='asteroid' && e.type==='asteroid') return Math.hypot(e.x-x, e.y-y) < r+tr-6;
    return Math.hypot(e.x-x, e.y-y) < r+tr;
  });
}

function rebuildStation(){
  if(!state.stationCenter) return;
  ents = ents.filter(e => e.type!=='station' && e.type!=='module');
  const c = state.stationCenter;
  const z = state.zoom;
  const wasVisible = state.zoomVisible;
  state.zoomVisible = wasVisible ? z>=1.6 : z>=2.2;
  if(state.zoomVisible){
    const sp = 22 * z * 0.55;
    MODULE_LIB.forEach((m,i)=>{
      const col = i%4, row = (i/4)|0;
      const e = make('module', c.x + (col-1.5)*sp, c.y + (row-0.5)*sp);
      e.subType = m.sub;
      e.subLetter = m.letter;
      e.subColor = m.color;
      ents.push(e);
    });
  } else {
    const e = make('station', c.x, c.y);
    e.scale = Math.max(0.7, z*0.85);
    ents.push(e);
  }
}

/* ════════════════════════════════════════════════════════════════════
   SCENARIO LIFECYCLE
   ──────────────────────────────────────────────────────────────────── */
function loadScenario(i){
  state.scnIdx = i;
  state.drag = null;
  state.zoom = 1.0;
  state.zoomVisible = false;
  ents = [];
  const s = SCENARIOS[i];
  s.setup();
  document.getElementById('hud-scn').textContent = String(i+1).padStart(2,'0')+'/'+String(SCENARIOS.length).padStart(2,'0');
  document.querySelectorAll('.scn-card').forEach((b,k)=>b.classList.toggle('active',k===i));
  const hint = document.getElementById('hint');
  hint.innerHTML = s.hint;
  hint.style.setProperty('--ac', s.accent);
  document.getElementById('scnHead').innerHTML = s.head;
  document.getElementById('scnHead').style.setProperty('--ac', s.accent);
  document.getElementById('scnDesc').textContent = s.desc;
  const notes = document.getElementById('scnNotes');
  notes.innerHTML = '';
  notes.style.setProperty('--ac', s.accent);
  s.notes.forEach(n=>{ const li=document.createElement('li'); li.innerHTML=n; notes.appendChild(li); });
  document.getElementById('sel').style.setProperty('--ac', s.accent);
  const showZoom = !!s.enableZoom;
  document.getElementById('zoomIn').style.display = showZoom?'':'none';
  document.getElementById('zoomOut').style.display = showZoom?'':'none';
  updateSelReadout();
}

function resetScenario(){ loadScenario(state.scnIdx); }

function adjustZoom(dir){
  state.zoom = Math.max(0.5, Math.min(3.2, state.zoom + dir*0.4));
  rebuildStation();
  flash('Zoom: '+state.zoom.toFixed(1)+'×', 'info');
}

/* ════════════════════════════════════════════════════════════════════
   SELECTION LOGIC
   ──────────────────────────────────────────────────────────────────── */
function modActive(e){ return state.mod || (e && (e.ctrlKey||e.metaKey)); }

function hitTest(mx,my){
  return ents.filter(en=>{
    const t = TYPES[en.type];
    const r = t.r * (en.scale||1) + 5;
    return Math.hypot(en.x-mx, en.y-my) <= r;
  });
}

function boxOverlap(en, x1, y1, x2, y2){
  const t = TYPES[en.type];
  const r = t.r * (en.scale||1);
  return en.x+r>x1 && en.x-r<x2 && en.y+r>y1 && en.y-r<y2;
}

function doClick(mx, my, mod){
  const hits = hitTest(mx, my);
  if(!hits.length){
    if(!mod){
      const had = ents.some(e=>e.sel);
      ents.forEach(e=>e.sel=false);
      if(had) flash('Selection cleared');
    } else { flash('Selection preserved', 'info'); }
    return;
  }
  hits.sort((a,b)=>TYPES[a.type].clickPri - TYPES[b.type].clickPri);
  const pick = hits[0];
  if(mod){
    const cur = ents.find(e=>e.sel);
    if(cur && cur.type !== pick.type){
      ents.forEach(e=>e.sel=false);
      pick.sel = true;
      flash('Category lock — switched to '+TYPES[pick.type].label,'info');
    } else { pick.sel = !pick.sel; }
  } else {
    ents.forEach(e=>e.sel=false);
    pick.sel = true;
  }
}

function doBox(x1,y1,x2,y2,mod){
  const inside = ents.filter(en=>boxOverlap(en,x1,y1,x2,y2));
  if(!inside.length){
    if(!mod){ const had=ents.some(e=>e.sel); ents.forEach(e=>e.sel=false); if(had) flash('Selection cleared'); }
    else flash('Selection preserved', 'info');
    return;
  }
  inside.sort((a,b)=>TYPES[a.type].boxPri - TYPES[b.type].boxPri);
  const bestType = inside[0].type;
  const winners = inside.filter(e=>e.type===bestType);
  if(mod){
    const cur = ents.find(e=>e.sel);
    if(cur && cur.type !== bestType){
      ents.forEach(e=>e.sel=false);
      winners.forEach(e=>e.sel=true);
      flash('Category lock — switched to '+TYPES[bestType].label,'info');
    } else { winners.forEach(e=>e.sel=true); }
  } else {
    ents.forEach(e=>e.sel=false);
    winners.forEach(e=>e.sel=true);
  }
}

/* ════════════════════════════════════════════════════════════════════
   INPUT
   ──────────────────────────────────────────────────────────────────── */
function getPt(e){
  const r = cv.getBoundingClientRect();
  if(e.touches && e.touches.length){
    return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  }
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function onDown(e){
  e.preventDefault();
  const p = getPt(e);
  state.drag = {sx:p.x, sy:p.y, cx:p.x, cy:p.y, active:false, mod:modActive(e)};
}
function onMove(e){
  if(!state.drag) return;
  e.preventDefault();
  const p = getPt(e);
  state.drag.cx = p.x; state.drag.cy = p.y;
  if(Math.hypot(p.x-state.drag.sx, p.y-state.drag.sy) > 6) state.drag.active = true;
}
function onUp(e){
  if(!state.drag) return;
  e.preventDefault();
  let endX=state.drag.cx, endY=state.drag.cy;
  if(e.changedTouches && e.changedTouches[0]){
    const r = cv.getBoundingClientRect();
    endX = e.changedTouches[0].clientX-r.left;
    endY = e.changedTouches[0].clientY-r.top;
  }
  const mod = state.drag.mod || modActive(e);
  if(state.drag.active){
    const x1=Math.min(state.drag.sx, endX), x2=Math.max(state.drag.sx, endX);
    const y1=Math.min(state.drag.sy, endY), y2=Math.max(state.drag.sy, endY);
    doBox(x1,y1,x2,y2,mod);
  } else {
    doClick(state.drag.sx, state.drag.sy, mod);
  }
  state.drag = null;
  updateSelReadout();
}

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('mouseleave', ()=>{ state.drag = null; });
cv.addEventListener('touchstart', onDown, {passive:false});
cv.addEventListener('touchmove', onMove, {passive:false});
cv.addEventListener('touchend', onUp, {passive:false});

window.addEventListener('keydown', e=>{
  if(e.key==='Control'||e.key==='Meta'){
    state.kbMod = true;
    document.getElementById('hud-mod').textContent = state.mod||state.kbMod ? 'ON' : 'OFF';
  }
  if(e.key==='r'||e.key==='R'){ resetScenario(); }
});
window.addEventListener('keyup', e=>{
  if(e.key==='Control'||e.key==='Meta'){
    state.kbMod = false;
    document.getElementById('hud-mod').textContent = state.mod||state.kbMod ? 'ON' : 'OFF';
  }
});

function toggleMod(){
  state.mod = !state.mod;
  document.getElementById('modBtn').classList.toggle('active', state.mod);
  document.getElementById('hud-mod').textContent = state.mod||state.kbMod ? 'ON' : 'OFF';
}

/* ════════════════════════════════════════════════════════════════════
   READOUTS
   ──────────────────────────────────────────────────────────────────── */
function updateSelReadout(){
  const sel = ents.filter(e=>e.sel);
  document.getElementById('hud-sel').textContent = sel.length;
  document.getElementById('hud-ents').textContent = ents.length;
  const bar = document.getElementById('sel');
  if(!sel.length){
    bar.textContent = 'Nothing selected';
    bar.classList.remove('has-sel');
  } else {
    const t = TYPES[sel[0].type];
    bar.classList.add('has-sel');
    bar.innerHTML = '<strong style="color:'+t.color+'">'+sel.length+'</strong> '+t.label+(sel.length>1?'s':'')+' selected';
  }
}

let toastTimer;
function flash(msg, kind){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (kind?(' '+kind):'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1600);
}

/* ════════════════════════════════════════════════════════════════════
   RENDERING — CRT glow vectors
   ──────────────────────────────────────────────────────────────────── */
function resize(){
  const r = document.querySelector('.canvas-area').getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function drawGrid(){
  ctx.strokeStyle = 'rgba(80,130,200,0.045)';
  ctx.lineWidth = 1;
  const g = 50;
  for(let x=0;x<W;x+=g){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=g){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function glow(color, sel, baseBlur){
  ctx.shadowBlur = sel ? baseBlur*1.8 : baseBlur;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = sel ? 2 : 1.4;
}

function drawSelHalo(x,y,r,color){
  ctx.save();
  ctx.shadowBlur = 14; ctx.shadowColor = color;
  ctx.strokeStyle = color; ctx.lineWidth = 1;
  ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.arc(x,y,r+9,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function shape_ship(r){
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(-r*0.8, -r*0.75);
  ctx.lineTo(-r*0.45, 0);
  ctx.lineTo(-r*0.8, r*0.75);
  ctx.closePath();
  ctx.stroke();
}

function shape_enemy(r){
  ctx.beginPath();
  ctx.moveTo(r*1.05, 0);
  ctx.lineTo(0, -r*0.6);
  ctx.lineTo(-r*1.05, 0);
  ctx.lineTo(0, r*0.6);
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-r*0.5, 0); ctx.lineTo(r*0.5, 0);
  ctx.stroke();
}

function shape_planet(r){
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r,0); ctx.lineTo(r,0); ctx.stroke();
  for(let i=1;i<3;i++){
    const y = (i/3)*r;
    const xs = Math.sqrt(r*r - y*y);
    ctx.beginPath(); ctx.moveTo(-xs,y); ctx.lineTo(xs,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-xs,-y); ctx.lineTo(xs,-y); ctx.stroke();
  }
}

function shape_station(r){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a = (i/6)*Math.PI*2;
    const x = Math.cos(a)*r, y = Math.sin(a)*r;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0,-r*0.7); ctx.lineTo(0,r*0.7);
  ctx.moveTo(-r*0.7,0); ctx.lineTo(r*0.7,0);
  ctx.stroke();
  ctx.strokeRect(-r*0.42,-r*0.42,r*0.84,r*0.84);
}

function shape_asteroid(verts, r){
  ctx.beginPath();
  verts.forEach((v,i)=>{
    const x = Math.cos(v.a)*v.r*r;
    const y = Math.sin(v.a)*v.r*r;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.closePath(); ctx.stroke();
}

function shape_star(r, twinkle){
  const pulse = 0.85 + 0.15*Math.sin(twinkle + state.t*0.06);
  ctx.beginPath(); ctx.arc(0,0,r*0.32*pulse,0,Math.PI*2); ctx.stroke();
  const spikes = 12;
  for(let i=0;i<spikes;i++){
    const a = (i/spikes)*Math.PI*2;
    const inner = r * 0.48;
    const outer = r * (i%2 ? 0.78 : 1.0) * pulse;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*inner, Math.sin(a)*inner);
    ctx.lineTo(Math.cos(a)*outer, Math.sin(a)*outer);
    ctx.stroke();
  }
}

function shape_module(r, letter, color){
  ctx.strokeRect(-r,-r,r*2,r*2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = color;
  ctx.font = 'bold 11px JetBrains Mono';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(letter, 0, 0.5);
}

function drawEntity(e){
  const t = TYPES[e.type];
  const r = t.r * (e.scale||1);
  const color = e.subColor || t.color;

  if(e.sel) drawSelHalo(e.x, e.y, r, color);

  ctx.save();
  ctx.translate(e.x, e.y);
  if(e.type==='ship'||e.type==='enemy'||e.type==='asteroid'||e.type==='planet'){
    ctx.rotate(e.dir);
  }
  glow(color, e.sel, t.shape==='star' ? 18 : t.shape==='planet' ? 16 : t.shape==='asteroid' ? 6 : 11);

  switch(t.shape){
    case 'ship':     shape_ship(r); break;
    case 'enemy':    shape_enemy(r); break;
    case 'planet':   shape_planet(r); break;
    case 'station':  shape_station(r); break;
    case 'asteroid': shape_asteroid(e.verts, r); break;
    case 'star':     shape_star(r, e.twinkle||0); break;
    case 'module':   shape_module(r, e.subLetter||'M', color); break;
  }
  ctx.restore();
}

function drawDrag(){
  if(!state.drag || !state.drag.active) return;
  const x1=Math.min(state.drag.sx, state.drag.cx);
  const y1=Math.min(state.drag.sy, state.drag.cy);
  const x2=Math.max(state.drag.sx, state.drag.cx);
  const y2=Math.max(state.drag.sy, state.drag.cy);
  ctx.fillStyle = 'rgba(150,200,255,0.05)';
  ctx.fillRect(x1,y1,x2-x1,y2-y1);
  ctx.save();
  ctx.shadowBlur = 8;
  ctx.shadowColor = 'rgba(150,200,255,0.5)';
  ctx.strokeStyle = 'rgba(150,200,255,0.65)';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([6,4]);
  ctx.strokeRect(x1,y1,x2-x1,y2-y1);
  ctx.setLineDash([]);
  ctx.restore();

  const inside = ents.filter(en=>boxOverlap(en,x1,y1,x2,y2));
  if(inside.length){
    inside.sort((a,b)=>TYPES[a.type].boxPri-TYPES[b.type].boxPri);
    const bestType = inside[0].type;
    inside.filter(e=>e.type===bestType).forEach(e=>{
      const t = TYPES[e.type];
      const r = t.r*(e.scale||1);
      ctx.save();
      ctx.shadowBlur = 10; ctx.shadowColor = t.color;
      ctx.strokeStyle = t.color; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(e.x, e.y, r+6, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    });
  }
}

function render(){
  resize();
  state.t += 1;

  // Phosphor trail: alpha veil instead of hard clear
  ctx.fillStyle = 'rgba(7,10,16,0.32)';
  ctx.fillRect(0,0,W,H);

  drawGrid();

  ents.forEach(e=>{
    const t = TYPES[e.type];
    if(t.drift){
      e.x += e.vx; e.y += e.vy;
      const pad = 30;
      if(e.x<pad){ e.x=pad; e.vx*=-1; }
      if(e.x>W-pad){ e.x=W-pad; e.vx*=-1; }
      if(e.y<pad){ e.y=pad; e.vy*=-1; }
      if(e.y>H-pad){ e.y=H-pad; e.vy*=-1; }
    }
    if(t.spin) e.dir += e.spin;
  });

  const sorted = ents.slice().sort((a,b)=>TYPES[b.type].r - TYPES[a.type].r);
  sorted.forEach(drawEntity);

  drawDrag();
  requestAnimationFrame(render);
}

/* ════════════════════════════════════════════════════════════════════
   SIDEBAR LEGEND
   ──────────────────────────────────────────────────────────────────── */
function drawLegendPip(type){
  const c = document.createElement('canvas');
  const s = 22;
  c.width = s*dpr; c.height = s*dpr;
  c.style.width = s+'px'; c.style.height = s+'px';
  const lc = c.getContext('2d');
  lc.setTransform(dpr,0,0,dpr,0,0);
  const T = TYPES[type];
  const r = 8;
  lc.translate(s/2, s/2);
  lc.shadowBlur = 6;
  lc.shadowColor = T.color;
  lc.strokeStyle = T.color;
  lc.lineWidth = 1.4;
  lc.fillStyle = T.color;
  switch(T.shape){
    case 'ship':
      lc.beginPath();
      lc.moveTo(r, 0);
      lc.lineTo(-r*0.8, -r*0.75);
      lc.lineTo(-r*0.45, 0);
      lc.lineTo(-r*0.8, r*0.75);
      lc.closePath(); lc.stroke(); break;
    case 'enemy':
      lc.beginPath();
      lc.moveTo(r,0); lc.lineTo(0,-r*0.6); lc.lineTo(-r,0); lc.lineTo(0,r*0.6); lc.closePath(); lc.stroke();
      break;
    case 'planet':
      lc.beginPath(); lc.arc(0,0,r*0.85,0,Math.PI*2); lc.stroke();
      lc.beginPath(); lc.moveTo(-r*0.85,0); lc.lineTo(r*0.85,0); lc.stroke();
      break;
    case 'station':
      lc.beginPath();
      for(let i=0;i<6;i++){
        const a=(i/6)*Math.PI*2;
        const x=Math.cos(a)*r*0.85, y=Math.sin(a)*r*0.85;
        if(i===0) lc.moveTo(x,y); else lc.lineTo(x,y);
      }
      lc.closePath(); lc.stroke();
      lc.strokeRect(-r*0.35,-r*0.35,r*0.7,r*0.7);
      break;
    case 'module':
      lc.strokeRect(-r*0.7,-r*0.7,r*1.4,r*1.4);
      lc.shadowBlur=0; lc.font='bold 9px JetBrains Mono';
      lc.textAlign='center'; lc.textBaseline='middle'; lc.fillText('F',0,0.5);
      break;
    case 'asteroid':
      lc.beginPath();
      const verts = 9;
      for(let i=0;i<verts;i++){
        const a=(i/verts)*Math.PI*2;
        const rr = r*(0.75 + (i%3===0?0.25:i%2===0?0.10:0.0));
        const x=Math.cos(a)*rr, y=Math.sin(a)*rr;
        if(i===0) lc.moveTo(x,y); else lc.lineTo(x,y);
      }
      lc.closePath(); lc.stroke();
      break;
    case 'star':
      lc.beginPath(); lc.arc(0,0,r*0.28,0,Math.PI*2); lc.stroke();
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2;
        lc.beginPath();
        lc.moveTo(Math.cos(a)*r*0.45, Math.sin(a)*r*0.45);
        lc.lineTo(Math.cos(a)*r*0.85, Math.sin(a)*r*0.85);
        lc.stroke();
      }
      break;
  }
  return c;
}

function buildLegends(){
  const types = Object.keys(TYPES);
  const legendC = types.slice().sort((a,b)=>TYPES[a].clickPri-TYPES[b].clickPri);
  const legendB = types.slice().sort((a,b)=>TYPES[a].boxPri-TYPES[b].boxPri);
  function row(t, pri){
    const T = TYPES[t];
    const div = document.createElement('div');
    div.className = 'legend-row';
    const pip = document.createElement('span');
    pip.className = 'lpip';
    pip.appendChild(drawLegendPip(t));
    div.appendChild(pip);
    const name = document.createElement('span');
    name.textContent = T.label;
    div.appendChild(name);
    const pri_el = document.createElement('span');
    pri_el.className = 'lpri';
    pri_el.textContent = '#'+pri;
    div.appendChild(pri_el);
    return div;
  }
  const lc = document.getElementById('legendC');
  const lb = document.getElementById('legendB');
  lc.innerHTML = ''; lb.innerHTML = '';
  legendC.forEach((t,i)=>lc.appendChild(row(t,i+1)));
  legendB.forEach((t,i)=>lb.appendChild(row(t,i+1)));
}

function buildScnBar(){
  const bar = document.getElementById('scnBar');
  bar.innerHTML = SCENARIOS.map((s,i)=>(
    '<button class="scn-card" data-idx="'+i+'" style="--ac:'+s.accent+'" onclick="loadScenario('+i+')">'+
      '<span class="scn-ico">'+s.icon+'</span>'+
      '<span class="scn-meta">'+
        '<span class="scn-num">'+String(i+1).padStart(2,'0')+'</span>'+
        '<span class="scn-name">'+s.name+'</span>'+
      '</span>'+
    '</button>'
  )).join('');
}

/* ════════════════════════════════════════════════════════════════════
   MOBILE DRAWER
   ──────────────────────────────────────────────────────────────────── */
function toggleDrawer(){
  const panel = document.getElementById('sideR');
  const fab = document.getElementById('fab');
  const bd = document.getElementById('bd');
  const willOpen = !panel.classList.contains('open');
  panel.classList.toggle('open', willOpen);
  fab.classList.toggle('open', willOpen);
  bd.classList.toggle('show', willOpen);
}
function closeDrawer(){
  document.getElementById('sideR').classList.remove('open');
  document.getElementById('fab').classList.remove('open');
  document.getElementById('bd').classList.remove('show');
}

buildScnBar();
resize();
buildLegends();
window.addEventListener('resize', ()=>{ resize(); });
loadScenario(0);
render();

try{ if(window.self!==window.top) document.body.classList.add('in-frame'); }catch(e){ document.body.classList.add('in-frame'); }
</script>

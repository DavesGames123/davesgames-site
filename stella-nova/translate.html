<style>
:root{--bg:#0e1118;--bg2:#141826;--bg3:#1a2032;--surface:#1c2436;--surface2:#243040;--border:rgba(150,200,255,0.12);--border-b:rgba(150,200,255,0.22);--blue:#96c8ff;--blue-dim:#7caee0;--blue-faint:rgba(150,200,255,0.08);--yellow:#ffc832;--yellow-dim:#dca838;--yellow-faint:rgba(255,200,50,0.06);--green:#7ad87a;--red:#e87466;--amber:#ffb84d;--text:#dde3f0;--text-dim:#a4b0ce;--text-faint:#7682a0;--text-bright:#f4f7fc;--scan:rgba(0,0,0,0.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg)}
body{font-family:'JetBrains Mono',monospace;color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-y:auto}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);mix-blend-mode:multiply}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.3))}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(150,200,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(150,200,255,0.022) 1px,transparent 1px),linear-gradient(rgba(150,200,255,0.008) 1px,transparent 1px),linear-gradient(90deg,rgba(150,200,255,0.008) 1px,transparent 1px);background-size:300px 300px,300px 300px,50px 50px,50px 50px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
#app{position:relative;z-index:10;width:100%;max-width:1200px;margin:0 auto;padding-bottom:60px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:46px;background:rgba(14,17,24,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-l{display:flex;align-items:center;gap:1.4rem}
.sys-name{color:var(--text-bright);font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.15rem;letter-spacing:0.12em}
.sys-status{display:flex;align-items:center;gap:0.4rem;color:var(--green);font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:600}
.sys-status::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar-r{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);font-weight:500}
.topbar-r strong{color:var(--blue);font-weight:600}
.in-frame .topbar{display:none!important}
.flag-bar{padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(14,17,24,0.6)}
.flag-bar-label{font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-faint);margin-bottom:0.6rem;font-weight:600}
.flags{display:flex;flex-wrap:wrap;gap:5px}
.flag{width:50px;height:38px;background:var(--bg2);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;filter:grayscale(1) brightness(0.5);opacity:0.5}
.flag:hover{filter:grayscale(0.5) brightness(0.7);opacity:0.7;border-color:var(--border-b)}
.flag.active{filter:none;opacity:1;border-color:var(--yellow);background:var(--yellow-faint);box-shadow:0 0 12px rgba(255,200,50,0.15)}
.flag.ref{filter:none;opacity:0.7;border-color:var(--blue-dim);cursor:default}
.flag-emoji{font-size:1.2rem;line-height:1}.flag-code{font-size:0.42rem;letter-spacing:0.06em;color:var(--text-faint);margin-top:1px;font-weight:600;text-transform:uppercase}
.flag.active .flag-code{color:var(--yellow)}.flag-pct{font-size:0.38rem;color:var(--green);font-weight:700}
.cat-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(14,17,24,0.4)}
.cat-tab{flex:1;padding:12px 16px;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;color:var(--text-faint);cursor:pointer;transition:all 0.15s;text-align:center;border:none;border-bottom:2px solid transparent;background:transparent;font-family:inherit}
.cat-tab:hover{color:var(--text);background:rgba(150,200,255,0.03)}
.cat-tab.active{color:var(--cat-c,var(--blue));border-bottom-color:var(--cat-c,var(--blue));background:rgba(150,200,255,0.04)}
.tab-ct{font-size:0.58rem;opacity:0.6;margin-left:4px;font-weight:500}
.controls{padding:0.7rem 1.5rem;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:0.6rem;align-items:center;background:rgba(14,17,24,0.4)}
.cg{display:flex;align-items:center;gap:0.4rem}
.cl{font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);font-weight:600;white-space:nowrap}
.si{background:var(--bg2);border:1px solid var(--border-b);color:var(--text-bright);font-family:inherit;font-size:0.78rem;padding:6px 10px;outline:none;transition:border-color 0.2s;width:200px;font-weight:500}
.si:focus{border-color:var(--blue)}.si::placeholder{color:var(--text-faint)}
select{background:var(--bg2);border:1px solid var(--border-b);color:var(--text-bright);font-family:inherit;font-size:0.72rem;padding:6px 8px;outline:none;cursor:pointer;font-weight:500}
.fb{background:transparent;border:1px solid var(--border-b);color:var(--text-dim);font-family:inherit;font-size:0.62rem;letter-spacing:0.06em;text-transform:uppercase;padding:5px 10px;cursor:pointer;transition:all 0.15s;font-weight:600;white-space:nowrap}
.fb:hover{border-color:var(--blue);color:var(--blue)}.fb.active{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-faint)}
.pw{padding:0.6rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.8rem}
.pb{flex:1;height:5px;background:rgba(150,200,255,0.08);overflow:hidden}.pf{height:100%;background:linear-gradient(90deg,var(--yellow-dim),var(--yellow));transition:width 0.4s}
.pt{font-size:0.7rem;color:var(--yellow);font-weight:700;white-space:nowrap;min-width:40px;text-align:right}
.pd{font-size:0.58rem;color:var(--text-faint);font-weight:500;white-space:nowrap}
.sh{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 1.5rem 0.4rem;border-bottom:1px solid var(--border);background:rgba(150,200,255,0.02)}
.sb{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:2px 7px;font-weight:700;border:1px solid;opacity:0.8}
.sn{font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-bright);font-weight:600}
.sc{font-size:0.58rem;color:var(--text-faint);margin-left:auto;font-weight:500}
.tr{padding:0.55rem 1.5rem;border-bottom:1px solid rgba(150,200,255,0.05);transition:background 0.12s}
.tr:hover{background:rgba(150,200,255,0.02)}.tr.done{border-left:2px solid var(--green)}.tr.mt{border-left:2px solid transparent}
.tk{font-size:0.58rem;color:var(--text-faint);letter-spacing:0.05em;font-weight:500;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.hp{font-size:0.46rem;color:var(--amber);border:1px solid rgba(255,184,77,0.3);padding:1px 4px;font-weight:700}
.te{font-size:0.82rem;color:var(--text);margin-bottom:5px;line-height:1.45;font-weight:400}.te .ph{color:var(--amber);font-weight:600}
.ir{display:flex;gap:5px;align-items:flex-start}
.ti{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text-bright);font-family:inherit;font-size:0.78rem;padding:6px 8px;outline:none;transition:border-color 0.2s;resize:vertical;min-height:30px;line-height:1.4;font-weight:500}

.tc{background:transparent;border:1px solid var(--border);color:var(--text-faint);font-family:inherit;font-size:0.65rem;padding:6px 7px;cursor:pointer;transition:all 0.15s;font-weight:600;flex-shrink:0;line-height:1}

.xa{display:flex;gap:6px}

.em{padding:1.5rem;text-align:center;font-size:0.78rem;color:var(--text-faint)}

.su{background:transparent;border:1px solid rgba(100,200,100,0.3);color:var(--green);font-family:inherit;font-size:0.7rem;padding:5px 8px;cursor:pointer;transition:all 0.15s;font-weight:600;flex-shrink:0;line-height:1;letter-spacing:0.08em;text-transform:uppercase;opacity:0.5}
.su:hover{border-color:var(--green);opacity:1;background:rgba(100,200,100,0.08)}
.su.sent{border-color:var(--green);color:var(--green);opacity:1;pointer-events:none}
.ty{font-size:0.65rem;color:var(--green);font-weight:600;padding:4px 8px;animation:tyFade 3s ease forwards;white-space:nowrap}
@keyframes tyFade{0%{opacity:1}70%{opacity:1}100%{opacity:0.3}}
.flag.en{border-color:var(--blue-dim);background:var(--blue-faint)}
.flag.en .flag-code{color:var(--blue)}
.flag.en.active{border-color:var(--yellow);background:var(--yellow-faint)}
.flag.en.active .flag-code{color:var(--yellow)}

tal})", "Fuel", "T1 Smelting", "T2 Alloys", "T3 Electronics", "T3 Mechanical", "T3 Power", "T3 Specialized", "Building", "Collecting", "Elevator", "Harvesting", "Idle", "Mining", "Resting", "Searching", "Smelting", "Visiting", "Energy", "Food", "Health", "Work", "CREW IN CRYOSLEEP", "No citizens on this planet", "No crew commissioned to this station", "No station selected", "Critically wounded!", "Exhausted - seeking rest", "Getting tired", "Healthy", "Hungry - will eat during rest", "Minor injuries", "No active work task", "Well rested", "Satisfied", "STARVING - losing health!", "Tired", "Very hungry", "Well fed", "Wounded", "Build", "Collect", "Harvest", "Mine", "Rest", "Search", "Smelt", "Assign to collect", "Assign to construct", "Assign to harvest food", "Assign to process materials", "Assign to mine", "Assign to search", "Unassigned Citizens ({count})", "BUILDING {pct}%", "GATHERING {pct}%", "ACTIVE STATION", "Commands", "CONSTRUCTION", "CREW · {count} · {assigned} of {total}", "CREW · {count} ships", "AUTO-PAUSE RULES", "Chaotic", "Cinematic slow-motion", "EVENT PRESENTATION", "Gravity Matrix", "NARRATOR PACING", "Pause on story event", "Pause on visitor arrival", "PRESET", "Relaxed", "SIMULATION", "Steady", "TOOLS", "VISUAL STYLE", "Wireframe visual styling", "Center the world camera on this station", "DEMOLISH", "Done", "Focus on station", "Insufficient resources at parent station", "Insufficient resources", "LOCK VIEW", "Reset", "COLONY CORE", "Drawing: {module}  (Esc / Right-click to cancel)", "Unlocked in a later tutorial step", "BUILD", "CYCLE", "JOURNAL", "STATION", "DEBUG -- INCITE EVENT", "Journal [J]", "No transmissions", "ACTIVE", "COMPLETED", "CRAFTING", "The Journal", "Assembler", "Alloy forge. Click after placing to assign a recipe. Crafts steel, glass, carbon fiber, copper wire, and other materials from ingots.", "Assembler", "Comp Lab", "Advanced workshop. Click after placing to assign a recipe. Builds circuit boards, batteries, thrusters, and other components.", "Component Lab", "Quarters", "Living quarters. Houses crew and increases station population capacity.", "Crew Quarters", "Docking", "Docking bay. Required for crew arrivals, visitors, and trade ships.", "Docking Bay", "Dock Port", "External dock. Provides additional ship berth capacity for visitors.", "Docking Port", "Foundry", "Ore smelter. Place between ore storage and an output bay. Auto-smelts iron, copper, aluminum, titanium, and other ores into ingots.", "Foundry", "Fuel Proc", "Fuel refinery. Click after placing to assign a recipe. Produces oxidized fuel from carbon brick, aluminum, and rare earth.", "Fuel Processor", "Greenhouse", "Hydroponic farm. Produces food automatically when built. Output goes to adjacent enclosed storage.", "Greenhouse", "Hopper", "Automated transport. Moves resources between adjacent storage regions.", "Hopper", "Medical", "Medical ward. Treats injuries and boosts crew health recovery rate.", "Medical Bay", "Rec Room", "Crew lounge. Boosts morale and reduces stress during rest periods.", "Recreation", "Shield", "Defensive barrier. Protects the station from impacts and radiation.", "Shield Generator", "Core", "Station foundation. Provides docking, logistics, and initial crew housing.", "Colony Core", "Walls", "Structural wall (orange). Encloses regions for storage.", "Structure (Orange)", "Walls", "Structural wall. Encloses regions to create storage bays and corridors.", "Structure (White)", "Thruster", "Maneuvering engine. Enables orbital adjustments. Consumes oxidized fuel.", "Thruster", "Botanist — Agriculture +4, Logistics +2", "Engineer — Construction +4, Mining +2", "Hauler — Logistics +4, Construction +2", "Metallurgist — Smelting +4, Mining +2", "Miner — Extraction +4, Endurance +2", "No questions asked. Thank you for your mercy, {colony}.", "That was my first honest work in years. Thank you, {colony}. I mean it.", "Fair. I earned that.", "Fair. I earned that.", "This is {name}. I need to be straight with you.\\n\\nI was part of a crew that raided supply convoys in the outer belt. Two years, three maybe? I took from people who had less than me. Every day. I'm not going to pretend it was complicated, it was wrong and I did it anyway. I did what I had to do to survive.\\n\\nI left that world behind and I've been drifting since. {qty} food and I'll work for you. I know I can't be forgiven for what I've done but I just need help.", "Outer Belt * Former Raider", "Former Raider — Mining +4, Logistics +3", "You guys have some pretty nice rocks out here... are you sure you don't have a couple I can take?", "Where can I put my rocks? This is non-negotiable, {colony}.", "This is my least favorite rock :(", "This is my least favorite rock :(", "This is {name}. I collect rocks. ROCKS!!! All kinds of rocks. Green rocks, shiny rocks, pink rocks, forty seven rocks from forty seven systems.\\n\\nI need {qty} food. And a shelf. In that order. Actually the shelf first. The rocks are organized by spectral classification and I cannot stress enough how important the shelf situation is. ", "ROCKS", "I am going to share the intricate knowledge of the universe with you... just wait until I get my tinfoil back. ", "Everyone needs to see the chart. IMMEDIATELY.", "That's exactly what THEY would say. I'm adding you to the chart.", "They got to you. I knew it. Adding this system to the chart. In RED.", "The asteroids aren't random. I have proof. They've been PLACED THERE by a super intelligent race millennia ago. \\n\\nThis is {name}. I've been tracking orbital patterns for three years. The math doesn't lie. Someone is arranging the debris fields. I have a chart. You're going. to want. to see. this chart.\\n\\n{qty} food ... and I'll share everything. Also I need food because I spent my food budget primarily on my collection of chart supplies.", "Deep Space * Has Charts", "Theorist — Prospecting +3 (the paranoia helps)", "We'll see if this measures up.", "First real meal on {colony} tonight. You're welcome.", "Enjoy your gray cubes.", "Enjoy your gray cubes.", "Your crew eats nutrient paste. I can smell it from here, and I've got six inches of steel and the entire vacuum of space between me and it. \\n\\nThis is {name}. Chef. Fifteen years feeding crews across six systems. I need {qty} food  (yes, I understand the irony) because my ship's galley is offline and I'm NOT eating any nutrient paste. I have standards.", "Professional Chef * Has Opinions", "Chef — Agriculture +4, Opinions +∞", "Let's just see if you can satisfy me.", "mmmm... yes... I think you may have earned my truly most difficult to achieve rating: Four of Five stars. You should feel honored.", "One star.... I'll be sharing my review in due time. Hmph!", "Review of {colony}: promising but unreliable. Two stars. Would not recommend.", "This is {name}. I'm conducting an independent review of colonial infrastructure in this sector. Let me give you my initial take before REALLY laying in...\\n\\n{colony} is functional, but uninspired. The ore processing layout ... mmmm ... lacks ... vision. The station geometry is... adequate, but certainly nothing to write my recent lack of a home about.\\n\\nI need {qty} food to continue my survey of nearby colonies in hope of something a little less disappointing... \\n\\nIn exchange, I will ensure you receive my professional assessment, which I ASSURE you is worth more than it sounds.", "COLONY REVIEW: (Semi-non-optional)", "Critic — Logistics +4, opinions +10", "Biscuit says thank you. I also say thank you but Biscuit said it first.", "I have never seen Biscuit so excited. Welcome home girl!!", "[Biscuit will remember this]", "[Biscuit will remember this]", "This is {name}. I have a dog. Her name is Biscuit. She is a very good girl.\\n\\nBiscuit needs food badly. I also need food, but Biscuit is more important. She has been so brave.\\n\\n{qty} food for the both of us. Biscuit looked at {colony} on the scanner and wagged her tail. \\n\\nI think she likes you already.", "Good Dog Needs Food", "You're very kind. Or very blurrey.", "you got any crackers to go with that? how about some ibuprofen?", "ffffffffff- [you lose the transmission]", "ffffffffff- [you lose the transmission]", "This is... {name}. I may have iscalculated my fuel-to alcohool ratio.\\n\\nI'm reporting three emergencies. First: im so soberr right now. Second: out of fuel. Third: food. do You have a chinken but like its fried?\\n\\nI need {qty} food. Or fuel. Or the third thing. pls", "Fd and fUel Reuqestd: URGENT", "...actually, maybe I'll stay a while. If you'll have me.", "Message sent. I think I'll stay, {colony}. If that's still alright. I don't have anywhere else to go.", "I guess I'll just have to keep looking...", "I guess I'll just have to keep looking...", "This is {name} calling from the Fragile Dawn, I'm passing through your system as we speak. I don't need supplies or anywhere to dock... I just need a favor.\\n\\nI need your relay antenna. Five minutes. I want to send a message to someone I lost. Your station has the range to reach the right sector. The message is short. It just says I'm still going. That I didn't stop.", "Passing Through * Relay Request", "Traveler — decided to stay", "Excellent. I'm getting to work right away.", "I've already mapped seven high-probability extraction points. You're welcome, {colony}.", "Your loss. ", "Your loss. ", "This is {name}. I don't have what one might refer to as physical intention... I once tried to use a welding torch and the results were... well, let's just say I work better on paper.\\n\\nBut I can tell you where to dig. Orbital resonance patterns, spectral analysis, Bayesian probability mapping of resource distribution. I see the math that everyone else walks past.\\n\\n{qty} food. In exchange: I tell you where the good rocks are! What do you say?", "Orbital Analysis * Pure Math", "Mathematician — Prospecting +4, everything else +0", "Can't believe this place is real.", "I chose right. {colony} is the real thing.", "That's disappointing... I'm terrified to go back to the dark abyss...", "That's disappointing... I'm terrified to go back to the dark abyss...", "Wait... is this {colony}?? I heard rumors someone was building out here but I didn't believe it! I had to see it with my own eyes. \\n\\nThis is {name}. You probably don't remember me but I've been sector-hopping for months looking for somewhere that felt like it was going somewhere. Your relay signature matches what I heard on the network.\\n\\nDo you think you might have {qty} food for me? I won't be any trouble, swear.", "A Light in the Dark??", "yay!! I'll go get the FANCY porcelain :))", "Best day since the Cataclysm! We make a great team, {colony}!!", "I guess we'll just have to party on without you.", "Oh... boy, it sure is getting warm in here!", "This is {name} broadcasting from... a station in GREAT SHAPE. There was a MINOR thermal event on the engineering deck...\\n\\nSome folks would call it a \"fire\". I call it an AMBIANCE!!\\n\\nI need {qty} food for the crossing to {colony}. \\n\\nI'm thinking something like a nice wine and cheese platter would be PERFECT for the mixer I'm hosting in engineering :)", "fwd: fwd: fwd: Wine and Cheese Mixer", "Optimist — middling skills, infinite morale", "", "", "", "", "", "Relay Lag * 15 Messages", "ODE TO {COLONY}: Verse one of forty-seven begins NOW.", "The epic is beginning now, {colony} will be forever immortalized in verse. You cannot stop this. You won't regret this.", "I understand.\\nIt isn't planned. \\nI'll drift away \\nfor another day.", "The final stanza\\nfull of grief, \\nno food, no station,\\nno relief.", "Oh station bright...\\nOn terminal's light...\\nI need some food...\\ncause thaings ain't good...\\n\\nThis is {name}. Space Poet. Currently between meals.\\n\\n{qty} food and I shall compose an epic in your colony's honor. You have been warned.", "and he doesn't know it", "This looks right. I think this is the place they meant, {colony}.", "Promise kept.", "{f} will keep looking. The promise stands.", "{f} couldn't keep the promise. Not for lack of trying.", "This is {name}. I'm carrying a message for someone who didn't make it.\\n\\nThey asked me to find somewhere good, somewhere people look out for each other. I promised I would.", "Last Promise * Searching", "What happened to Central Command?", "{colony}, you're building something new, aren't you?", "I will find answers elsewhere... if anywhere else still exists.", "I will find answers elsewhere... if anywhere else still exists.", "AUTOMATED WAKE CYCLE: INITIATED. CRYOPOD SERIAL NUMBER: HTX-4471.\\n\\nThis is ... {name}. God I'm so nauseated... I... what year is it? My pod says I've been under for... \\n\\nwhat?\\n\\nno... that can't be right. No! Where is Relay Station Twelve? Why can't I raise Central Command? How long was I under? What happened?\\n\\nI need one meal. Then I need answers. {colony}, is that you? I don't recognize anything on my charts.", "AUTOMATED CRYOSLEEP WARNING MESSAGE", "Pre-Collapse Engineer — Construction +3, Metallurgy +2", "Appreciated, {colony}. I'm on approach.", "Docked. Where do you need me, {colony}?", "Understood. I will find somewhere else. Good luck, {colony}.", "I've moved on. Looking for another colony that wanted help.", "Broadcast to {colony}. I'm not in danger. Ship's fine. Supplies are fine, but I heard about your colony on the relay network. Sounds like you're building something real, and I'd like to be part of it. Just looking for somewhere to be useful. We're all just trying to pick up the pieces here, it's so nice to see someone putting them back together. ", "{colony} * Volunteer", "She'd have liked this crew too. Let me get started, {colony}.", "Your generosity reminds me of her a bit. She'd have approved, {colony}.", "I will find another station. No hard feelings.", "I will find another station. No hard feelings.", "This is {name}. My wife built stations for thirty years. She'd have liked this one. I'm not as good as she was (or anywhere near as decorative) but I know which end of the wrench to hold. {qty} food is all I need, and I'd be happy to pitch in. It's what she would have wanted. ", "Independent * Widower", "Widower — Construction +4, Metallurgy +3", "Excellent. Where are your kelp forests?", "I am pretty sure I just saw a space otter on the hull of your ship! I'm on my way to check it out. ", "There's another colony who needs an oceanographer.", "There's another colony who needs an oceanographer.", "This is Dr. {name}. Marine biologist. I realize my expertise is... niche, for the environment. My research shows that the fluid dynamics of asteroid belts are REMARKABLY similar to ocean currents. And I've been right three times. Possibly four! If you count the time I was almost right.\\n\\nI need {qty} food. In exchange I offer my expertise.", "Marine Biology * In Space", "Marine Biologist — Prospecting +3 (the analogy works)", "Appreciated, {colony}. I won't make you regret it.", "I'm here, and I'm staying, {colony}.", "I will find somewhere less particular about craft ownership.", "I will find somewhere less particular about craft ownership.", "This is {name}. Broadcasting to {colony}. I should be transparent: this is not my ship. I borrowed it on a pretty permanent basis.\\n\\nThe previous owner was not a good person. I'm not going to pretend it was heroic, and I'm not going to get into the details. It was traumatic, and it was survival.\\n\\n{qty} food and I'll work for you. I'm good at what I do and I don't steal from people I work with. That's the best reference I can offer.", "Borrowed Ship * Not Heroic", "I can... stay?? You really mean it??", "Cargo delivered. Manifest complete. Thank you {colony}, thank you so much.", "The manifest says nearest station. I will find the next one.", "The manifest says nearest station. I will find the next one.", "This is {name}. I'm {age} years old. My parent was a merchant hauler on the Kepler run, and they didn't make it after the Cataclysm. The manifest says this delivery goes to the nearest station. That's you.\\n\\nI'm not asking for charity. I'm just finishing a delivery. I have no idea where I'm going next.", "Kepler Run * Final Delivery", "Merchant's child — will learn fast", "See? I TOLD you they'd help!!! DOCKING!!!!", "We made it. I want to apologize for {name} for the initial broadcast. I can't wait to meet you, Captain.", "[heavy sigh] I was afraid you would say that. This can't end well for either of us. [excited screaming in the background]", "[heavy sigh] I was afraid you would say that. This can't end well for either of us. [excited screaming in the background]", "This is {name} broadcasting to {colony}. We have SKILLS. SKILLS I TELL YOU.\\n\\nWEJKNEfosiedbjonhmeturf786546e57w46q351\\n\\n...sorry about that. I'm {name2}, and that was {name}... need {qty} food. We're both experienced workers.\\n\\nWill help out howerb ghekradtonigbf WE ARE SO HERE WE ARE READY TO HELP!!! LET US IN!!!!!!!!XRDZ fsdhf;jgk\\n\\n[u\\n\\nPlease help. Before we kill each other.", "READY TO HELP!!!!!!!!!!!!!", "DEFENSE", "LIVING", "PRODUCTION", "Hover a module for details", "Drag to grid →", "MODULES", "— station functions", "BUILD COST", "there's a tutorial on!", "WALLS", "— draw on grid", "Clear {count} Pinned", "Couple", "({count} detected)", "Filter:", "Friend Group", "No crew members", "No social groups detected yet", "No matching events", "Polycule", "Social Groups", "Squad", "All", "Station:", "YOU", "Aluminum", "Aluminum Ingot", "Aluminum Wire", "Antenna Dish", "Battery Cell", "Bronze", "Carbon", "Carbon Brick", "Carbon Fiber", "Cargo Container", "Circuit Board", "Comm Module", "Composite Plate", "Copper", "Copper Ingot", "Copper Wire", "Docking Clamp", "Fabricator Unit", "Food", "Fuel Cell", "Glass", "Gold", "Gold Ingot", "Heat Exchanger", "Hydraulic Actuator", "Iron", "Iron Ingot", "Life Support Unit", "Navigation Unit", "Oxidized Fuel", "Platinum", "Platinum Ingot", "Power Regulator", "Pressure Vessel", "Processor", "Rare Earth", "Rare Earth Ingot", "Reactor Core", "Reinforced Alloy", "Sensor Array", "Shield Emitter", "Silicon", "Silicon Wafer", "Solar Cell", "Steel", "Structural Steel", "Thruster Assembly", "Titanium", "Titanium Alloy", "Titanium Ingot", "Uranium", "Uranium Ingot", "Ambient", "Next", "Pause", "Play", "Music", "Now Playing", "MUSIC", "VOLUME", "SFX", "Status", "PLAYING", "STOPPED", "PAUSED", "Settings", "ACTIVE", "(coming soon)", "LANGUAGE", "AUDIO", "CONTROLS", "CRAFTING", "DISPLAY", "GAMEPLAY", "GLOSSARY", "LANGUAGE", "PERF", "SYSTEM", "THEME", "Select a station", "CREW MANAGEMENT", "INTERPLANETARY", "RESOURCES", "SOCIAL NET", "Colony Management", "EXIT TO DESKTOP", "EXIT TO MENU", "RESUME GAME", "thanks for playing my game :3", "broadcast into the void", "...", "send distress message", "... hello?... is there anybody out there?", "plead for help", "... experiencing multiple catastrophic breaches,", "I need help urgently.", "wait in silence", "...", "wallow", "choose to have hope", "38 hours pass with no contact.", "Just static on your once busy radio terminal.", "You float adrift in space, alone...", "it seems like there's nobody out there.", "feel the full force of the indomitable human spirit", "You feel an overwhelming sense of hope.", "It surges through you.", "face the challenges before you, no matter what", "You decide you're not giving up.", "You're here. You're alive.", "accept the situation and begin, unwavering", "A familiar blue light glows from your terminal.", "your colony name...", "YOUR COLONY DESIGNATION", "> COMPOSING RESPONSE ON ALL FREQUENCIES... \\u2014 NEW ENTRY REQUIRED", "> ENTER COLONY AND STATION TO TRANSMIT RESPONSE...", "DISTRESS RESPONSE", "> INCOMING DISTRESS SIGNAL \\u2014 COMMANDER FROST", "RESPONDING OFFICER", "RESPONDING OFFICER // COMMISSIONED", "PORTRAIT", "> \"This is {colony}, broadcasting from {station}.", ">  We read you, Commander. Standing by for instructions.\"", "> RESPONSE LOCKED", "RESPOND TO DISTRESS SIGNAL", "your station callsign...", "YOUR STATION CALLSIGN", "A U T H O R I Z E   L A U N C H", "FLAG", "LAUNCH AUTHORIZATION", "LAUNCH AUTHORIZATION", "SHIP COLORS", "Station Alpha", "STATION", "> SYSTEMS NOMINAL\\n> AWAITING CAPTAIN AUTHORIZATION", "TERMINAL", "UNNAMED COLONY", "> PERFORMANCE CALIBRATION\\n> MATCH TO YOUR COMPUTER\\u2019S HARDWARE \\u2014 NOT DIFFICULTY", "> TERMINAL CLASS: {tier}\\n> PERFORMANCE PROFILE LOCKED", "TERMINAL CLASS", "TERMINAL CLASS", "> SELECT YOUR HARDWARE CLASS TO CONTINUE...", "EXIT GAME", "Roger that. What's the graphical designation of your fleet? We want to know who's flying friendly out here, we have no idea what kind of an attack that was...", "...h... hello? \\n\\nDoes anybody out there read me? Mayday mayday mayday. I'm running out of time, current heading 345 mark 10 in orbit of this system's fourth planet. \\n\\nSending this message on a repeating hail across all frequencies. Does anybody read? ", "I have no idea what we're about to face out there... I need help from my current heading urgently. I'm dead in the water without you kid. Let's move, we don't have a lot of time. ", "Oh my god, is that another voice?! I thought I was the only one out here. We're in bad shape out here right now, we need help urgently. We're locked onto your planet, what colors are your ships bearing?", "How intact is your system after the cataclysm? Can you still run advanced programming or is your system forced into low power mode right now?", "JOIN DISCORD", "LANGUAGE", "\\u25c2 BACK", "CONTINUE \\u25b8", "HOLD SPACE", "FLAG", "IDENTITY", "LAUNCH", "SHIP COLORS", "TERMINAL", "START GAME", "// SPACE COLONY SIMULATION", "from ore to ", "empire.", "For powerful hardware. Full asteroids, high-fidelity N-body physics.", "Dyson Sphere Computer", "For slower computers. Fewer asteroids, simplified physics. Same gameplay.", "Absolute Potato", "For most computers. Full asteroid fields, balanced physics.", "Standard Colonial Rig", "WEBSITE", "welcome to", "BOTH", "CIV", "REROLL", "STN", "WISHLIST ON STEAM", "##.##..#  DECRYPTING...", "INCOMING TRANSMISSION", "OPEN JOURNAL", "QUEST COMPLETED", "REQUIREMENTS MET - READY", "SIGNAL ORIGIN: UNKNOWN INTENT", "I need to help you to establish a station that's capable of flying to another planet if you're going to have any shot at getting me out of this.\\n\\nYou've done great work getting the terminal operational so far, but we need to start building. In the [panel:Crew Panel] on the right, activate the [act:Build] icon.", "In the crew panel, click the Build button for any crew member.", "Assign a builder", "Assign a crew member to Build", "Good job! Now assign a crew member to [act:collect] to start filling up your reserves!", "In the crew panel, click the Collect button for any crew member. Collectors automatically retrieve nearby resources and deposit them in storage zones. Careful not to assign collection priorities! Unless you'd like to :)", "Assign a collector", "Assign a crew member to Collect", "The Greenhouse needs a farmer! Make sure to assign at least one crew member to the [act:Harvest] task. This allows your station to start manufacturing FD.", "Assign a crew member to the Harvest task.", "Assign a harvester", "Assign a crew member to Harvest", "The [act: Foundry] needs a worker now. Assign crew to the [act:Smelting] task to start getting this station into high gear!", "Assign a crew member to the Smelt task.", "Assign a smelter", "Assign a crew member to Smelt", "Now we have everything we need to start our factory. [act:Right-click] to assign the [panel:Zone Filter] to [res:Ingots] only. I'm about to show you how [res:raw materials] turn into [res:ingots]. We do need to prepare for a growing workforce...", "Set the new room zone filter to Ingots only.", "Assign ingot zone", "Set new room zone to Ingots only", "Now [act:right-click] to set the [panel:Zone Filter]. The first materials we'll need are [res:Glass] and [res: Steel] to build [act: Greenhouse] modules to feed your citizens. More food will attract more refugees to your colony, if there's anyone else alive out there...", "Set the third room zone filter for manufactured goods.", "Assign manufacturing zone", "Set zone filter for the third room", "Amazing work! You're getting us right back on track. Now we must assign the [panel:Zone Filter]. [panel:Zone Filters] allow you to specify the types of [res:materials] your citizens will [act:collect]. In colony management, [act:right click] where it says \"Assign Zone Filter\". To start our factory, start by assigning [act: All Raw Resources]. This will allow our citizens to begin [act:collecting] materials.", "Right-click an enclosed cell and enable all raw resources in the zone filter.", "Assign raw resource zone", "Right-click an enclosed cell", "Enable ALL raw resources in filter", "Now, let's place an [panel:Assembler] between these two new rooms! [panel:Assembler]s allow you to build more advanced materials from your [res:ingots].", "The Assembler combines ingots into advanced materials. Requires 4 Iron Ingot, 3 Copper Ingot, and 2 Titanium Ingot.", "Build an assembler", "Build an Assembler module", "Our colony is getting larger, and is probably going to start attracting some attention on the scanners. [panel: You might not be the only survivor.] Place a [act:Docking Bay] for new crew members to live in and rest on. Every crew member has [act:Energy], which runs out during the course of normal operation. They must return to their  [act:Docking Bay] to [act:recharge] before the next cycle. ", "Place a Docking Bay module on your station. Requires 3 Iron Ingot and 2 Copper Ingot.", "Place a docking bay", "Place a Docking Bay", "Let's build a [act:Component Lab] to start manufacturing even more [res: advanced materials]. Place it in the same way you would a [panel:Foundry] or an [panel:Assembler]. ", "Build an enclosed room for advanced manufacturing.", "Build a new room", "Build another enclosed room", "To make the factory functional, we need a [act:Foundry]. Grab one from the [panel:Toolbar] much like you would place walls. The [act: Foundry] is your first [res: Production Module]. [res: Production Modules] are objects that share a wall between two rooms, creating a flow of materials. Foundries, for example, [act: consume] the [res:raw resources] in their [panel: Input Room], and deposit them into their [panel: Output Room].  ", "Green OUT arrow = ingot output (face toward ingot room). Orange IN arrow = ore input (face toward ore storage). Requires 2 Iron Ingot and 1 Aluminum Ingot.", "Build a foundry", "Build a Foundry module", "The colony is growing, one step at a time. Build a [act:Greenhouse] to grow food for your crew. Greenhouses grow food over time, but a citizen assigned to [act:Harvest] must collect it. Without a harvester, food will rot in the buffer.", "Build a Greenhouse module on your station. Requires 5 Glass, 1 Steel, and 2 Aluminum Ingot.", "Build a greenhouse", "Build a Greenhouse module", "Great work, I knew we got the right person for the job. You give me hope we might not be so close to extinction after all. These [res: raw resources] are useless to us in their current form. They need to be [act:processed] into [res: refined materials] so your citizens can [panel:build] with them. We're going to go slow, and simple. I'm right here with you. Start by [act:building a second room], which shares a wall with the first room!", "Build a second enclosed room adjacent to the first.", "Expand the station", "Build a second enclosed room", "Open [panel:Colony Management] and click the [act:Station Core] button in the grid editor. This will consume materials from your stockpile and spawn a new daughter station at the next available orbit.", "Open Colony Management and click Station Core in the grid editor. Requires 4 Steel, 3 Glass, 2 Copper Wire, 2 Structural Steel, and 1 Carbon Fiber.", "Build a new station", "Build a Station Core", "This is great, every little bit helps. The asteroid field will be crucial to re-establishing civilization. Let's build out another enclosure off of the existing station assigned to [res: Ingots]! ", "Build a third enclosed room adjacent to your station for manufactured outputs. Walls cost 3 Iron Ingot each.", "Build a third room", "Build a third enclosed room", "We only have one shot at this, so I'm here to help you get started. You're looking at your [panel:Home Planet]. You have one [act:Citizen] right now who is exploring the [res: asteroid field] in orbit, and one ship orbiting indicated by the [act:Yellow Line]. First, use [key:WASD] keys or [act:right-click drag] to pan the view. [key:Scroll wheel] zooms in and out. Explore the procedurally generated solar system!", "Pan the camera using WASD or right-click drag. Zoom with scroll wheel.", "Getting your bearings", "Pan with WASD keys", "Right-click drag to pan", "Zoom with scroll wheel", "My transmissions can block your view! Try [act:hiding] this terminal using the [act:HIDE] button below, then [act:expand] it again from the compact bar.", "Hide and show the tutorial terminal.", "Hide tutorial", "Hide the tutorial", "Expand the tutorial", "Your new station needs crew. In the [panel:Crew Panel], find a citizen... [cough cough]... in the [act:Unassigned Citizens] list and assign them to this station. Keep in mind this citizen has all the needs of your other crew... [cough cough]...", "Assign a crew member to the new station.", "Commission crew", "Commission a crew member to the new station", "I'm picking up something on the scanner... \\n\\nI can't believe it. It's receiving a distress signal! A refugee is requesting emergency docking clearance. Check your [panel:Journal] for the quest, find out what they need. They might be willing to stay around if we help...", "Complete the refugee quest to recruit a new crew member.", "Refugee arrival", "Complete the refugee quest", "What a relief! The [act:Foundry] is operational. You're doing amazing work, I knew I could count on you. Now try [act:right-clicking] the [act:Foundry] in the [panel:Grid Editor] to [res:rotate] its input/output direction, if you want to change your layout or have misplaced the [act: Foundry]'s direction. Just something handy :)", "Right-click the placed Foundry to cycle its direction.", "Rotate the foundry", "Right-click the Foundry to rotate it", "Maybe you want a mix of both? Adjust the [act:opacity] slider in the zoom controls to see through the grid to the station below.", "Adjust the opacity slider in zoom controls.", "Adjust grid opacity", "Adjust grid opacity", "By default, your view is locked to the station and follows as it orbits. You can toggle this, click [act:Lock View] in the zoom controls bar.", "Toggle lock view in the zoom controls.", "Toggle lock view", "Toggle lock view", "This is where you design housing for your citizens, build flowing factories, and store materials from the asteroid field.\\nThe [panel:Grid Editor] shows your station layout. [act:Zoom] in using the [key:scroll wheel] or the [act:+/-] buttons. [act:Pan] around by [act:right-click dragging] or [act:middle-click dragging].", "Zoom and pan the grid editor.", "Navigate the grid", "Zoom the grid editor", "Pan the grid editor", "Press [key:J] or [act:click] the [panel:Journal] icon to open it. The [panel:Journal] lets you view your active quests! If there's anyone out there ready to help, they'll show up here. ", "Press J or click the Journal button.", "Open the journal", "Open the Journal panel (press J)", "Now let's have a look at your station to get a complete diagnostic on the station's resources and wellbeing. Press [key:E] or [act:click] the [panel:Colony Management] button. ", "Press E or click the Station Management button.", "Open colony management", "Open Station Management (press E)", "Select [act:Structure] from the [panel:Toolbar], then [act:click] and [act:drag] to place a line of walls. You start with [res:64 Iron Ingots], and walls cost [res: 3 Iron Ingots] each. Build wisely, this is our last chance!", "Click to place single walls, or drag to draw lines. Each wall costs 3 Iron Ingot. Green material badges mean resources are available.", "Place blueprints", "Place structure walls", "[act:Enclose] an area with walls to create [act:storage]! Your citizens need storage to collect more valuable resources to continue building bigger. Build a [res:rectangular area] connected to the existing structure so there's a \"hollow\" space. It will become [act:storage] when it is constructed. Imagine that the station components are \"Walls\" and the spaces in between them become \"Enclosed Rooms\" capable of holding valuable materials.", "Draw walls to form a complete perimeter. Each wall costs 3 Iron Ingot. Small rooms (8-12 cells) build faster and use fewer resources.", "Build an enclosed room", "Build an enclosed room", "Incredible work, you're picking up the command surface like nobody I've seen before. Make sure at least one crew member is assigned to the [act:Build] behavior so they can [panel:construct] the new walls!", "Ensure a crew member is assigned to Build.", "Reassign builder", "Assign a crew member to Build", "Great work getting that docking bay placed! Now we need to get back to building. Make sure that your crew member is assigned to [act:Build].", "Place a Docking Bay module on your station. Requires 3 Iron Ingot and 2 Copper Ingot.", "Reassign to build", "Assign a crew member to Build", "You can reorganize storage by [act:dragging] resources between cells. Try [act:clicking and dragging] a resource stack to move it to another cell. Marie Kondo will beam with pride.", "Drag a resource stack to another storage cell.", "Move resources", "Drag a resource to another cell", "Hm, looks like we have a little production issue. We're going to need to get [res:Titanium Ore] to build the [act:Assembler] module. There are plenty of [res:hidden asteroids] in the field, but your collectors can't see them until they're discovered. Assign a player to [act:Search] behavior to analyze asteroids until you find [res: Titanium Ore].", "Assign crew to Search to find titanium ore.", "Search for titanium", "Assign a crew member to Search", "Multiple distress signals detected! Your colony is bustling, it's becoming a beacon of hope in the darkness. Three refugees are requesting docking clearance. Check your [panel:Journal]!", "Complete a refugee quest to continue.", "Refugee group", "Complete the refugee quest", "I'm clearly in good hands, but I'm still up a river without a paddle here. [act:Click] on any object to select it, explore around your interface.", "Click on any entity to select it.", "Eyes on target", "Click to select any entity", "Great job, let's try selecting multiple objects now! [act:Click] and [act:drag] in empty space to draw a box selection.", "Drag a rectangle to select multiple entities.", "Box select", "Drag rectangle to select", "[act:Click] on the operational Assembler in the [panel:Grid Editor] to open the recipe selector. [panel: Assemblers] need [res:recipes] to begin processing.", "Click the Assembler and select a crafting recipe.", "Assign a recipe", "Click the Assembler in the grid", "Select a crafting recipe", "I'm getting some more readings from your craft, it looks like your time dilation engine was lucky enough to survive. See the [panel:Time Speed] slider at the bottom-left? [act:Drag] it to engage your time dilation core to increase the rate of time flow. Press the [key:Spacebar] to pause and resume the flow of time. ", "Drag the time scale slider to see the simulation speed up or slow down.", "Try the time slider", "Increase time speed", "Changing the physical flow of time also makes your citizens work faster. Don't worry, I'll be fine. Use the [panel:Time] slider at the bottom-left.", "Adjust the time scale slider to speed up construction.", "Control time", "Increase time speed", "Heh... great work kid. My oxygen supply is starting to [cough] run out... I don't know how much longer I can hold on out here. If you're getting this transmission... well, let's say I'm not gonna be home in time for dinner. It's up to you now [cough]... To my dearest Adelaide, I love you... this is Commander William Frost signing off. Good luck out there.", "", "Tutorial complete", "Godspeed, Commander. o7", "Use your new workforce to [act:Collect] at least [res:15 resources]. We need all the materials we can get in order to get your station operational. I just hope you can get here in time [cough, cough]...", "Wait for 15 resources to arrive in station storage.", "Gather resources", "Collect 15 resources ({current}/{target})", "This is Commander Frost. I'm stranded and running low on oxygen, but I can see your wreck on sensors. Press [key:E] to open [panel:Colony Management] to get started.", "That's good, the station's foundries are still online somehow. I'm still analyzing data after that massive event, I've never seen anything like it. ", "Foundry's lit but nobody's tending to it. Assign a crew member to [act:Smelt].", "I can see your layout. In the [panel:Crew Panel] on the right, assign someone to [act:Collect]. They'll haul resources from the asteroid field. To make them work faster, speed up time with the [panel:Time] slider.", "Try adjusting the [act:Time] slider.  [cough] try not to waste the little we've got left for me here...", "Your colony is getting larger, I hope it's fast enough... [cough]", "Build a [act:Greenhouse] and assign someone to [act:Harvest], or your crew will starve.", "Let's get a greenhouse going before your crew starves.", "More distress beacons lighting up the scanner. Check the [panel:Journal] quickly, they won't wait forever!", "Heh... I hope you got that burn right. Oxygen's down to the last gulps. Adelaide... if you're listening, somewhere... I made it count, I think. The colony made it. The colony made it. Tell the kid... tell them I knew they'd... [long silence]", "Heh... you've built something real out here. My oxygen is... [cough] I'm not going to make it home for dinner, Adelaide. But this colony, it's going to make it. Commander Frost, signing off. [cough] ... Good luck out there, kid.", "Great work. It's just continuing to expand larger and larger. I can't believe how fast it's coming!", "Open the [panel:Crew Panel], pick one of yours (someone steady) and commission them to her. They'll be the captain now.", "Select your new station. [act:Click] back to your parent station anytime you need.", "Let's build a new [act:Colony Core].", "Add another [act:Docking Bay] to the station so it's able to house another citizen.", "Fuel in the tanks. She's ready to move whenever you are!", "Before we burn for the fourth planet, we need [res:Oxidized Fuel] and a few more thrusters. Place a new [act:Thruster] from the module palette.", "Now the fuel. Click your [act:Fuel Processor] in [panel:Colony Management] and set the [res:Oxidized Fuel] recipe.", "That's amazing, we can finally get you off this rock. ", "Good work getting the basics running. Your ore is smelting, but this wreck needs a lot more attention. Look at those hull breaches. There are whole exposed sections where the walls blew out. Patch them up with [act:Walls]. Make an enclosed region using [act:Walls]. ", "I'm picking up a faint signal... someone's out there! Check your [panel:Journal] by clicking the icon or press [key:J]. [cough] We can't afford to turn anyone away.", "You did it. I couldn't be more proud! [cough] ... ", "[cough] ... still here. Your colony's looking good. Don't worry about me.", "My oxygen supply is... [cough] getting harder to keep this channel open.", "Your colony is actually functional. I'm... [cough] impressed. There's a whole asteroid field out there full of rare materials for you to explore. Assign tp [act:Search] and they'll scan asteroids for hidden resources. Assign to [act:Mine] to have them produce chunks.", "Frost's signal stopped four hours ago. Build a home here.", "Burn confirmed. The crew hibernates by default when you do this. [cough cough] ... Fly safe, kid. I'll see you when you get here.... If I'm still around.", "Open the [panel:Interplanetary] tab. I'm stationed at the fourth planet but... kid I don't think I'm going to make it out here...", "Click the fourth planet on the radar. [res:fuel] cost, burn time, and launch window are calculated automatically. When the timing feels right, hit [act:EXECUTE]. "];

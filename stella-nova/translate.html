ships.", "190": "Docking Bay", "191": "Dock Port", "192": "External dock. Provides additional ship berth capacity for visitors.", "193": "Docking Port", "194": "Foundry", "195": "Ore smelter. Place between ore storage and an output bay. Auto-smelts iron, copper, aluminum, titanium, and other ores into ingots.", "196": "Foundry", "197": "Fuel Proc", "198": "Fuel refinery. Click after placing to assign a recipe. Produces oxidized fuel from carbon brick, aluminum, and rare earth.", "199": "Fuel Processor", "200": "Greenhouse", "201": "Hydroponic farm. Produces food automatically when built. Output goes to adjacent enclosed storage.", "202": "Greenhouse", "203": "Hopper", "204": "Automated transport. Moves resources between adjacent storage regions.", "205": "Hopper", "206": "Medical", "207": "Medical ward. Treats injuries and boosts crew health recovery rate.", "208": "Medical Bay", "209": "Rec Room", "210": "Crew lounge. Boosts morale and reduces stress during rest periods.", "211": "Recreation", "212": "Shield", "213": "Defensive barrier. Protects the station from impacts and radiation.", "214": "Shield Generator", "215": "Core", "216": "Station foundation. Provides docking, logistics, and initial crew housing.", "217": "Colony Core", "218": "Walls", "219": "Structural wall (orange). Encloses regions for storage.", "220": "Structure (Orange)", "221": "Walls", "222": "Structural wall. Encloses regions to create storage bays and corridors.", "223": "Structure (White)", "224": "Thruster", "225": "Maneuvering engine. Enables orbital adjustments. Consumes oxidized fuel.", "226": "Thruster", "227": "Botanist — Agriculture +4, Logistics +2", "228": "Engineer — Construction +4, Mining +2", "229": "Hauler — Logistics +4, Construction +2", "230": "Metallurgist — Smelting +4, Mining +2", "231": "Miner — Extraction +4, Endurance +2", "232": "No questions asked. Thank you for your mercy, {colony}.", "233": "That was my first honest work in years. Thank you, {colony}. I mean it.", "234": "Fair. I earned that.", "235": "Fair. I earned that.", "236": "This is {name}. I need to be straight with you.\\n\\nI was part of a crew that raided supply convoys in the outer belt. Two years, three maybe? I took from people who had less than me. Every day. I'm not going to pretend it was complicated, it was wrong and I did it anyway. I did what I had to do to survive.\\n\\nI left that world behind and I've been drifting since. {qty} food and I'll work for you. I know I can't be forgiven for what I've done but I just need help.", "237": "Outer Belt * Former Raider", "238": "Former Raider — Mining +4, Logistics +3", "239": "You guys have some pretty nice rocks out here... are you sure you don't have a couple I can take?", "240": "Where can I put my rocks? This is non-negotiable, {colony}.", "241": "This is my least favorite rock :(", "242": "This is my least favorite rock :(", "243": "This is {name}. I collect rocks. ROCKS!!! All kinds of rocks. Green rocks, shiny rocks, pink rocks, forty seven rocks from forty seven systems.\\n\\nI need {qty} food. And a shelf. In that order. Actually the shelf first. The rocks are organized by spectral classification and I cannot stress enough how important the shelf situation is. ", "244": "ROCKS", "245": "I am going to share the intricate knowledge of the universe with you... just wait until I get my tinfoil back. ", "246": "Everyone needs to see the chart. IMMEDIATELY.", "247": "That's exactly what THEY would say. I'm adding you to the chart.", "248": "They got to you. I knew it. Adding this system to the chart. In RED.", "249": "The asteroids aren't random. I have proof. They've been PLACED THERE by a super intelligent race millennia ago. \\n\\nThis is {name}. I've been tracking orbital patterns for three years. The math doesn't lie. Someone is arranging the debris fields. I have a chart. You're going. to want. to see. this chart.\\n\\n{qty} food ... and I'll share everything. Also I need food because I spent my food budget primarily on my collection of chart supplies.", "250": "Deep Space * Has Charts", "251": "Theorist — Prospecting +3 (the paranoia helps)", "252": "We'll see if this measures up.", "253": "First real meal on {colony} tonight. You're welcome.", "254": "Enjoy your gray cubes.", "255": "Enjoy your gray cubes.", "256": "Your crew eats nutrient paste. I can smell it from here, and I've got six inches of steel and the entire vacuum of space between me and it. \\n\\nThis is {name}. Chef. Fifteen years feeding crews across six systems. I need {qty} food  (yes, I understand the irony) because my ship's galley is offline and I'm NOT eating any nutrient paste. I have standards.", "257": "Professional Chef * Has Opinions", "258": "Chef — Agriculture +4, Opinions +∞", "259": "Let's just see if you can satisfy me.", "260": "mmmm... yes... I think you may have earned my truly most difficult to achieve rating: Four of Five stars. You should feel honored.", "261": "One star.... I'll be sharing my review in due time. Hmph!", "262": "Review of {colony}: promising but unreliable. Two stars. Would not recommend.", "263": "This is {name}. I'm conducting an independent review of colonial infrastructure in this sector. Let me give you my initial take before REALLY laying in...\\n\\n{colony} is functional, but uninspired. The ore processing layout ... mmmm ... lacks ... vision. The station geometry is... adequate, but certainly nothing to write my recent lack of a home about.\\n\\nI need {qty} food to continue my survey of nearby colonies in hope of something a little less disappointing... \\n\\nIn exchange, I will ensure you receive my professional assessment, which I ASSURE you is worth more than it sounds.", "264": "COLONY REVIEW: (Semi-non-optional)", "265": "Critic — Logistics +4, opinions +10", "266": "Biscuit says thank you. I also say thank you but Biscuit said it first.", "267": "I have never seen Biscuit so excited. Welcome home girl!!", "268": "[Biscuit will remember this]", "269": "[Biscuit will remember this]", "270": "This is {name}. I have a dog. Her name is Biscuit. She is a very good girl.\\n\\nBiscuit needs food badly. I also need food, but Biscuit is more important. She has been so brave.\\n\\n{qty} food for the both of us. Biscuit looked at {colony} on the scanner and wagged her tail. \\n\\nI think she likes you already.", "271": "Good Dog Needs Food", "272": "You're very kind. Or very blurrey.", "273": "you got any crackers to go with that? how about some ibuprofen?", "274": "ffffffffff- [you lose the transmission]", "275": "ffffffffff- [you lose the transmission]", "276": "This is... {name}. I may have iscalculated my fuel-to alcohool ratio.\\n\\nI'm reporting three emergencies. First: im so soberr right now. Second: out of fuel. Third: food. do You have a chinken but like its fried?\\n\\nI need {qty} food. Or fuel. Or the third thing. pls", "277": "Fd and fUel Reuqestd: URGENT", "278": "...actually, maybe I'll stay a while. If you'll have me.", "279": "Message sent. I think I'll stay, {colony}. If that's still alright. I don't have anywhere else to go.", "280": "I guess I'll just have to keep looking...", "281": "I guess I'll just have to keep looking...", "282": "This is {name} calling from the Fragile Dawn, I'm passing through your system as we speak. I don't need supplies or anywhere to dock... I just need a favor.\\n\\nI need your relay antenna. Five minutes. I want to send a message to someone I lost. Your station has the range to reach the right sector. The message is short. It just says I'm still going. That I didn't stop.", "283": "Passing Through * Relay Request", "284": "Traveler — decided to stay", "285": "Excellent. I'm getting to work right away.", "286": "I've already mapped seven high-probability extraction points. You're welcome, {colony}.", "287": "Your loss. ", "288": "Your loss. ", "289": "This is {name}. I don't have what one might refer to as physical intention... I once tried to use a welding torch and the results were... well, let's just say I work better on paper.\\n\\nBut I can tell you where to dig. Orbital resonance patterns, spectral analysis, Bayesian probability mapping of resource distribution. I see the math that everyone else walks past.\\n\\n{qty} food. In exchange: I tell you where the good rocks are! What do you say?", "290": "Orbital Analysis * Pure Math", "291": "Mathematician — Prospecting +4, everything else +0", "292": "Can't believe this place is real.", "293": "I chose right. {colony} is the real thing.", "294": "That's disappointing... I'm terrified to go back to the dark abyss...", "295": "That's disappointing... I'm terrified to go back to the dark abyss...", "296": "Wait... is this {colony}?? I heard rumors someone was building out here but I didn't believe it! I had to see it with my own eyes. \\n\\nThis is {name}. You probably don't remember me but I've been sector-hopping for months looking for somewhere that felt like it was going somewhere. Your relay signature matches what I heard on the network.\\n\\nDo you think you might have {qty} food for me? I won't be any trouble, swear.", "297": "A Light in the Dark??", "298": "yay!! I'll go get the FANCY porcelain :))", "299": "Best day since the Cataclysm! We make a great team, {colony}!!", "300": "I guess we'll just have to party on without you.", "301": "Oh... boy, it sure is getting warm in here!", "302": "This is {name} broadcasting from... a station in GREAT SHAPE. There was a MINOR thermal event on the engineering deck...\\n\\nSome folks would call it a \"fire\". I call it an AMBIANCE!!\\n\\nI need {qty} food for the crossing to {colony}. \\n\\nI'm thinking something like a nice wine and cheese platter would be PERFECT for the mixer I'm hosting in engineering :)", "303": "fwd: fwd: fwd: Wine and Cheese Mixer", "304": "Optimist — middling skills, infinite morale", "305": "", "306": "", "307": "", "308": "", "309": "", "310": "Relay Lag * 15 Messages", "311": "ODE TO {COLONY}: Verse one of forty-seven begins NOW.", "312": "The epic is beginning now, {colony} will be forever immortalized in verse. You cannot stop this. You won't regret this.", "313": "I understand.\\nIt isn't planned. \\nI'll drift away \\nfor another day.", "314": "The final stanza\\nfull of grief, \\nno food, no station,\\nno relief.", "315": "Oh station bright...\\nOn terminal's light...\\nI need some food...\\ncause thaings ain't good...\\n\\nThis is {name}. Space Poet. Currently between meals.\\n\\n{qty} food and I shall compose an epic in your colony's honor. You have been warned.", "316": "and he doesn't know it", "317": "This looks right. I think this is the place they meant, {colony}.", "318": "Promise kept.", "319": "{f} will keep looking. The promise stands.", "320": "{f} couldn't keep the promise. Not for lack of trying.", "321": "This is {name}. I'm carrying a message for someone who didn't make it.\\n\\nThey asked me to find somewhere good, somewhere people look out for each other. I promised I would.", "322": "Last Promise * Searching", "323": "What happened to Central Command?", "324": "{colony}, you're building something new, aren't you?", "325": "I will find answers elsewhere... if anywhere else still exists.", "326": "I will find answers elsewhere... if anywhere else still exists.", "327": "AUTOMATED WAKE CYCLE: INITIATED. CRYOPOD SERIAL NUMBER: HTX-4471.\\n\\nThis is ... {name}. God I'm so nauseated... I... what year is it? My pod says I've been under for... \\n\\nwhat?\\n\\nno... that can't be right. No! Where is Relay Station Twelve? Why can't I raise Central Command? How long was I under? What happened?\\n\\nI need one meal. Then I need answers. {colony}, is that you? I don't recognize anything on my charts.", "328": "AUTOMATED CRYOSLEEP WARNING MESSAGE", "329": "Pre-Collapse Engineer — Construction +3, Metallurgy +2", "330": "Appreciated, {colony}. I'm on approach.", "331": "Docked. Where do you need me, {colony}?", "332": "Understood. I will find somewhere else. Good luck, {colony}.", "333": "I've moved on. Looking for another colony that wanted help.", "334": "Broadcast to {colony}. I'm not in danger. Ship's fine. Supplies are fine, but I heard about your colony on the relay network. Sounds like you're building something real, and I'd like to be part of it. Just looking for somewhere to be useful. We're all just trying to pick up the pieces here, it's so nice to see someone putting them back together. ", "335": "{colony} * Volunteer", "336": "She'd have liked this crew too. Let me get started, {colony}.", "337": "Your generosity reminds me of her a bit. She'd have approved, {colony}.", "338": "I will find another station. No hard feelings.", "339": "I will find another station. No hard feelings.", "340": "This is {name}. My wife built stations for thirty years. She'd have liked this one. I'm not as good as she was (or anywhere near as decorative) but I know which end of the wrench to hold. {qty} food is all I need, and I'd be happy to pitch in. It's what she would have wanted. ", "341": "Independent * Widower", "342": "Widower — Construction +4, Metallurgy +3", "343": "Excellent. Where are your kelp forests?", "344": "I am pretty sure I just saw a space otter on the hull of your ship! I'm on my way to check it out. ", "345": "There's another colony who needs an oceanographer.", "346": "There's another colony who needs an oceanographer.", "347": "This is Dr. {name}. Marine biologist. I realize my expertise is... niche, for the environment. My research shows that the fluid dynamics of asteroid belts are REMARKABLY similar to ocean currents. And I've been right three times. Possibly four! If you count the time I was almost right.\\n\\nI need {qty} food. In exchange I offer my expertise.", "348": "Marine Biology * In Space", "349": "Marine Biologist — Prospecting +3 (the analogy works)", "350": "Appreciated, {colony}. I won't make you regret it.", "351": "I'm here, and I'm staying, {colony}.", "352": "I will find somewhere less particular about craft ownership.", "353": "I will find somewhere less particular about craft ownership.", "354": "This is {name}. Broadcasting to {colony}. I should be transparent: this is not my ship. I borrowed it on a pretty permanent basis.\\n\\nThe previous owner was not a good person. I'm not going to pretend it was heroic, and I'm not going to get into the details. It was traumatic, and it was survival.\\n\\n{qty} food and I'll work for you. I'm good at what I do and I don't steal from people I work with. That's the best reference I can offer.", "355": "Borrowed Ship * Not Heroic", "356": "I can... stay?? You really mean it??", "357": "Cargo delivered. Manifest complete. Thank you {colony}, thank you so much.", "358": "The manifest says nearest station. I will find the next one.", "359": "The manifest says nearest station. I will find the next one.", "360": "This is {name}. I'm {age} years old. My parent was a merchant hauler on the Kepler run, and they didn't make it after the Cataclysm. The manifest says this delivery goes to the nearest station. That's you.\\n\\nI'm not asking for charity. I'm just finishing a delivery. I have no idea where I'm going next.", "361": "Kepler Run * Final Delivery", "362": "Merchant's child — will learn fast", "363": "See? I TOLD you they'd help!!! DOCKING!!!!", "364": "We made it. I want to apologize for {name} for the initial broadcast. I can't wait to meet you, Captain.", "365": "[heavy sigh] I was afraid you would say that. This can't end well for either of us. [excited screaming in the background]", "366": "[heavy sigh] I was afraid you would say that. This can't end well for either of us. [excited screaming in the background]", "367": "This is {name} broadcasting to {colony}. We have SKILLS. SKILLS I TELL YOU.\\n\\nWEJKNEfosiedbjonhmeturf786546e57w46q351\\n\\n...sorry about that. I'm {name2}, and that was {name}... need {qty} food. We're both experienced workers.\\n\\nWill help out howerb ghekradtonigbf WE ARE SO HERE WE ARE READY TO HELP!!! LET US IN!!!!!!!!XRDZ fsdhf;jgk\\n\\n[u\\n\\nPlease help. Before we kill each other.", "368": "READY TO HELP!!!!!!!!!!!!!", "369": "DEFENSE", "370": "LIVING", "371": "PRODUCTION", "372": "Hover a module for details", "373": "Drag to grid →", "374": "MODULES", "375": "— station functions", "376": "BUILD COST", "377": "there's a tutorial on!", "378": "WALLS", "379": "— draw on grid", "380": "Clear {count} Pinned", "381": "Couple", "382": "({count} detected)", "383": "Filter:", "384": "Friend Group", "385": "No crew members", "386": "No social groups detected yet", "387": "No matching events", "388": "Polycule", "389": "Social Groups", "390": "Squad", "391": "All", "392": "Station:", "393": "YOU", "394": "Aluminum", "395": "Aluminum Ingot", "396": "Aluminum Wire", "397": "Antenna Dish", "398": "Battery Cell", "399": "Bronze", "400": "Carbon", "401": "Carbon Brick", "402": "Carbon Fiber", "403": "Cargo Container", "404": "Circuit Board", "405": "Comm Module", "406": "Composite Plate", "407": "Copper", "408": "Copper Ingot", "409": "Copper Wire", "410": "Docking Clamp", "411": "Fabricator Unit", "412": "Food", "413": "Fuel Cell", "414": "Glass", "415": "Gold", "416": "Gold Ingot", "417": "Heat Exchanger", "418": "Hydraulic Actuator", "419": "Iron", "420": "Iron Ingot", "421": "Life Support Unit", "422": "Navigation Unit", "423": "Oxidized Fuel", "424": "Platinum", "425": "Platinum Ingot", "426": "Power Regulator", "427": "Pressure Vessel", "428": "Processor", "429": "Rare Earth", "430": "Rare Earth Ingot", "431": "Reactor Core", "432": "Reinforced Alloy", "433": "Sensor Array", "434": "Shield Emitter", "435": "Silicon", "436": "Silicon Wafer", "437": "Solar Cell", "438": "Steel", "439": "Structural Steel", "440": "Thruster Assembly", "441": "Titanium", "442": "Titanium Alloy", "443": "Titanium Ingot", "444": "Uranium", "445": "Uranium Ingot", "446": "Ambient", "447": "Next", "448": "Pause", "449": "Play", "450": "Music", "451": "Now Playing", "452": "MUSIC", "453": "VOLUME", "454": "SFX", "455": "Status", "456": "PLAYING", "457": "STOPPED", "458": "PAUSED", "459": "Settings", "460": "ACTIVE", "461": "(coming soon)", "462": "LANGUAGE", "463": "AUDIO", "464": "CONTROLS", "465": "CRAFTING", "466": "DISPLAY", "467": "GAMEPLAY", "468": "GLOSSARY", "469": "LANGUAGE", "470": "PERF", "471": "SYSTEM", "472": "THEME", "473": "Select a station", "474": "CREW MANAGEMENT", "475": "INTERPLANETARY", "476": "RESOURCES", "477": "SOCIAL NET", "478": "Colony Management", "479": "EXIT TO DESKTOP", "480": "EXIT TO MENU", "481": "RESUME GAME", "482": "thanks for playing my game :3", "483": "broadcast into the void", "484": "...", "485": "send distress message", "486": "... hello?... is there anybody out there?", "487": "plead for help", "488": "... experiencing multiple catastrophic breaches,", "489": "I need help urgently.", "490": "wait in silence", "491": "...", "492": "wallow", "493": "choose to have hope", "494": "38 hours pass with no contact.", "495": "Just static on your once busy radio terminal.", "496": "You float adrift in space, alone...", "497": "it seems like there's nobody out there.", "498": "feel the full force of the indomitable human spirit", "499": "You feel an overwhelming sense of hope.", "500": "It surges through you.", "501": "face the challenges before you, no matter what", "502": "You decide you're not giving up.", "503": "You're here. You're alive.", "504": "accept the situation and begin, unwavering", "505": "A familiar blue light glows from your terminal.", "506": "your colony name...", "507": "YOUR COLONY DESIGNATION", "508": "> COMPOSING RESPONSE ON ALL FREQUENCIES... \\u2014 NEW ENTRY REQUIRED", "509": "> ENTER COLONY AND STATION TO TRANSMIT RESPONSE...", "510": "DISTRESS RESPONSE", "511": "> INCOMING DISTRESS SIGNAL \\u2014 COMMANDER FROST", "512": "RESPONDING OFFICER", "513": "RESPONDING OFFICER // COMMISSIONED", "514": "PORTRAIT", "515": "> \"This is {colony}, broadcasting from {station}.", "516": ">  We read you, Commander. Standing by for instructions.\"", "517": "> RESPONSE LOCKED", "518": "RESPOND TO DISTRESS SIGNAL", "519": "your station callsign...", "520": "YOUR STATION CALLSIGN", "521": "A U T H O R I Z E   L A U N C H", "522": "FLAG", "523": "LAUNCH AUTHORIZATION", "524": "LAUNCH AUTHORIZATION", "525": "SHIP COLORS", "526": "Station Alpha", "527": "STATION", "528": "> SYSTEMS NOMINAL\\n> AWAITING CAPTAIN AUTHORIZATION", "529": "TERMINAL", "530": "UNNAMED COLONY", "531": "> PERFORMANCE CALIBRATION\\n> MATCH TO YOUR COMPUTER\\u2019S HARDWARE \\u2014 NOT DIFFICULTY", "532": "> TERMINAL CLASS: {tier}\\n> PERFORMANCE PROFILE LOCKED", "533": "TERMINAL CLASS", "534": "TERMINAL CLASS", "535": "> SELECT YOUR HARDWARE CLASS TO CONTINUE...", "536": "EXIT GAME", "537": "Roger that. What's the graphical designation of your fleet? We want to know who's flying friendly out here, we have no idea what kind of an attack that was...", "538": "...h... hello? \\n\\nDoes anybody out there read me? Mayday mayday mayday. I'm running out of time, current heading 345 mark 10 in orbit of this system's fourth planet. \\n\\nSending this message on a repeating hail across all frequencies. Does anybody read? ", "539": "I have no idea what we're about to face out there... I need help from my current heading urgently. I'm dead in the water without you kid. Let's move, we don't have a lot of time. ", "540": "Oh my god, is that another voice?! I thought I was the only one out here. We're in bad shape out here right now, we need help urgently. We're locked onto your planet, what colors are your ships bearing?", "541": "How intact is your system after the cataclysm? Can you still run advanced programming or is your system forced into low power mode right now?", "542": "JOIN DISCORD", "543": "LANGUAGE", "544": "\\u25c2 BACK", "545": "CONTINUE \\u25b8", "546": "HOLD SPACE", "547": "FLAG", "548": "IDENTITY", "549": "LAUNCH", "550": "SHIP COLORS", "551": "TERMINAL", "552": "START GAME", "553": "// SPACE COLONY SIMULATION", "554": "from ore to ", "555": "empire.", "556": "For powerful hardware. Full asteroids, high-fidelity N-body physics.", "557": "Dyson Sphere Computer", "558": "For slower computers. Fewer asteroids, simplified physics. Same gameplay.", "559": "Absolute Potato", "560": "For most computers. Full asteroid fields, balanced physics.", "561": "Standard Colonial Rig", "562": "WEBSITE", "563": "welcome to", "564": "BOTH", "565": "CIV", "566": "REROLL", "567": "STN", "568": "WISHLIST ON STEAM", "569": "##.##..#  DECRYPTING...", "570": "INCOMING TRANSMISSION", "571": "OPEN JOURNAL", "572": "QUEST COMPLETED", "573": "REQUIREMENTS MET - READY", "574": "SIGNAL ORIGIN: UNKNOWN INTENT", "575": "I need to help you to establish a station that's capable of flying to another planet if you're going to have any shot at getting me out of this.\\n\\nYou've done great work getting the terminal operational so far, but we need to start building. In the [panel:Crew Panel] on the right, activate the [act:Build] icon.", "576": "In the crew panel, click the Build button for any crew member.", "577": "Assign a builder", "578": "Assign a crew member to Build", "579": "Good job! Now assign a crew member to [act:collect] to start filling up your reserves!", "580": "In the crew panel, click the Collect button for any crew member. Collectors automatically retrieve nearby resources and deposit them in storage zones. Careful not to assign collection priorities! Unless you'd like to :)", "581": "Assign a collector", "582": "Assign a crew member to Collect", "583": "The Greenhouse needs a farmer! Make sure to assign at least one crew member to the [act:Harvest] task. This allows your station to start manufacturing FD.", "584": "Assign a crew member to the Harvest task.", "585": "Assign a harvester", "586": "Assign a crew member to Harvest", "587": "The [act: Foundry] needs a worker now. Assign crew to the [act:Smelting] task to start getting this station into high gear!", "588": "Assign a crew member to the Smelt task.", "589": "Assign a smelter", "590": "Assign a crew member to Smelt", "591": "Now we have everything we need to start our factory. [act:Right-click] to assign the [panel:Zone Filter] to [res:Ingots] only. I'm about to show you how [res:raw materials] turn into [res:ingots]. We do need to prepare for a growing workforce...", "592": "Set the new room zone filter to Ingots only.", "593": "Assign ingot zone", "594": "Set new room zone to Ingots only", "595": "Now [act:right-click] to set the [panel:Zone Filter]. The first materials we'll need are [res:Glass] and [res: Steel] to build [act: Greenhouse] modules to feed your citizens. More food will attract more refugees to your colony, if there's anyone else alive out there...", "596": "Set the third room zone filter for manufactured goods.", "597": "Assign manufacturing zone", "598": "Set zone filter for the third room", "599": "Amazing work! You're getting us right back on track. Now we must assign the [panel:Zone Filter]. [panel:Zone Filters] allow you to specify the types of [res:materials] your citizens will [act:collect]. In colony management, [act:right click] where it says \"Assign Zone Filter\". To start our factory, start by assigning [act: All Raw Resources]. This will allow our citizens to begin [act:collecting] materials.", "600": "Right-click an enclosed cell and enable all raw resources in the zone filter.", "601": "Assign raw resource zone", "602": "Right-click an enclosed cell", "603": "Enable ALL raw resources in filter", "604": "Now, let's place an [panel:Assembler] between these two new rooms! [panel:Assembler]s allow you to build more advanced materials from your [res:ingots].", "605": "The Assembler combines ingots into advanced materials. Requires 4 Iron Ingot, 3 Copper Ingot, and 2 Titanium Ingot.", "606": "Build an assembler", "607": "Build an Assembler module", "608": "Our colony is getting larger, and is probably going to start attracting some attention on the scanners. [panel: You might not be the only survivor.] Place a [act:Docking Bay] for new crew members to live in and rest on. Every crew member has [act:Energy], which runs out during the course of normal operation. They must return to their  [act:Docking Bay] to [act:recharge] before the next cycle. ", "609": "Place a Docking Bay module on your station. Requires 3 Iron Ingot and 2 Copper Ingot.", "610": "Place a docking bay", "611": "Place a Docking Bay", "612": "Let's build a [act:Component Lab] to start manufacturing even more [res: advanced materials]. Place it in the same way you would a [panel:Foundry] or an [panel:Assembler]. ", "613": "Build an enclosed room for advanced manufacturing.", "614": "Build a new room", "615": "Build another enclosed room", "616": "To make the factory functional, we need a [act:Foundry]. Grab one from the [panel:Toolbar] much like you would place walls. The [act: Foundry] is your first [res: Production Module]. [res: Production Modules] are objects that share a wall between two rooms, creating a flow of materials. Foundries, for example, [act: consume] the [res:raw resources] in their [panel: Input Room], and deposit them into their [panel: Output Room].  ", "617": "Green OUT arrow = ingot output (face toward ingot room). Orange IN arrow = ore input (face toward ore storage). Requires 2 Iron Ingot and 1 Aluminum Ingot.", "618": "Build a foundry", "619": "Build a Foundry module", "620": "The colony is growing, one step at a time. Build a [act:Greenhouse] to grow food for your crew. Greenhouses grow food over time, but a citizen assigned to [act:Harvest] must collect it. Without a harvester, food will rot in the buffer.", "621": "Build a Greenhouse module on your station. Requires 5 Glass, 1 Steel, and 2 Aluminum Ingot.", "622": "Build a greenhouse", "623": "Build a Greenhouse module", "624": "Great work, I knew we got the right person for the job. You give me hope we might not be so close to extinction after all. These [res: raw resources] are useless to us in their current form. They need to be [act:processed] into [res: refined materials] so your citizens can [panel:build] with them. We're going to go slow, and simple. I'm right here with you. Start by [act:building a second room], which shares a wall with the first room!", "625": "Build a second enclosed room adjacent to the first.", "626": "Expand the station", "627": "Build a second enclosed room", "628": "Open [panel:Colony Management] and click the [act:Station Core] button in the grid editor. This will consume materials from your stockpile and spawn a new daughter station at the next available orbit.", "629": "Open Colony Management and click Station Core in the grid editor. Requires 4 Steel, 3 Glass, 2 Copper Wire, 2 Structural Steel, and 1 Carbon Fiber.", "630": "Build a new station", "631": "Build a Station Core", "632": "This is great, every little bit helps. The asteroid field will be crucial to re-establishing civilization. Let's build out another enclosure off of the existing station assigned to [res: Ingots]! ", "633": "Build a third enclosed room adjacent to your station for manufactured outputs. Walls cost 3 Iron Ingot each.", "634": "Build a third room", "635": "Build a third enclosed room", "636": "We only have one shot at this, so I'm here to help you get started. You're looking at your [panel:Home Planet]. You have one [act:Citizen] right now who is exploring the [res: asteroid field] in orbit, and one ship orbiting indicated by the [act:Yellow Line]. First, use [key:WASD] keys or [act:right-click drag] to pan the view. [key:Scroll wheel] zooms in and out. Explore the procedurally generated solar system!", "637": "Pan the camera using WASD or right-click drag. Zoom with scroll wheel.", "638": "Getting your bearings", "639": "Pan with WASD keys", "640": "Right-click drag to pan", "641": "Zoom with scroll wheel", "642": "My transmissions can block your view! Try [act:hiding] this terminal using the [act:HIDE] button below, then [act:expand] it again from the compact bar.", "643": "Hide and show the tutorial terminal.", "644": "Hide tutorial", "645": "Hide the tutorial", "646": "Expand the tutorial", "647": "Your new station needs crew. In the [panel:Crew Panel], find a citizen... [cough cough]... in the [act:Unassigned Citizens] list and assign them to this station. Keep in mind this citizen has all the needs of your other crew... [cough cough]...", "648": "Assign a crew member to the new station.", "649": "Commission crew", "650": "Commission a crew member to the new station", "651": "I'm picking up something on the scanner... \\n\\nI can't believe it. It's receiving a distress signal! A refugee is requesting emergency docking clearance. Check your [panel:Journal] for the quest, find out what they need. They might be willing to stay around if we help...", "652": "Complete the refugee quest to recruit a new crew member.", "653": "Refugee arrival", "654": "Complete the refugee quest", "655": "What a relief! The [act:Foundry] is operational. You're doing amazing work, I knew I could count on you. Now try [act:right-clicking] the [act:Foundry] in the [panel:Grid Editor] to [res:rotate] its input/output direction, if you want to change your layout or have misplaced the [act: Foundry]'s direction. Just something handy :)", "656": "Right-click the placed Foundry to cycle its direction.", "657": "Rotate the foundry", "658": "Right-click the Foundry to rotate it", "659": "Maybe you want a mix of both? Adjust the [act:opacity] slider in the zoom controls to see through the grid to the station below.", "660": "Adjust the opacity slider in zoom controls.", "661": "Adjust grid opacity", "662": "Adjust grid opacity", "663": "By default, your view is locked to the station and follows as it orbits. You can toggle this, click [act:Lock View] in the zoom controls bar.", "664": "Toggle lock view in the zoom controls.", "665": "Toggle lock view", "666": "Toggle lock view", "667": "This is where you design housing for your citizens, build flowing factories, and store materials from the asteroid field.\\nThe [panel:Grid Editor] shows your station layout. [act:Zoom] in using the [key:scroll wheel] or the [act:+/-] buttons. [act:Pan] around by [act:right-click dragging] or [act:middle-click dragging].", "668": "Zoom and pan the grid editor.", "669": "Navigate the grid", "670": "Zoom the grid editor", "671": "Pan the grid editor", "672": "Press [key:J] or [act:click] the [panel:Journal] icon to open it. The [panel:Journal] lets you view your active quests! If there's anyone out there ready to help, they'll show up here. ", "673": "Press J or click the Journal button.", "674": "Open the journal", "675": "Open the Journal panel (press J)", "676": "Now let's have a look at your station to get a complete diagnostic on the station's resources and wellbeing. Press [key:E] or [act:click] the [panel:Colony Management] button. ", "677": "Press E or click the Station Management button.", "678": "Open colony management", "679": "Open Station Management (press E)", "680": "Select [act:Structure] from the [panel:Toolbar], then [act:click] and [act:drag] to place a line of walls. You start with [res:64 Iron Ingots], and walls cost [res: 3 Iron Ingots] each. Build wisely, this is our last chance!", "681": "Click to place single walls, or drag to draw lines. Each wall costs 3 Iron Ingot. Green material badges mean resources are available.", "682": "Place blueprints", "683": "Place structure walls", "684": "[act:Enclose] an area with walls to create [act:storage]! Your citizens need storage to collect more valuable resources to continue building bigger. Build a [res:rectangular area] connected to the existing structure so there's a \"hollow\" space. It will become [act:storage] when it is constructed. Imagine that the station components are \"Walls\" and the spaces in between them become \"Enclosed Rooms\" capable of holding valuable materials.", "685": "Draw walls to form a complete perimeter. Each wall costs 3 Iron Ingot. Small rooms (8-12 cells) build faster and use fewer resources.", "686": "Build an enclosed room", "687": "Build an enclosed room", "688": "Incredible work, you're picking up the command surface like nobody I've seen before. Make sure at least one crew member is assigned to the [act:Build] behavior so they can [panel:construct] the new walls!", "689": "Ensure a crew member is assigned to Build.", "690": "Reassign builder", "691": "Assign a crew member to Build", "692": "Great work getting that docking bay placed! Now we need to get back to building. Make sure that your crew member is assigned to [act:Build].", "693": "Place a Docking Bay module on your station. Requires 3 Iron Ingot and 2 Copper Ingot.", "694": "Reassign to build", "695": "Assign a crew member to Build", "696": "You can reorganize storage by [act:dragging] resources between cells. Try [act:clicking and dragging] a resource stack to move it to another cell. Marie Kondo will beam with pride.", "697": "Drag a resource stack to another storage cell.", "698": "Move resources", "699": "Drag a resource to another cell", "700": "Hm, looks like we have a little production issue. We're going to need to get [res:Titanium Ore] to build the [act:Assembler] module. There are plenty of [res:hidden asteroids] in the field, but your collectors can't see them until they're discovered. Assign a player to [act:Search] behavior to analyze asteroids until you find [res: Titanium Ore].", "701": "Assign crew to Search to find titanium ore.", "702": "Search for titanium", "703": "Assign a crew member to Search", "704": "Multiple distress signals detected! Your colony is bustling, it's becoming a beacon of hope in the darkness. Three refugees are requesting docking clearance. Check your [panel:Journal]!", "705": "Complete a refugee quest to continue.", "706": "Refugee group", "707": "Complete the refugee quest", "708": "I'm clearly in good hands, but I'm still up a river without a paddle here. [act:Click] on any object to select it, explore around your interface.", "709": "Click on any entity to select it.", "710": "Eyes on target", "711": "Click to select any entity", "712": "Great job, let's try selecting multiple objects now! [act:Click] and [act:drag] in empty space to draw a box selection.", "713": "Drag a rectangle to select multiple entities.", "714": "Box select", "715": "Drag rectangle to select", "716": "[act:Click] on the operational Assembler in the [panel:Grid Editor] to open the recipe selector. [panel: Assemblers] need [res:recipes] to begin processing.", "717": "Click the Assembler and select a crafting recipe.", "718": "Assign a recipe", "719": "Click the Assembler in the grid", "720": "Select a crafting recipe", "721": "I'm getting some more readings from your craft, it looks like your time dilation engine was lucky enough to survive. See the [panel:Time Speed] slider at the bottom-left? [act:Drag] it to engage your time dilation core to increase the rate of time flow. Press the [key:Spacebar] to pause and resume the flow of time. ", "722": "Drag the time scale slider to see the simulation speed up or slow down.", "723": "Try the time slider", "724": "Increase time speed", "725": "Changing the physical flow of time also makes your citizens work faster. Don't worry, I'll be fine. Use the [panel:Time] slider at the bottom-left.", "726": "Adjust the time scale slider to speed up construction.", "727": "Control time", "728": "Increase time speed", "729": "Heh... great work kid. My oxygen supply is starting to [cough] run out... I don't know how much longer I can hold on out here. If you're getting this transmission... well, let's say I'm not gonna be home in time for dinner. It's up to you now [cough]... To my dearest Adelaide, I love you... this is Commander William Frost signing off. Good luck out there.", "730": "", "731": "Tutorial complete", "732": "Godspeed, Commander. o7", "733": "Use your new workforce to [act:Collect] at least [res:15 resources]. We need all the materials we can get in order to get your station operational. I just hope you can get here in time [cough, cough]...", "734": "Wait for 15 resources to arrive in station storage.", "735": "Gather resources", "736": "Collect 15 resources ({current}/{target})", "737": "This is Commander Frost. I'm stranded and running low on oxygen, but I can see your wreck on sensors. Press [key:E] to open [panel:Colony Management] to get started.", "738": "That's good, the station's foundries are still online somehow. I'm still analyzing data after that massive event, I've never seen anything like it. ", "739": "Foundry's lit but nobody's tending to it. Assign a crew member to [act:Smelt].", "740": "I can see your layout. In the [panel:Crew Panel] on the right, assign someone to [act:Collect]. They'll haul resources from the asteroid field. To make them work faster, speed up time with the [panel:Time] slider.", "741": "Try adjusting the [act:Time] slider.  [cough] try not to waste the little we've got left for me here...", "742": "Your colony is getting larger, I hope it's fast enough... [cough]", "743": "Build a [act:Greenhouse] and assign someone to [act:Harvest], or your crew will starve.", "744": "Let's get a greenhouse going before your crew starves.", "745": "More distress beacons lighting up the scanner. Check the [panel:Journal] quickly, they won't wait forever!", "746": "Heh... I hope you got that burn right. Oxygen's down to the last gulps. Adelaide... if you're listening, somewhere... I made it count, I think. The colony made it. The colony made it. Tell the kid... tell them I knew they'd... [long silence]", "747": "Heh... you've built something real out here. My oxygen is... [cough] I'm not going to make it home for dinner, Adelaide. But this colony, it's going to make it. Commander Frost, signing off. [cough] ... Good luck out there, kid.", "748": "Great work. It's just continuing to expand larger and larger. I can't believe how fast it's coming!", "749": "Open the [panel:Crew Panel], pick one of yours (someone steady) and commission them to her. They'll be the captain now.", "750": "Select your new station. [act:Click] back to your parent station anytime you need.", "751": "Let's build a new [act:Colony Core].", "752": "Add another [act:Docking Bay] to the station so it's able to house another citizen.", "753": "Fuel in the tanks. She's ready to move whenever you are!", "754": "Before we burn for the fourth planet, we need [res:Oxidized Fuel] and a few more thrusters. Place a new [act:Thruster] from the module palette.", "755": "Now the fuel. Click your [act:Fuel Processor] in [panel:Colony Management] and set the [res:Oxidized Fuel] recipe.", "756": "That's amazing, we can finally get you off this rock. ", "757": "Good work getting the basics running. Your ore is smelting, but this wreck needs a lot more attention. Look at those hull breaches. There are whole exposed sections where the walls blew out. Patch them up with [act:Walls]. Make an enclosed region using [act:Walls]. ", "758": "I'm picking up a faint signal... someone's out there! Check your [panel:Journal] by clicking the icon or press [key:J]. [cough] We can't afford to turn anyone away.", "759": "You did it. I couldn't be more proud! [cough] ... ", "760": "[cough] ... still here. Your colony's looking good. Don't worry about me.", "761": "My oxygen supply is... [cough] getting harder to keep this channel open.", "762": "Your colony is actually functional. I'm... [cough] impressed. There's a whole asteroid field out there full of rare materials for you to explore. Assign tp [act:Search] and they'll scan asteroids for hidden resources. Assign to [act:Mine] to have them produce chunks.", "763": "Frost's signal stopped four hours ago. Build a home here.", "764": "Burn confirmed. The crew hibernates by default when you do this. [cough cough] ... Fly safe, kid. I'll see you when you get here.... If I'm still around.", "765": "Open the [panel:Interplanetary] tab. I'm stationed at the fourth planet but... kid I don't think I'm going to make it out here...", "766": "Click the fourth planet on the radar. [res:fuel] cost, burn time, and launch window are calculated automatically. When the timing feels right, hit [act:EXECUTE]. "}};
